Boot into macOS Recovery and run First Aid on the startup volume."],"correct":1,"explain":"The BEST first step is to identify where space is being used. In Finder, viewing the startup disk and enabling size calculation for folders provides a visual view of which directories are consuming the most storage. Activity Monitor shows process usage, not disk usage. Erasing the disk is destructive and not appropriate as an initial step. Running First Aid checks disk integrity, not space consumption."},{"id":122,"domain":"Operating Systems","q":"A Linux administrator suspects that a web server is running out of disk space on a specific filesystem mounted at /var. The server is still running, but log files have stopped updating. Which of the following commands will MOST effectively show the usage of all mounted filesystems in human-readable units so the admin can quickly identify a nearly full partition?","choices":["du -sh /var/*.","df -h.","mount | column -t.","lsblk -f."],"correct":1,"explain":"The df -h command shows disk usage for all mounted filesystems in human-readable units, making it easy to spot a nearly full partition. du -h /var focuses on directory usage within /var, ls -al lists files, and /etc/fstab shows mount configuration, not current usage."},{"id":123,"domain":"Security","q":"A user\u2019s company-issued Android phone is enrolled in a corporate MDM. The user notices that corporate email and document apps show a small briefcase icon, and they cannot copy text from those apps into personal messaging apps. Which of the following BEST describes the purpose of this configuration?","choices":["To reduce battery consumption by suspending background activity in work apps.","To separate work data from personal data and enforce corporate controls.","To allow IT to selectively wipe corporate data without erasing personal content.","To require corporate apps to use managed accounts and approved sharing targets."],"correct":1,"explain":"The briefcase icon indicates a work profile or container used by MDM to isolate corporate apps and data. Preventing copy/paste into personal apps is a data loss prevention (DLP) control. It does not primarily control battery use, personal data deletion, or Wi-Fi networks, even though those may also be managed by policy."},{"id":124,"domain":"Software Troubleshooting","q":"A macOS user reports that an application frequently becomes unresponsive and displays the spinning beachball. The user attempts to close the app from the Dock, but it does not quit. As a support technician, which of the following is the MOST appropriate next step using built-in tools?","choices":["Open Force Quit Applications and forcibly close the problematic app.","Open Activity Monitor and force quit the hung process from the CPU tab.","Sign out of the user profile and sign back in to reload the app session.","Restart the Mac from the Apple menu if the app still will not respond."],"correct":0,"explain":"Force Quit Applications (Command+Option+Esc) is the correct built-in tool to forcibly close an unresponsive macOS app. Erasing the startup disk is not warranted, Keychain Access is unrelated, and shutting down via command line is not the best immediate troubleshooting step."},{"id":125,"domain":"Operating Systems","q":"A Linux user is working in a terminal and wants to confirm the absolute path of their current working directory before running a potentially destructive rm command. Which of the following commands is the MOST appropriate to run first?","choices":["pwd.","realpath ..","echo $PWD.","ls -ld ."],"correct":0,"explain":"The pwd command prints the current working directory, letting the user confirm their exact location in the filesystem. echo $PATH shows executable search paths, cd / changes location, and ls -R lists contents recursively without confirming the current directory path."},{"id":126,"domain":"Operating Systems","q":"A user wants to prepare an iOS device for potential loss or theft and asks how to ensure they can remotely locate, lock, and erase the device. Which of the following built-in features should the technician verify is enabled FIRST?","choices":["Activation Lock associated with the user\u2019s Apple ID.","Low Power Mode to extend battery life during daily usage.","Find My iPhone (Find My) linked to the user\u2019s Apple ID.","iCloud Backup so the device can be restored after a remote erase."],"correct":2,"explain":"Find My iPhone (part of the Find My service) enables remote location, lock, and erase capabilities. Screen Time, Low Power Mode, and Automatic Downloads do not provide remote security and tracking functionality."},{"id":127,"domain":"Operating Systems","q":"A macOS user wants to protect all data on their laptop so that if the physical drive is removed, the contents remain unreadable without the user\u2019s credentials. Which macOS feature should the technician enable to BEST meet this requirement?","choices":["Time Machine backups to an external drive.","FileVault full-disk encryption.","A firmware password in macOS Recovery.","A login password with automatic screen lock enabled."],"correct":1,"explain":"FileVault provides full-disk encryption of the startup volume, ensuring that data on the disk cannot be accessed without proper authentication. Time Machine backs up data, Spotlight indexes it, and Keychain secures credentials rather than the entire disk."},{"id":128,"domain":"Security","q":"A Linux administrator needs to execute a single system-wide configuration command with elevated privileges on a multi-user server. The admin wants to follow least privilege principles and avoid staying logged in as root. Which of the following commands is the BEST choice?","choices":["su -.","sudo.","sudo -i.","pkexec."],"correct":1,"explain":"sudo allows a regular user to execute specific commands with elevated privileges while remaining logged in as themselves, supporting least privilege. su opens a root shell, passwd root changes the root password, and chmod 777 /etc is insecure and unrelated to elevation."},{"id":129,"domain":"Security","q":"A user complains that their Android device frequently installs apps with aggressive ads and strange permissions after sideloading APK files from third-party websites. The company wants to reduce this risk. Which of the following is the BEST control to implement on the device?","choices":["Block installations from unknown sources in device security settings.","Require apps to be installed only through the managed app store or Google Play.","Disable developer options and USB debugging on the device.","Review app permissions regularly and remove sideloaded apps."],"correct":0,"explain":"Disabling installation from unknown sources (outside the official app store) significantly reduces the risk of sideloaded malicious apps. Developer mode, brightness, and time settings do not directly mitigate this threat."},{"id":130,"domain":"Operating Systems","q":"A macOS user reports that system performance is sluggish, the fan runs frequently, and they suspect a particular application is consuming excessive CPU and memory. Which built-in utility should the technician use FIRST to verify per-process resource usage in real time?","choices":["Console logs.","Activity Monitor.","Memory Pressure in Activity Monitor\u2019s Memory tab.","The Login Items section in System Settings."],"correct":1,"explain":"Activity Monitor provides real-time CPU, memory, energy, disk, and network usage per process. Console is for log viewing, Disk Utility manages disks, and Keychain Access manages credentials."},{"id":131,"domain":"Operating Systems","q":"A Linux user wants to install a new software package called \"backup-agent\" on a Debian-based distribution using the system\u2019s package manager, ensuring dependencies are handled automatically. Which of the following commands is the MOST appropriate?","choices":["apt-get update && apt-get install backup-agent.","dnf install backup-agent.","apt install backup-agent.","dpkg -i backup-agent.deb."],"correct":2,"explain":"On Debian-based systems, apt install backup-agent retrieves the package from configured repositories and installs required dependencies. yum and dnf are used on Red Hat-based distributions, and rpm installs local RPM packages without automatic repository dependency resolution."},{"id":132,"domain":"Operational Procedures","q":"An iOS user complains that their device storage is frequently full. They have a large photo library and already use iCloud Photos. They want to keep access to all photos while minimizing local storage use. Which setting should they enable to BEST address this concern?","choices":["Download and Keep Originals in iCloud Photos settings.","Optimize iPhone Storage in iCloud Photos settings.","Enable Shared Albums to offload older photos automatically.","Use Offload Unused Apps so full-resolution photos stay in iCloud."],"correct":1,"explain":"Optimize iPhone Storage keeps lower-resolution versions of photos on the device and stores full-resolution originals in iCloud, freeing local storage. Download and Keep Originals does the opposite. Airplane Mode and disabling iCloud Backup do not directly address photo storage usage."},{"id":133,"domain":"Operating Systems","q":"A macOS user installed a configuration profile from an untrusted website to \u201coptimize internet performance.\u201d Afterward, their default browser home page and DNS settings changed. Which of the following is the BEST built-in location to review and remove this suspicious profile?","choices":["System Settings > Network > DNS.","System Settings > General > Login Items & Extensions.","System Settings > Privacy & Security > Profiles.","Profiles / Device Management in System Settings."],"correct":3,"explain":"Malicious configuration profiles can be installed on macOS and modified via the Profiles / Profiles & Device Management area. Network, Login Items, and Location Services may show side effects but are not the primary place to remove the profile itself."},{"id":134,"domain":"Operating Systems","q":"A Linux administrator needs to investigate intermittent connectivity issues to a remote server named app01.example.com. They want to see each hop along the route and identify where latency or packet loss begins. Which command is the MOST appropriate to start this analysis?","choices":["ping -c 4 app01.example.com.","tracepath app01.example.com.","traceroute app01.example.com.","mtr app01.example.com."],"correct":2,"explain":"traceroute shows each hop between the source and destination and where latency or packet loss appears. ping only checks reachability and round-trip time, ip addr show displays local interface configuration, and nslookup tests DNS resolution, not the path."},{"id":135,"domain":"Security","q":"A company requires all smartphones accessing corporate email to enforce device-level encryption and the ability to remotely wipe corporate data if an employee leaves. Which technology is MOST appropriate to centrally enforce these requirements across iOS and Android devices?","choices":["Require users to configure Exchange ActiveSync manually on each device.","Enabling personal hotspot on all devices.","Enroll devices in MDM with managed profiles.","Use conditional access with app-based MFA only."],"correct":2,"explain":"An MDM solution with enrollment profiles can enforce encryption, remote wipe, passcode policies, and other security controls centrally. Manual email configuration and personal hotspots do not enforce these policies, and local backups are unrelated to device-level policy enforcement."},{"id":136,"domain":"Operational Procedures","q":"A macOS user wants an automated backup solution that allows them to restore individual files or roll the entire system back to a previous point in time after a failed software installation. They prefer a built-in solution that works with an external drive. Which feature BEST meets these requirements?","choices":["Time Machine configured to use the external drive.","APFS snapshots managed through Disk Utility.","FileVault full-disk encryption on the external drive only.","iCloud Drive Desktop & Documents syncing."],"correct":0,"explain":"Time Machine provides ongoing versioned backups to an external drive and allows restoring files or the entire system. FileVault encrypts, Spotlight indexes, and Disk Utility manages volumes, but none provide full, versioned backup and restore functionality by themselves."},{"id":137,"domain":"Operating Systems","q":"A Linux system administrator wants to monitor a log file in real time while a service is restarted to see new entries as they are written. They are specifically interested in the last 30 lines of the log and any subsequent updates. Which command BEST accomplishes this?","choices":["tail -n 30 -f /var/log/service.log.","journalctl -u service -f -n 30.","cat /var/log/service.log | tail -n 30.","less +F /var/log/service.log."],"correct":0,"explain":"tail -n 30 -f shows the last 30 lines and then follows the file as new log entries are appended. head shows the first lines, cat | more paginates the whole file, and less allows navigation but does not automatically follow updates by default."},{"id":138,"domain":"Security","q":"An Android user is concerned that newly installed apps are requesting access to contacts, camera, and location, and they want to centrally review and adjust those permissions. Which of the following locations is the MOST appropriate place to guide the user?","choices":["Settings > Security > Install unknown apps.","Settings > Privacy > App Permissions.","Settings > Apps > Special app access.","Google Play Store > Manage apps & device."],"correct":1,"explain":"Android\u2019s Permission Manager (under Privacy/Security & Privacy) allows reviewing and modifying app-level permissions such as contacts, camera, and location. Display settings, Play Store subscriptions, and developer background process limits do not manage app permissions directly."},{"id":139,"domain":"Operating Systems","q":"A macOS workstation is part of a shared office environment. The user wants to quickly launch frequently used apps and switch between multiple desktops and full-screen windows using built-in macOS UI features. Which combination of features is MOST appropriate to accomplish this?","choices":["Use Launchpad to open apps and Mission Control to manage desktops.","Use Spotlight to launch apps and Stage Manager to organize windows.","Use the Dock for frequent apps and Mission Control for Spaces.","Use Finder for app launching and Time Machine for workspace switching."],"correct":2,"explain":"The Dock is the best built-in feature for quickly opening frequently used apps, while Mission Control helps users manage multiple desktops (Spaces) and full-screen windows. Launchpad can also open apps, but it is more of an application grid than the best tool for rapid access to commonly used apps."},{"id":140,"domain":"Operating Systems","q":"A Linux administrator needs to verify whether a specific service called \"webapp\" is currently running and enabled to start at boot on a system that uses systemd. They also want to see recent log output for that service. Which command is the MOST appropriate to run?","choices":["journalctl -u webapp --since today.","journalctl -xeu webapp.","systemctl status webapp.","systemctl is-enabled webapp && systemctl is-active webapp."],"correct":2,"explain":"systemctl status webapp shows the service's current status, whether it is enabled, and recent log entries on systemd-based systems. ps aux | grep only shows running processes, init 6 reboots, and stopping the service is not the primary way to check its status."},{"id":141,"domain":"Security","q":"A user with an iOS device managed by their employer finds that they cannot remove a specific Wi-Fi configuration or VPN profile, and certain restrictions such as passcode complexity are enforced. Which of the following BEST explains why these settings cannot be changed by the user?","choices":["The device is in Supervised mode, which hides advanced network options.","An MDM configuration profile is restricting those settings.","The Wi-Fi profile was installed as a managed configuration that the user cannot edit.","The employer has enforced passcode and VPN restrictions through device management."],"correct":1,"explain":"MDM profiles enforce corporate policies such as VPN, Wi-Fi, and passcode requirements. Users typically cannot remove or edit these settings on managed devices. Low Power Mode, network count, and Airplane Mode do not cause persistent, non-removable policy enforcement."},{"id":142,"domain":"Operating Systems","q":"A user reports that their macOS system takes a long time to become responsive after logging in. The technician observes many applications launching automatically at login. Which built-in location is the BEST place to disable unnecessary startup applications for that user?","choices":["Users & Groups > Login Items.","System Settings > General > Sharing.","System Settings > Desktop & Dock.","System Settings > Privacy & Security > Extensions."],"correct":0,"explain":"Login Items under Users & Groups control which apps start automatically when a user logs in. Network proxies, Accessibility display options, and lock screen settings do not control login-time app startup."},{"id":143,"domain":"Operating Systems","q":"A Linux user wants to see a one-time snapshot of all running processes, including their CPU and memory usage, without a continuously updating interface. Which command is the MOST appropriate to use?","choices":["top -b -n 1.","ps aux.","ps -eo pid,comm,%cpu,%mem --sort=-%cpu.","htop."],"correct":1,"explain":"ps aux provides a one-time list of all processes with their CPU and memory usage. top is interactive and continuously updates, free -h shows memory statistics but not individual processes, and uptime shows system load and run time only."},{"id":144,"domain":"Security","q":"A user with an Android phone enrolled in an MDM solution wants to know why the corporate IT team can wipe only the work data and apps but not their personal photos and messages. Which of the following BEST describes this configuration?","choices":["The device uses full-disk encryption, preventing any remote wipe.","A work profile is separating company data from personal data.","The company enrolled the device in a fully managed corporate-owned mode.","Corporate apps are installed as managed apps inside a separate container."],"correct":1,"explain":"Android work profiles allow IT to manage and selectively wipe corporate apps and data without affecting personal content. Full-disk encryption does not prevent remote wipe, guest mode is different, and lock screen configuration does not explain selective wipe capability."},{"id":145,"domain":"Operating Systems","q":"A macOS user has forgotten the password to a Wi-Fi network that their system connects to automatically. They want to retrieve the stored password without resetting the wireless router. Which built-in utility should the technician use to view saved Wi-Fi credentials, assuming the user can authenticate with their macOS account?","choices":["System Settings > Network > Wi-Fi > Details.","Keychain Access.","System Information > Wi-Fi.","Terminal with the security find-generic-password command."],"correct":1,"explain":"Keychain Access stores Wi-Fi credentials and allows viewing them after authenticating with the user\u2019s account password. Disk Utility, Mission Control, and Terminal history are unrelated to saved network passwords."},{"id":146,"domain":"Operational Procedures","q":"A Linux administrator needs to schedule a backup script to run automatically every day at 1:30 AM. They want a standard solution that persists across reboots. Which of the following is the BEST place to configure this recurring job?","choices":["Add an entry in the user\u2019s crontab using crontab -e.","Create a systemd timer for the backup script.","Add the command to /etc/rc.local so it runs each boot.","Place the script in /etc/cron.daily and let it run once per day."],"correct":0,"explain":"Cron (via crontab -e) is the standard way to schedule recurring jobs at specified times such as 1:30 AM. Shell history, /etc/hosts, and /tmp directories do not schedule automated execution."},{"id":147,"domain":"Security","q":"A user frequently connects their smartphone to open public Wi-Fi networks in cafes and airports. They are concerned about other users on the same network intercepting their traffic. Which of the following is the MOST effective recommendation to protect their data in transit, regardless of the Wi-Fi network\u2019s configuration?","choices":["Enable Private Wi-Fi Address and MAC randomization for each network.","Use a trusted VPN on public Wi-Fi.","Prefer HTTPS-only mode in the mobile browser whenever possible.","Disable auto-join for unknown open networks."],"correct":1,"explain":"Using a VPN encrypts traffic between the device and the VPN endpoint, protecting it from local interception on untrusted Wi-Fi. Bluetooth, NFC, screen brightness, and app update settings do not address the primary risk of network traffic sniffing."},{"id":148,"domain":"Operating Systems","q":"A macOS user wants to perform a non-destructive check of the startup disk\u2019s file system for errors and repair them if necessary while preserving data. Which built-in utility should the technician use to run a First Aid check on the volume?","choices":["Disk Utility.","fsck_apfs from macOS Recovery.","Safe Mode during startup to verify the startup volume.","First Aid on the volume from macOS Recovery."],"correct":0,"explain":"Disk Utility provides the First Aid feature to verify and repair disk file systems non-destructively. Keychain Access manages credentials, ping checks network connectivity, and Launchpad is an application launcher."},{"id":149,"domain":"Operating Systems","q":"A Linux administrator wants to safely shut down a server for planned maintenance, ensuring all processes are terminated cleanly and filesystems are unmounted. They are working from an SSH session with appropriate privileges. Which command is the MOST appropriate to perform this shutdown immediately?","choices":["shutdown -h now.","systemctl poweroff.","poweroff.","shutdown now"],"correct":0,"explain":"shutdown -h now requests an orderly halt of the system, allowing processes to terminate and filesystems to unmount properly. reboot -f forces a restart without proper shutdown, kill -9 -1 is extremely disruptive, and rm -rf / is destructive and unrelated."},{"id":150,"domain":"Software Troubleshooting","q":"A technician is assisting a user who complains that their Android phone\u2019s battery drains quickly overnight, even when the device is idle. The user has many apps allowed to run in the background and receive push notifications. Which of the following is the MOST appropriate FIRST step to address the issue using built-in tools?","choices":["Enable battery saver and check per-app battery usage.","Restrict background battery usage for the highest-drain apps.","Review push-sync and location access for apps active overnight.","Turn on airplane mode permanently during the day."],"correct":0,"explain":"Enabling battery saver mode and reviewing per-app battery usage helps identify apps consuming resources in the background and applies system-level optimizations. Disabling the lock screen, forcing airplane mode, or maxing screen brightness are not appropriate first steps and may worsen usability."},{"id":151,"domain":"Security","q":"A technician is asked to secure a server room that contains sensitive equipment. The company wants to ensure only authorized personnel can enter while maintaining an audit trail of who accessed the room. Which of the following BEST meets this requirement?","choices":["Use an electronic badge system with access logs and assigned permissions.","Install a keyed deadbolt and require the facilities team to track key sign-outs manually.","Position a security camera outside the room and review footage after incidents are reported.","Post a restricted-access sign and require employees to challenge unfamiliar visitors."],"correct":0,"explain":"Badge-based access control both restricts entry and records who accessed the room. Keys and signs rely heavily on people, and cameras provide monitoring but not controlled access with user-level logs."},{"id":152,"domain":"Security","q":"A company wants to prevent unauthorized individuals from viewing sensitive information displayed on employee monitors in an open office layout. Which of the following is the MOST effective solution?","choices":["Attach privacy screens that narrow the monitor viewing angle.","Configure the monitors to turn off automatically after five minutes of inactivity.","Reduce display brightness so text is less visible from a distance.","Require employees to sit with their backs toward interior cubicle walls."],"correct":0,"explain":"Privacy filters directly address shoulder surfing by narrowing the visible viewing angle. Timeouts help when a user walks away, but they do not protect active sessions from visual exposure."},{"id":153,"domain":"Security","q":"A technician needs to dispose of several old hard drives containing confidential data. Which method BEST ensures the data cannot be recovered?","choices":["Destroy the drives through an approved shredding process.","Delete all user data, empty the recycle bin, and then remove the partitions.","Perform a quick format and label the drives as sanitized.","Place the drives in long-term storage until the company audits them later."],"correct":0,"explain":"Physical destruction is the strongest option when the drives are being retired and data recovery must be prevented. Deleting files and quick formatting do not reliably sanitize the media."},{"id":154,"domain":"Security","q":"A company wants to prevent tailgating into secure areas. Which of the following is the MOST effective solution?","choices":["Install a mantrap so only one person can pass through at a time.","Require employees to display ID badges above the waist at all times.","Send a reminder telling staff not to hold doors open for others.","Add additional exterior lighting near the entrance to improve visibility."],"correct":0,"explain":"A mantrap is specifically designed to stop tailgating by physically controlling entry. Badges and reminders help, but they rely on consistent human behavior."},{"id":155,"domain":"Security","q":"A user reports that their account was locked out after multiple failed login attempts. The technician confirms the lockout policy is functioning correctly. Which of the following is the MOST likely cause?","choices":["The user entered an incorrect password too many times.","The workstation lost its network connection during the sign-in process.","A password history rule prevented the account from reusing an older password.","The screen saver timeout expired while the user was logging in."],"correct":0,"explain":"Account lockout policies are usually triggered by repeated failed authentication attempts, most commonly from entering the wrong password multiple times."},{"id":156,"domain":"Security","q":"A company wants to ensure that only approved applications can run on corporate laptops. Which of the following BEST meets this requirement?","choices":["Enable application allowlisting for approved software only.","Require employees to sign the acceptable use policy each quarter.","Restrict local administrator rights on all company laptops.","Disable removable media to reduce unauthorized software installs."],"correct":0,"explain":"Application allowlisting directly enforces which programs are allowed to execute. Policies, least privilege, and removable media controls help, but they do not provide the same level of execution control."},{"id":157,"domain":"Security","q":"A technician wants to ensure that sensitive files stored on a laptop remain protected even if the device is stolen. Which of the following is the BEST solution?","choices":["Turn on full-disk encryption for the laptop storage drive.","Configure the laptop to require a password-protected screen saver.","Store the files in a hidden folder that standard users cannot browse.","Set NTFS permissions so only the laptop owner can open the files."],"correct":0,"explain":"Full-disk encryption protects data at rest if the device is lost or stolen. Local folder permissions and screen locks are not enough once an attacker has physical possession of the drive."},{"id":158,"domain":"Operating Systems","q":"A user frequently forgets their password and writes it on a sticky note attached to their monitor. Which of the following is the BEST corrective action?","choices":["Deploy a password manager so credentials are stored securely.","Shorten the password expiration period so the user practices changing it more often.","Require the user to use a simpler password they can memorize without assistance.","Lock the account until the user demonstrates compliance with the password policy."],"correct":0,"explain":"A password manager reduces the need to write down complex credentials while keeping them stored securely. Simpler passwords and punitive actions do not solve the underlying problem well."},{"id":159,"domain":"Operating Systems","q":"A technician wants to prevent unauthorized devices from connecting to the corporate network. Which of the following is the MOST appropriate solution?","choices":["Use network access control to validate devices before admission.","Reserve DHCP addresses for company-owned devices only.","Maintain a spreadsheet of approved device MAC addresses.","Deploy a wireless captive portal that displays a terms-of-use banner."],"correct":0,"explain":"NAC evaluates device identity and compliance before network access is granted. DHCP reservations and spreadsheets are administrative aids, not strong admission controls."},{"id":160,"domain":"Security","q":"A company wants to ensure that employees cannot access inappropriate websites during work hours. Which of the following BEST meets this requirement?","choices":["Apply URL filtering through the firewall or secure web gateway.","Disable browser extensions so users have fewer ways to customize web access.","Require managers to review browser histories during monthly audits.","Block all outbound web traffic except to a list of approved IP addresses."],"correct":0,"explain":"URL filtering is the standard technical control for restricting categories of websites. Manual review is reactive, and IP-only allowlists are usually too rigid for normal business use."},{"id":161,"domain":"Software Troubleshooting","q":"A user's Windows workstation begins opening unwanted browser tabs, displaying fake antivirus pop-ups, and running much slower than normal. Which of the following should the technician do FIRST?","choices":["Quarantine the system from the network to limit further spread.","Delete temporary files and clear the browser cache to improve performance.","Run System Restore to revert the workstation to a previous checkpoint.","Install the latest printer drivers in case the issue is device related."],"correct":0,"explain":"When malware is suspected, the first step is to isolate the affected machine so it cannot continue communicating, spreading, or leaking data. Cleanup and remediation come after containment."},{"id":162,"domain":"Security","q":"A technician needs to remove malware from a Windows PC using standard best practices. Which of the following is the BEST sequence?","choices":["Identify symptoms, quarantine the system, disable System Restore, remediate, schedule scans and updates, then re-enable System Restore.","Run a full scan, reconnect the system to the network, create a restore point, and then review symptoms.","Disable the antivirus, clear browser cookies, remove user profiles, and then patch the OS.","Back up infected files, restore the system image immediately, and then investigate the source of compromise."],"correct":0,"explain":"That sequence aligns with the standard malware-removal process: identify, quarantine, disable restore, remediate, schedule scans/updates, and re-enable restore after the system is clean."},{"id":163,"domain":"Operating Systems","q":"A user reports that Windows is unable to start after a failed update. The technician needs to repair startup files from the recovery environment. Which tool should the technician use?","choices":["bootrec","gpupdate","diskmgmt.msc","services.msc"],"correct":0,"explain":"bootrec is used from the recovery environment to repair boot records and startup-related issues. The other tools are for policy refresh, disk management, and service configuration."},{"id":164,"domain":"Operating Systems","q":"A technician needs to verify that a system file on a Windows workstation has not been corrupted. Which command should the technician run FIRST?","choices":["sfc /scannow","chkdsk /f","format","gpresult /r"],"correct":0,"explain":"sfc /scannow checks and repairs protected Windows system files. chkdsk is for disk errors, format erases a volume, and gpresult reports policy settings."},{"id":165,"domain":"Security","q":"A company wants users to verify their identity with something they know and something they have before accessing a remote portal. Which of the following BEST meets this requirement?","choices":["A password plus a one-time code from an authenticator app.","A fingerprint scan plus facial recognition on the same mobile phone.","A username plus a security question shown on the login page.","A smart card plus a physical key used to unlock the office door."],"correct":0,"explain":"A password is a knowledge factor and a one-time code from an authenticator app is a possession factor, making this true MFA. The other options either use the same factor type twice or include a control unrelated to portal access."},{"id":166,"domain":"Security","q":"A user cannot log in because their account requires a stronger password after a recent policy update. Which of the following BEST describes the policy setting that would enforce a mix of uppercase, lowercase, numbers, and symbols?","choices":["Password complexity requirements.","Account lockout threshold.","Password history enforcement.","Login time restrictions."],"correct":0,"explain":"Password complexity requirements enforce composition rules such as character variety. Account lockout, password history, and login time restrictions address different access controls."},{"id":167,"domain":"Security","q":"A company wants to ensure failed hard drives containing company data are returned to a vendor without exposing sensitive information. Which of the following should the company require before the drive leaves the building?","choices":["A certificate of destruction or verified sanitization process.","A signed help desk ticket showing the serial number of the failed drive.","A manufacturer warranty form authorizing the replacement.","A shipping receipt showing overnight delivery to the vendor."],"correct":0,"explain":"When media leaves organizational control, the company should require verified sanitization or destruction procedures to ensure sensitive data is not exposed."},{"id":168,"domain":"Operational Procedures","q":"A technician receives a support request to install a software package on multiple department systems. Company policy requires formal approval, testing, and a documented backout plan before implementation. Which process is being followed?","choices":["Change management.","Incident response.","Data classification.","Chain of custody."],"correct":0,"explain":"Change management governs planned modifications to systems and requires approval, testing, documentation, and rollback planning before deployment."},{"id":169,"domain":"Operational Procedures","q":"A technician is assisting a frustrated user who is upset about a recurring issue. Which communication technique is MOST appropriate?","choices":["Listen actively and acknowledge the user's frustration first.","Tell the user the issue is already documented and move straight to diagnostics.","Ask the user to submit a new ticket before continuing the call.","Explain that emotional reactions make troubleshooting take longer."],"correct":0,"explain":"Active listening helps de-escalate the interaction and builds trust, which makes it easier to gather accurate information and resolve the issue."},{"id":170,"domain":"Security","q":"A company wants to ensure employees understand acceptable use of company devices. Which document BEST defines these expectations?","choices":["Acceptable Use Policy.","Disaster Recovery Plan.","Business Continuity Plan.","Service Level Agreement."],"correct":0,"explain":"An Acceptable Use Policy defines what employees may and may not do with company systems and data. The other documents serve different operational purposes."},{"id":171,"domain":"Operational Procedures","q":"A technician needs to document the steps taken to resolve a user\u2019s issue. Which of the following is the BEST place to record this information?","choices":["Record the work performed in the incident ticket.","Send the user an email summary and leave the ticket otherwise unchanged.","Write the resolution in a local notebook for future reference.","Rely on the next shift to infer the steps from the final system state."],"correct":0,"explain":"The ticketing system is the official, centralized record of the issue, actions taken, and outcome. Personal notes or separate emails are not a reliable substitute."},{"id":172,"domain":"Security","q":"A technician must follow a chain of custody procedure. Which of the following BEST describes this requirement?","choices":["Tracking who possessed the evidence and when they handled it.","Listing which employees have administrative rights on each system.","Recording the sequence of troubleshooting steps in the help desk ticket.","Documenting the order in which backup tapes are restored after an outage."],"correct":0,"explain":"Chain of custody documents possession and handling of evidence so it remains admissible and trustworthy during an investigation."},{"id":173,"domain":"Operating Systems","q":"A technician is explaining a technical issue to a non-technical user. Which communication approach is MOST appropriate?","choices":["Explain it in plain language and verify the user understands.","Use precise acronyms so the user becomes familiar with technical terminology.","Keep the explanation brief and avoid questions so the call ends quickly.","Provide the user with the exact error log and ask them to read it later."],"correct":0,"explain":"Support communication should be clear, plain, and user-focused. Confirming understanding helps prevent confusion and repeat issues."},{"id":174,"domain":"Security","q":"A technician needs to ensure that sensitive customer data is not shared outside the organization. Which policy BEST addresses this requirement?","choices":["Data Loss Prevention policy.","Password rotation policy.","Bring Your Own Device policy.","Service Level Agreement."],"correct":0,"explain":"A Data Loss Prevention policy focuses on preventing unauthorized transmission or disclosure of sensitive information outside approved channels."},{"id":175,"domain":"Security","q":"A user receives a phone call from someone claiming to be from the IT department asking for their password to fix an issue. Which type of attack is this?","choices":["Pretexting.","Tailgating.","Shoulder surfing.","Evil twin."],"correct":0,"explain":"Pretexting involves creating a believable story or role to trick someone into revealing information. In this case, the attacker is impersonating IT support."},{"id":176,"domain":"Security","q":"An attacker searches through company trash bins looking for documents containing sensitive information such as passwords, network diagrams, or customer data. Which social engineering technique is being used?","choices":["Dumpster diving.","Tailgating.","Pretexting.","Shoulder surfing."],"correct":0,"explain":"Dumpster diving is the practice of searching discarded materials for useful information. The other techniques involve physical following, impersonation, or visual observation."},{"id":177,"domain":"Security","q":"A user receives an email that appears to be from their bank, urging them to click a link to verify their account information due to suspicious activity. The link directs them to a fake login page. Which attack type does this BEST represent?","choices":["Phishing.","Vishing.","Impersonation.","Baiting."],"correct":0,"explain":"Phishing uses fraudulent electronic messages to trick users into revealing credentials or other sensitive information through fake links or sites."},{"id":178,"domain":"Security","q":"A user reports that a USB flash drive labeled 'Employee Salaries' was found in the parking lot. Curious, they plugged it into their workstation, which immediately began installing unknown software. Which attack method does this BEST describe?","choices":["Baiting.","Pharming.","Shoulder surfing.","Pretexting."],"correct":0,"explain":"Baiting relies on curiosity or temptation, often using a physical object like a USB drive, to get the victim to compromise the system."},{"id":179,"domain":"Security","q":"An attacker sends highly personalized emails to a company executive, references internal projects, and requests confidential documents. This targeted approach is BEST described as:","choices":["Whaling.","Generic phishing.","Spam.","Vishing."],"correct":0,"explain":"Whaling is a highly targeted phishing attack aimed at high-profile individuals such as executives. Generic phishing is broader and less tailored."},{"id":180,"domain":"Operating Systems","q":"A technician needs to identify which Group Policy settings are currently applied to a Windows workstation. Which command should the technician use?","choices":["gpresult /r","sfc /scannow","taskkill /pid","netstat -an"],"correct":0,"explain":"gpresult /r displays Resultant Set of Policy information for the system and user, making it the correct tool for reviewing applied Group Policy settings."},{"id":181,"domain":"Security","q":"A technician wants to make sure that if a smartphone is lost, the user's contacts, photos, and application data can be restored onto a replacement device. Which mobile feature is MOST appropriate?","choices":["Remote wipe","Device backup","Screen-lock timeout","Storage encryption"],"correct":1,"explain":"A device backup service preserves user data so it can be restored to a replacement phone. Remote wipe and encryption protect data, but they do not provide a copy for restoration."},{"id":182,"domain":"Operating Systems","q":"A user is researching products online but does not want browsing history, cookies, or form data saved after the session ends. Which browser feature should the user enable?","choices":["Tracking prevention","Private-browsing mode","Clear browsing data on exit","Disable password autofill"],"correct":1,"explain":"Private-browsing mode prevents the browser from saving the normal session history, cookies, and form data. Clearing data on exit is related, but private mode is the direct feature for this need."},{"id":183,"domain":"Security","q":"A healthcare provider hires a third-party company to destroy decommissioned hard drives. The provider requires formal proof that the drives were destroyed in compliance with policy and regulation. Which document should the provider obtain?","choices":["Chain of custody form","Certificate of destruction","Asset disposal inventory","Sanitization log"],"correct":1,"explain":"A certificate of destruction is the formal documentation proving media was destroyed according to policy. The other records may support the process, but they are not the primary proof of completed destruction."},{"id":184,"domain":"Security","q":"A technician is preparing desktops for donation to a local school. The systems should remain usable, but company data must be removed so it cannot be recovered. Which method is MOST appropriate?","choices":["Degauss the drives","Securely wipe the drives","Physically shred the drives","Delete the partitions"],"correct":1,"explain":"Secure wiping sanitizes the drives while keeping the systems functional. Shredding and degaussing would make reuse impractical or impossible."},{"id":185,"domain":"Software Troubleshooting","q":"A user reports that their browser was redirected to a spoofed banking website. The technician recommends enabling a feature that helps validate name resolution requests and reduce the risk of malicious redirection. Which feature should be used?","choices":["DNS over HTTPS","Private-browsing mode","Pop-up blocker","Password manager"],"correct":0,"explain":"Secure DNS, such as DNS over HTTPS, helps protect DNS queries from tampering and can reduce the risk of malicious redirection. The other features do not address DNS integrity."},{"id":186,"domain":"Operational Procedures","q":"A financial services company is decommissioning old servers. Regulations require that the drives be destroyed so data recovery is impossible, and the company wants documentation from the disposal vendor. Which method is the BEST choice?","choices":["Certified media shredding","Drive secure erase","Standard e-waste recycling","Full-disk reformat"],"correct":0,"explain":"Certified shredding is appropriate when media will not be reused, recovery must be impossible, and documentation is required. Secure erase may allow reuse but is not the strongest option in this scenario."},{"id":187,"domain":"Security","q":"A government agency is retiring workstations that stored classified information. The drives will not be reused, and the data must be destroyed beyond forensic recovery. Which method BEST meets this requirement?","choices":["Secure erase","Low-level format","Physical destruction","Single-pass overwrite"],"correct":2,"explain":"Physical destruction is the strongest choice when media contained classified data and will not be reused. The other methods are forms of sanitization but do not match the requirement as well."},{"id":188,"domain":"Software Troubleshooting","q":"A technician suspects a browser is running slowly because of corrupted temporary internet files. Which action should the technician take FIRST?","choices":["Clear cached browser data","Disable browser extensions","Reset the browser home page","Turn off saved passwords"],"correct":0,"explain":"Clearing cached data removes stale or corrupted temporary files that often cause browser performance problems. The other options may help in some cases, but they are less directly tied to the symptom described."},{"id":189,"domain":"Security","q":"An employee reports that a smartphone was misplaced during travel. Before taking destructive action, the IT department wants to determine whether the phone can be found. Which feature should be used FIRST?","choices":["Remote wipe","Device locator","Storage encryption","Remote lock"],"correct":1,"explain":"A locator service should be used first when the goal is to find a misplaced device. Remote wipe is appropriate later if the device is confirmed lost or stolen."},{"id":190,"domain":"Operational Procedures","q":"A company restores user data from backup to a different computer instead of overwriting the original workstation. Which recovery method is being used?","choices":["In-place restore","Alternate-location restore","Bare-metal recovery","Point-in-time recovery"],"correct":1,"explain":"Restoring data to a different system is an alternate-location restore. In-place restore would overwrite or restore to the original device."},{"id":191,"domain":"Operational Procedures","q":"A small business uses the grandfather-father-son backup rotation scheme. A technician needs to restore files from the most recent daily backup. Which backup set should the technician use?","choices":["Grandfather set","Father set","Son set","Archive set"],"correct":2,"explain":"In the GFS rotation model, the son backup is the daily backup set. The father is typically weekly, and the grandfather is typically monthly."},{"id":192,"domain":"Operational Procedures","q":"A technician wants a backup job that captures only data changed since the last backup of any type. Which backup type should be configured?","choices":["Full backup","Incremental backup","Differential backup","Snapshot backup"],"correct":1,"explain":"An incremental backup saves changes made since the last backup of any kind. Differential backups save changes since the last full backup."},{"id":193,"domain":"Security","q":"A user wants to prevent unauthorized access to a smartphone while still allowing quick sign-in. Which option provides the BEST balance of security and convenience?","choices":["Four-digit PIN","Biometric unlock","Pattern lock","Swipe to unlock"],"correct":1,"explain":"Biometric authentication offers strong security with convenient access. A short PIN or simple pattern is generally easier to compromise, and swipe provides no meaningful protection."},{"id":194,"domain":"Security","q":"A technician wants to ensure corporate email cannot be accessed from smartphones that are rooted or jailbroken. Which control should be enforced?","choices":["MDM compliance policy","Per-app VPN","Device encryption","Geofencing rule"],"correct":0,"explain":"MDM compliance rules can detect rooted or jailbroken devices and block access to corporate resources. The other controls do not directly enforce device integrity requirements."},{"id":195,"domain":"Security","q":"A company wants to prevent users from installing unapproved apps on corporate smartphones. Which control is BEST?","choices":["Application allowlisting","Content filtering","Remote lock","Containerization"],"correct":0,"explain":"Application allowlisting directly restricts which apps can be installed or run. The other controls may help with data or network use but do not specifically stop unauthorized app installation."},{"id":196,"domain":"Operational Procedures","q":"A technician needs to dispose of several SSDs that contain sensitive data. Which method is MOST effective?","choices":["Degauss the drives","Physically destroy the drives","Delete all partitions","Run CHKDSK and reformat"],"correct":1,"explain":"Because SSD wear-leveling can leave data in inaccessible cells, physical destruction is the safest disposal method for highly sensitive SSDs. Degaussing is ineffective against SSDs."},{"id":197,"domain":"Security","q":"A company wants to reuse hard drives but must ensure previously stored data cannot be recovered. Which method should be used?","choices":["Quick format","Secure wipe","Drive shredding","Delete the partition table"],"correct":1,"explain":"Secure wiping sanitizes reusable hard drives without destroying them. Shredding would prevent reuse, and quick formatting does not remove the underlying data securely."},{"id":198,"domain":"Operational Procedures","q":"A technician wants to restore all files that changed since the last full backup. Which backup type should be used?","choices":["Incremental backup","Differential backup","Mirror backup","Synthetic full backup"],"correct":1,"explain":"A differential backup contains all changes since the last full backup. Incremental backups contain only the changes since the last backup of any type."},{"id":199,"domain":"Operational Procedures","q":"A company wants the fastest possible restore time from backup. Which backup strategy is BEST?","choices":["Incremental backups only","Differential backups","Full backups only","GFS rotation"],"correct":2,"explain":"Full backups restore the fastest because the complete data set is contained in one backup. Incremental and differential strategies usually reduce backup size or time, but they complicate restoration."},{"id":200,"domain":"Operating Systems","q":"A technician needs to return a Windows system to a previous working state without removing user documents. Which feature should be used?","choices":["Startup Repair","System Restore","Reset this PC","System Image Recovery"],"correct":1,"explain":"System Restore rolls back system files, settings, and drivers without removing user data. Reset this PC and image recovery are more disruptive options."},{"id":201,"domain":"Security","q":"A technician wants to reduce a workstation's attack surface by disabling unnecessary services and features. Which security principle does this describe?","choices":["Least privilege","Least functionality","Security through obscurity","Defense in depth"],"correct":1,"explain":"Least functionality means removing or disabling unnecessary components to reduce exposure. Least privilege focuses on limiting permissions, not features."},{"id":202,"domain":"Software Troubleshooting","q":"A workstation is repeatedly infected because third-party software is out of date and vulnerable. Which action is MOST important to reduce future infections?","choices":["Reimage the workstation","Apply software patches promptly","Run a full antimalware scan","Remove local administrator rights"],"correct":1,"explain":"Applying patches closes known vulnerabilities that malware often exploits. The other steps may help, but patching directly addresses the root cause given in the scenario."},{"id":203,"domain":"Security","q":"A technician wants to stop unapproved executables from launching on a workstation. Which method is BEST?","choices":["Least privilege","Application allowlisting","Antivirus scanning","Patch management"],"correct":1,"explain":"Application allowlisting is the direct control used to permit only approved applications to run. The other controls improve security but do not directly prevent all unapproved software execution."},{"id":204,"domain":"Security","q":"A user often downloads programs from unknown websites. Which Windows feature can help warn the user about suspicious downloads and untrusted applications?","choices":["SmartScreen","Windows Firewall","BitLocker","User Account Control"],"correct":0,"explain":"SmartScreen helps warn users about malicious or untrusted downloads and websites. The other features are important security controls but are not designed primarily for download reputation checking."},{"id":205,"domain":"Security","q":"A company wants corporate data on mobile devices kept separate from personal apps and files. Which feature should be used?","choices":["Remote wipe","Containerization","Device locator","Per-app VPN"],"correct":1,"explain":"Containerization separates business data and policies from the user's personal environment. Remote wipe and per-app VPN may be used alongside it, but they do not create that separation by themselves."},{"id":206,"domain":"Security","q":"A user wants to prevent installed apps from accessing GPS data unless explicitly allowed. Which setting should be adjusted?","choices":["Background app refresh","Location permissions","Bluetooth discovery","Notification settings"],"correct":1,"explain":"Location permissions determine whether apps can use location services such as GPS. The other settings do not directly control access to location data."},{"id":207,"domain":"Operational Procedures","q":"A technician wants to ensure backups remain available even if ransomware encrypts the local network share. Which backup approach is MOST effective?","choices":["Cloud-synced folder backup","Offline backup copy","Shadow copies on the workstation","Mapped drive backup"],"correct":1,"explain":"Offline backups are isolated from the affected system and are much less likely to be encrypted by ransomware. Online or mapped backups can be impacted if the malware reaches them."},{"id":208,"domain":"Security","q":"A technician wants to verify that the system trusts only approved certificate authorities when users browse secure websites. Which component should be checked?","choices":["TLS cipher suite list","Trusted root certificate store","Browser security zone settings","Certificate revocation cache"],"correct":1,"explain":"The trusted root certificate store determines which certificate authorities the system will trust. The other options affect secure browsing, but they do not define trust anchors."},{"id":209,"domain":"Security","q":"A technician needs to dispose of paper documents containing confidential customer information. Which method is MOST appropriate?","choices":["Locked recycling bin","Cross-cut shredding","Off-site file storage","Scanning before disposal"],"correct":1,"explain":"Cross-cut shredding is an appropriate destruction method for sensitive paper records. The other options do not securely destroy the documents."},{"id":210,"domain":"Operational Procedures","q":"A company wants to ensure backup files cannot be read by unauthorized people if the backup media is lost or stolen. Which control is BEST?","choices":["Encrypt the backup sets","Hide the backup directory","Password-protect the share","Restrict NTFS permissions"],"correct":0,"explain":"Encrypting the backups protects the data even if the media or repository is exposed. Permissions and obscurity help in normal operations, but encryption protects the backup itself at rest."},{"id":211,"domain":"Software Troubleshooting","q":"A user reports that their smartphone screen stays locked in portrait mode, even when they rotate the device to landscape while watching videos. Which setting is MOST likely the cause?","choices":["Rotation lock is enabled.","The video app is set to picture-in-picture only.","Screen auto-rotate is disabled.","Display zoom is overriding orientation changes."],"correct":2,"explain":"If auto-rotate is disabled, the display will stay fixed even when the user rotates the phone."},{"id":212,"domain":"Operational Procedures","q":"A junior admin downloads a script from an unverified website to automate software updates. Shortly after running it, the workstation begins crashing and showing signs of infection. What scripting concern does this illustrate?","choices":["The script executed with elevated privileges.","The execution policy was bypassed for the session.","The script was run from an untrusted source and introduced malware.","The script used a deprecated command syntax."],"correct":2,"explain":"Running scripts from untrusted sources can introduce malware, especially when the code has not been verified."},{"id":213,"domain":"Software Troubleshooting","q":"A user reports unusually high data usage on their mobile plan, even though they haven't changed their browsing or app habits. The technician suspects that a background app is sending data without the user's knowledge. Which symptom does this MOST likely represent?","choices":["Unauthorized background data exfiltration.","A stalled cloud backup retry loop.","Excessive app updates over cellular data.","Wi\u2011Fi assist shifting traffic to mobile data."],"correct":0,"explain":"Large unexplained mobile data usage can indicate an app is exfiltrating data in the background."},{"id":214,"domain":"Software Troubleshooting","q":"A user reports that their smartphone has become very sluggish when opening apps and browsing the web. The device has plenty of storage space, and the battery is healthy. The technician runs a speed test and notices that the connection is unstable. Which is the MOST likely cause of the issue?","choices":["Weak or unstable Wi\u2011Fi connectivity.","Insufficient free storage for app caching.","A resource-heavy background sync process.","A browser extension causing rendering delays."],"correct":0,"explain":"If the connection is unstable, apps and web content can appear slow even when the device hardware is fine."},{"id":215,"domain":"Security","q":"A user complains that their smartphone frequently displays 'Your device is infected - click here to fix' messages when browsing the web. The technician determines that no legitimate antivirus app is installed, and the warnings disappear when the browser is closed. What is the MOST likely explanation?","choices":["A legitimate mobile AV app warning about detected malware.","A rogue security pop-up generated by a malicious site.","A browser warning about an expired certificate.","An MDM compliance alert from the corporate portal."],"correct":1,"explain":"Pop-up infection warnings that disappear when the browser closes are commonly fake alerts from malicious sites."},{"id":216,"domain":"Operational Procedures","q":"A technician writes a script that automatically deletes old log files at startup. After testing, they notice the script also removed important configuration files. What scripting risk does this BEST represent?","choices":["The script lacked execute permissions.","The script unintentionally deleted critical files.","The script used the wrong interpreter path.","The script failed because of an invalid variable type."],"correct":1,"explain":"Poorly written scripts can accidentally modify or delete important files if the logic is too broad."},{"id":217,"domain":"Operational Procedures","q":"During an internal security investigation, a technician creates a forensic image of a user's hard drive before beginning analysis. The original drive is stored securely, and all steps are carefully documented. Which concept is MOST closely related to this process?","choices":["Chain of custody and evidence preservation.","Software license auditing.","Acceptable use enforcement.","Backup retention compliance."],"correct":0,"explain":"Forensic imaging, secure storage, and documentation are tied to preserving evidence integrity and maintaining chain of custody."},{"id":218,"domain":"Operational Procedures","q":"An employee uses their work computer to stream pirated movies during lunch breaks. The IT security team flags the activity and reminds the employee that using company resources for illegal or non-business purposes violates organizational rules. Which policy is being enforced in this scenario?","choices":["Privacy policy.","Data retention policy.","Acceptable use policy (AUP).","Non-disclosure agreement (NDA)."],"correct":2,"explain":"An Acceptable Use Policy defines what employees may and may not do with company systems and resources."},{"id":219,"domain":"Operational Procedures","q":"A system administrator writes a script that runs inside a web browser to automate form filling on an internal company portal. Which script file type would MOST likely be used for this purpose?","choices":[".js.",".ps1.",".py.",".sh."],"correct":0,"explain":"JavaScript files commonly run in a browser context to automate or manipulate web-page behavior."},{"id":220,"domain":"Operational Procedures","q":"An IT administrator discovers that an employee shared internal design documents with a competitor. The employee had previously signed an agreement stating they would not disclose confidential company information. Which type of agreement has the employee most likely violated?","choices":["Acceptable use policy (AUP).","End-user license agreement (EULA).","Data retention policy.","Non-disclosure agreement (NDA)."],"correct":3,"explain":"An NDA prohibits sharing confidential information outside the organization."},{"id":221,"domain":"Software Troubleshooting","q":"A user reports that their smartphone apps are crashing immediately after being launched. The device has plenty of storage and a healthy battery, but the technician discovers the apps haven't been patched in several months. What is the MOST likely cause?","choices":["Outdated application versions causing instability.","A failed mobile profile enrollment.","A weak cellular signal during app launch.","Corrupted Bluetooth service dependencies."],"correct":0,"explain":"Apps that have not been updated may become unstable or incompatible with newer OS components."},{"id":222,"domain":"Security","q":"A user reports that their smartphone shows an unusual spike in network traffic and has reached its data usage limit much earlier than normal. The technician checks running processes and suspects a malicious app is transmitting data in the background. Which symptom BEST describes this issue?","choices":["High network traffic from data exfiltration.","A large cloud backup running over cellular.","Normal roaming traffic on LTE.","Repeated captive portal sign-in attempts."],"correct":0,"explain":"A malicious app transmitting data in the background most closely matches data exfiltration."},{"id":223,"domain":"Software Troubleshooting","q":"A user complains that their Android device randomly reboots several times a day after installing a large game. Storage is nearly full, and RAM usage is high. What is the BEST first step?","choices":["Clear paired Bluetooth devices and retest.","Uninstall unused apps and free storage space.","Reset adaptive brightness settings.","Replace the charging cable and adapter."],"correct":1,"explain":"Near-full storage and high memory usage can destabilize the device, so freeing space is the best first step."},{"id":224,"domain":"Software Troubleshooting","q":"An iOS user reports that notifications have stopped appearing for a messaging app, even though messages are still received. What is the MOST likely cause?","choices":["Focus mode is suppressing alerts globally.","Notification permissions are disabled for the app.","Background app refresh is turned off.","The ringer volume is set too low for banners."],"correct":1,"explain":"If messages arrive but no notifications appear, the app\u2019s notification permissions are a likely cause."},{"id":225,"domain":"Software Troubleshooting","q":"A user reports that a specific app freezes whenever they try to open a downloaded file. Other apps work fine. Which action is MOST appropriate?","choices":["Reinstall the entire mobile OS.","Clear the app cache/data and retest.","Reset network settings.","Remove and re-add the email account."],"correct":1,"explain":"If only one app freezes when opening files, clearing that app\u2019s cache or data is an appropriate first fix."},{"id":226,"domain":"Operational Procedures","q":"A company wants to limit how long user activity logs are stored on its systems to meet legal requirements. Which concept does this MOST directly relate to?","choices":["Acceptable use policy (AUP).","Data retention policy.","Privacy notice.","Non-disclosure agreement (NDA)."],"correct":1,"explain":"A data retention policy defines how long logs and other records are stored to meet legal or business requirements."},{"id":227,"domain":"Security","q":"A user wants to prevent mobile apps from accessing their microphone unless absolutely necessary. Which setting should they review?","choices":["Background app refresh settings.","Microphone app permissions.","Notification access privileges.","Bluetooth accessory permissions."],"correct":1,"explain":"Microphone permissions determine which apps can access the device microphone."},{"id":228,"domain":"Operational Procedures","q":"An employee installs a single-user licensed application on both their work PC and a shared lab PC used by multiple colleagues. Which concept is MOST likely being violated?","choices":["End-user license agreement (EULA).","Acceptable use policy (AUP).","Master service agreement (MSA).","Data retention schedule."],"correct":0,"explain":"Installing a single-user license on multiple systems violates the software license terms in the EULA."},{"id":229,"domain":"Operational Procedures","q":"A company wants to deploy software to hundreds of workstations without needing to activate each one individually with a unique product key. Which licensing model is MOST appropriate?","choices":["Retail license.","Volume license.","Trial license.","Named-user subscription."],"correct":1,"explain":"Volume licensing is designed for centralized deployment across many systems."},{"id":230,"domain":"Operational Procedures","q":"A technician writes a script that checks disk space and emails an alert if free space drops below 10%. This script runs every night without manual input. What is this an example of?","choices":["Automation.","Manual configuration.","Remote administration.","Image deployment."],"correct":0,"explain":"A script that runs on a schedule without manual input is an example of automation."},{"id":231,"domain":"Operational Procedures","q":"A script needs to be used on both Linux and macOS systems to automate log cleanup. Which script type is MOST appropriate?","choices":[".ps1 PowerShell script.",".bat batch file.",".sh shell script.",".vbs VBScript file."],"correct":2,"explain":"Shell scripts are the most appropriate common option for Linux and macOS systems."},{"id":232,"domain":"Operational Procedures","q":"A technician runs a new PowerShell script with administrator privileges on a production server without testing it in a lab. The script accidentally disables a critical service. Which BEST practice was ignored?","choices":["Using comments to document the script.","Testing in a non-production environment first.","Digitally signing the script before use.","Scheduling the task during a maintenance window."],"correct":1,"explain":"Scripts should be tested outside production first so mistakes do not disrupt live systems."},{"id":233,"domain":"Security","q":"A company requires all corporate smartphones to use full-device encryption. What is the PRIMARY benefit of this control?","choices":["Protects data at rest if the device is lost or stolen.","Blocks malicious links in email automatically.","Improves application response time under load.","Prevents users from changing screen-lock settings."],"correct":0,"explain":"Full-device encryption protects stored data if someone gains physical possession of the phone."},{"id":234,"domain":"Security","q":"A technician wants to ensure that corporate email and documents can be wiped from a lost smartphone without affecting the user's personal photos and apps. Which technology is MOST appropriate?","choices":["Full device factory reset.","MDM remote lock.","Containerization or work profile.","Geofencing with conditional access."],"correct":2,"explain":"Containerization separates business data from personal data so corporate content can be wiped independently."},{"id":235,"domain":"Security","q":"A user frequently connects to public Wi-Fi networks while traveling for work. Which security control BEST protects their corporate data in transit?","choices":["Using a VPN connection.","Disabling Wi\u2011Fi auto-join.","Using private browsing mode.","Enforcing a shorter screen timeout."],"correct":0,"explain":"A VPN encrypts traffic across untrusted networks such as public Wi\u2011Fi."},{"id":236,"domain":"Security","q":"A company wants to prevent users from installing apps from sources other than the official app store. Which setting should be enforced?","choices":["Require application allowlisting in MDM.","Disable sideloading or unknown sources.","Force Bluetooth sharing off.","Block browser pop-ups system-wide."],"correct":1,"explain":"Disabling unknown sources prevents users from installing apps from outside the official store."},{"id":237,"domain":"Security","q":"A messaging app requests access to the user\u2019s contacts, microphone, and location. The user only wants to share contacts. What is the BEST recommendation?","choices":["Grant all permissions so the app functions correctly.","Deny all permissions and remove the app immediately.","Only allow the Contacts permission.","Enable private browsing before opening the app."],"correct":2,"explain":"The safest approach is to grant only the permission the app actually needs for the user\u2019s intended use."},{"id":238,"domain":"Software Troubleshooting","q":"A user reports that after a recent OS update, their mobile banking app no longer opens and displays an 'incompatible OS version' error. What is the BEST explanation?","choices":["The app has not been updated for the new OS version.","The device battery is below the app\u2019s launch threshold.","The bank has disabled Wi\u2011Fi sign-ins temporarily.","The phone\u2019s secure enclave needs to be reset."],"correct":0,"explain":"After an OS update, apps may fail until the developer updates them for compatibility."},{"id":239,"domain":"Operational Procedures","q":"A technician wants a Python script to run every day at 2 AM on a Linux server to rotate logs. Which tool is MOST appropriate?","choices":["Task Scheduler.","crontab.","at.","systemctl timer unit."],"correct":1,"explain":"crontab is the standard recurring scheduler for daily tasks on Linux."},{"id":240,"domain":"Operational Procedures","q":"A user is concerned about how a new mobile app will collect and share their personal information. Which document should they review BEFORE installing the app?","choices":["Acceptable use policy.","Privacy policy.","Terms of service for the app store.","Mobile OS EULA."],"correct":1,"explain":"The privacy policy explains how the app collects, uses, stores, and shares personal data."},{"id":241,"domain":"Software Troubleshooting","q":"You're cleaning a stubborn malware infection on a Windows 10 Home desktop. You verified symptoms, isolated the system, and disabled System Restore. After updating definitions, a normal-mode scan reports \"clean,\" but suspicious scheduled tasks and registry run keys keep reappearing after reboot. What is the MOST appropriate next action?","choices":["Reconnect the PC to the network and rely on repeated quick scans.","Restore the system and assume the prior scan result was enough.","Close the ticket after warning the user and monitoring the system.","Use Safe Mode or an offline scanner."],"correct":3,"explain":"Persistence mechanisms can hide from normal-mode scanners. The next best step in the malware-removal process when suspicious activity continues is to boot into Safe Mode or an offline/preinstallation environment and run updated anti-malware tools. This reduces the chance that malicious processes or drivers are active and interfering with cleanup. Rejoining the network or closing the ticket is premature, and System Restore can reintroduce malware."},{"id":242,"domain":"Software Troubleshooting","q":"A Mac user reports that an application installed from a third-party website is not appearing in Launchpad, even though the installer ran successfully. The application was provided in a .dmg file. Which of the following is the MOST likely cause?","choices":["The app bundle stayed on the mounted .dmg instead of /Applications.","The mounted .dmg requires a reboot before Launchpad refreshes.","Gatekeeper moved the application into a temporary user path.","Launchpad only shows software installed through the App Store."],"correct":0,"explain":"Many macOS apps distributed as .dmg files are just application bundles sitting on a mounted disk image. If the user runs the app directly from the .dmg instead of dragging it into /Applications, it will not be properly installed and may not show in Launchpad. The solution is to copy the app bundle into /Applications."},{"id":243,"domain":"Security","q":"A retail company is considering adding an AI chatbot to their public-facing website to assist with customer questions. The chatbot would be trained using both public FAQs and internal customer support transcripts that contain sensitive loyalty account data. What is the BEST way to address privacy and data security concerns during implementation?","choices":["Use a public chatbot and depend on content filtering controls alone.","Train on all support transcripts and rely on a consent banner.","Train only on public FAQs and route account issues through secure systems.","Encrypt the prompt logs but still retain the full sensitive training set."],"correct":2,"explain":"Sensitive account data should be kept out of general AI training sets to avoid leakage and privacy violations. The safest approach is to train the chatbot only on public, non-sensitive content and route account-specific questions through secure, authenticated channels where data access is controlled and audited."},{"id":244,"domain":"Security","q":"During an internal audit, the IT team discovers several older, internet-connected devices running outdated firmware that is no longer supported by the manufacturer. These devices cannot be updated but still perform critical business functions on the internal network. What vulnerability does this scenario BEST describe?","choices":["EOL.","Unsupported but still network-attached non-compliant system.","Unprotected internet-connected device with no vendor support.","Previously unknown exploit against a still-supported device."],"correct":0,"explain":"Devices that are no longer supported by the manufacturer and cannot receive updates are considered end-of-life (EOL). EOL systems pose ongoing security risk because vulnerabilities will not be patched, even when discovered and exploited."},{"id":245,"domain":"Operating Systems","q":"You must migrate 1.6 TB of departmental home folders from \\oldfs\\homes to \\newfs\\homes over a flaky WAN link. Requirements: preserve NTFS permissions, ownership, and timestamps; synchronize deletions to keep targets identical; resume after network hiccups; and produce a detailed log. Which command BEST meets all requirements in one pass?","choices":["xcopy \\oldfs\\homes \\newfs\\homes /E /K /O /H /R /C.","robocopy \\oldfs\\homes \\newfs\\homes /MIR /COPY:DATSOU /LOG:C:\\mig\\copy.log.","robocopy \\oldfs\\homes \\newfs\\homes /S /COPY:DAT /R:3 /W:5.","md \\newfs\\homes && robocopy \\oldfs\\homes \\newfs\\homes /E /R:3."],"correct":1,"explain":"Robocopy with /MIR mirrors the tree (including deletions), /COPY:DATSOU preserves data, attributes, timestamps, security, owner, and auditing, /R and /W handle retries on a flaky link, and /LOG outputs a detailed log. This single command most fully meets the migration requirements."},{"id":246,"domain":"Operating Systems","q":"A domain-joined laptop can browse the web on office Wi-Fi, and ping filesrv01 resolves to the correct IP. However, attempting \\filesrv01\\dept fails immediately with \"The network path was not found.\" The same user can access the share over VPN from home. On the laptop, the current network profile shows Public. What is the BEST fix on the client?","choices":["Add a persistent static route to the file server subnet on the client.","Switch the network profile to Private.","Replace internal DNS with public resolvers to refresh the SMB name lookup.","Configure a proxy bypass list for the internal file server hostname."],"correct":1,"explain":"On Windows, firewall rules for file and printer sharing are often disabled on Public networks. Marking the network as Private and ensuring File and Printer Sharing and Network Discovery are allowed for that profile enables SMB access to internal shares. DNS and routing are already working, as the name resolves and the share works over VPN."},{"id":247,"domain":"Security","q":"A help desk notes that many 802.11n/ac clients on an older SSID connect but report low speeds. The AP security is set to WPA/WPA2 mixed mode with TKIP+AES to \"support legacy gear.\" No hardware changes are allowed. What single change will MOST improve performance and security for modern clients?","choices":["Keep WPA/WPA2 mixed mode and rotate the shared key more often.","Use WPA2 or WPA3 with AES-CCMP only.","Enable Kerberos directly on the access point to speed authentication.","Move to TKIP-only because it may reduce encryption overhead."],"correct":1,"explain":"TKIP limits data rates and is considered insecure. Using WPA2 (or WPA3) with AES-CCMP only removes legacy TKIP constraints and improves both performance and security for modern clients, even without changing hardware."},{"id":248,"domain":"Software Troubleshooting","q":"A PC recently showed fake security warnings and now Windows Updates fail with various codes. AV scans in normal mode show clean, but services won't stay started and update attempts roll back. Which is the BEST next step to remediate?","choices":["Download the cumulative update p
