ver Windows Pro for Workstations in this standardization effort, despite the workstation users not needing every enterprise feature?","choices":["Standardizing on a single edition across the whole organization simplifies licensing, deployment, and support, even if some enterprise features go unused by regular office workers","Windows Pro for Workstations is always cheaper than Windows Enterprise regardless of deployment scale","Windows Enterprise cannot be installed on high-end workstation-class hardware at all","Standardization has no bearing on deployment or support complexity for an IT department"],"correct":0,"explain":"Standardizing on a single Windows edition like Enterprise across the organization, even though some enterprise features go unused by regular office workers, simplifies licensing agreements, deployment imaging, and ongoing support processes for the IT department, compared to managing multiple different editions.","sub":"1.3","source":"original-2026-batch"},{"id":373,"domain":"Operating Systems","q":"A company's compliance requirements mandate that all company laptops support Credential Guard to protect against credential theft attacks, a security feature not available on Windows Home or standard Windows Pro editions in the same way it is on Enterprise. What should the company do to meet this specific compliance requirement?","choices":["License and deploy Windows Enterprise on the affected laptops, since Credential Guard is a feature specific to that edition tier","Continue using Windows Home, since Credential Guard has no bearing on actual security posture","Purchase third-party antivirus software instead, since it provides an identical feature to Credential Guard","Disable all security features entirely, since Credential Guard cannot realistically be implemented on any edition"],"correct":0,"explain":"Meeting a compliance requirement specifically calling for Credential Guard, an advanced security feature tied to the Enterprise edition tier, requires licensing and deploying Windows Enterprise on the affected laptops rather than relying on Windows Home or standard Pro, which do not offer the same level of that specific protection.","sub":"1.3","source":"original-2026-batch"},{"id":374,"domain":"Operating Systems","q":"A user reports that their computer is running extremely slowly, and a technician wants to see exactly which processes are consuming the most CPU and memory in real time before deciding on a fix. Which built-in Windows tool would the technician use first?","choices":["Task Manager","Disk Cleanup","Character Map","Windows Fax and Scan"],"correct":0,"explain":"Task Manager displays real-time information about which processes are consuming the most CPU and memory, making it the appropriate first tool for a technician diagnosing a slow computer before deciding on a specific fix.","sub":"1.4","source":"original-2026-batch"},{"id":375,"domain":"Operating Systems","q":"A technician suspects that a specific system file has become corrupted, causing intermittent application crashes, and wants to scan and automatically repair protected system files from the command line. Which built-in Windows utility should the technician run?","choices":["System File Checker (sfc /scannow)","Disk Defragmenter","Snipping Tool","Windows Fax and Scan"],"correct":0,"explain":"System File Checker, run via the 'sfc /scannow' command, scans protected system files for corruption and attempts to automatically repair any that are found to be damaged, which directly addresses a suspected corrupted system file causing application crashes.","sub":"1.4","source":"original-2026-batch"},{"id":376,"domain":"Operating Systems","q":"A user's laptop connects to the office Wi-Fi network but shows an IP address in the 169.254.x.x range and cannot reach any network resources. What does this specific IP address range indicate?","choices":["The laptop failed to receive a valid address from the DHCP server and fell back to an APIPA address","The laptop is correctly configured and simply needs a firewall rule adjustment","The laptop's network adapter has been permanently disabled","The laptop's IP address is a normal static configuration set by IT"],"correct":0,"explain":"An IP address in the 169.254.x.x range is an APIPA (Automatic Private IP Addressing) address, which Windows assigns itself when it fails to receive a valid address from a DHCP server, indicating a failure in the DHCP lease process rather than a properly functioning network connection.","sub":"1.5","source":"original-2026-batch"},{"id":377,"domain":"Operating Systems","q":"A technician needs to view a Windows computer's current IP address, subnet mask, and default gateway from the command line to troubleshoot a connectivity issue. Which command should the technician run?","choices":["ipconfig","tracert","netstat","nslookup"],"correct":0,"explain":"The 'ipconfig' command displays the current IP address, subnet mask, and default gateway configuration for a Windows computer's network adapters, making it the appropriate tool for quickly viewing this basic network configuration information.","sub":"1.5","source":"original-2026-batch"},{"id":378,"domain":"Operating Systems","q":"A user wants their Windows computer to be discoverable by other devices and to allow file and printer sharing while connected to their home network, but not while connected to a public coffee shop Wi-Fi network. What Windows networking feature allows this location-based behavior?","choices":["Network location profiles (Private vs. Public network settings)","Windows Defender Firewall being permanently disabled","A VPN connection that must always remain active","The Windows Update service"],"correct":0,"explain":"Windows network location profiles, specifically the Private and Public network settings, allow a computer to automatically apply different sharing and discoverability behavior depending on which type of network it is connected to, enabling sharing on a trusted home network while restricting it on an untrusted public network.","sub":"1.5","source":"original-2026-batch"},{"id":379,"domain":"Operating Systems","q":"A technician wants to verify that a Windows computer can successfully resolve a domain name to an IP address, in order to rule out a DNS-related issue as the cause of a user's inability to reach a website. Which command would help diagnose this?","choices":["nslookup","ipconfig /release","format","chkdsk"],"correct":0,"explain":"The 'nslookup' command queries DNS servers to resolve a domain name to its corresponding IP address, allowing a technician to directly test and verify DNS resolution, which helps isolate whether a connectivity issue is DNS-related.","sub":"1.5","source":"original-2026-batch"},{"id":380,"domain":"Operating Systems","q":"A user's laptop is configured with a static IP address that conflicts with another device already using that same address on the network, causing intermittent connectivity problems for both devices. What is the most straightforward long-term fix for this configuration issue?","choices":["Configure the laptop to obtain an IP address automatically via DHCP instead of using a static address","Physically disconnect the other conflicting device from the network permanently","Reinstall the entire operating system on the laptop","Replace the laptop's network adapter with new hardware"],"correct":0,"explain":"Configuring the laptop to obtain an IP address automatically via DHCP, rather than continuing to use a conflicting static address, is the most straightforward long-term fix, since it allows the DHCP server to assign a unique, available address and avoid future conflicts.","sub":"1.5","source":"original-2026-batch"},{"id":381,"domain":"Operating Systems","q":"A remote employee needs to securely access internal company file shares and applications from home as if they were physically connected to the office network. What networking technology is designed to provide this secure remote connectivity?","choices":["A virtual private network (VPN) connection","A standard, unencrypted public Wi-Fi connection","Bluetooth pairing with the office router","A direct dial-up modem connection"],"correct":0,"explain":"A virtual private network (VPN) connection creates an encrypted tunnel between the remote employee's device and the company network, allowing secure access to internal file shares and applications as though the employee were physically connected to the office network.","sub":"1.5","source":"original-2026-batch"},{"id":382,"domain":"Operating Systems","q":"A technician needs to configure a Windows computer's network adapter to use a specific, manually assigned IP address rather than obtaining one automatically, because the computer hosts a service that other devices need to reliably reach at a consistent address. What type of IP configuration should the technician apply?","choices":["A static IP address configuration","A DHCP-assigned address that changes periodically","An APIPA address configuration","A loopback address configuration"],"correct":0,"explain":"Configuring a static IP address ensures the computer always uses the same, manually assigned address, which is appropriate for a device hosting a service that other devices need to reliably reach at a consistent, unchanging address, unlike a DHCP-assigned address that could change over time.","sub":"1.5","source":"original-2026-batch"},{"id":383,"domain":"Operating Systems","q":"A user reports that after connecting their laptop to a new Wi-Fi network, they can browse some websites but not others, and pinging by IP address works fine while pinging by domain name fails. What is the most likely underlying issue?","choices":["A DNS server configuration problem preventing domain name resolution","A completely disconnected Ethernet cable, since this is a wireless connection","A failed graphics card, unrelated to networking","An expired antivirus software license"],"correct":0,"explain":"Since pinging by IP address works but pinging by domain name fails, this pattern strongly points to a DNS server configuration problem preventing domain name resolution, rather than a more fundamental connectivity issue like a cable, hardware, or unrelated software problem.","sub":"1.5","source":"original-2026-batch"},{"id":384,"domain":"Operating Systems","q":"A company wants employees' Windows computers to automatically apply stricter firewall rules and disable network discovery whenever they connect to networks outside the office, such as at a coffee shop or airport. Which Windows network setting supports this automatic behavior change?","choices":["Setting the network as 'Public' in the network location profile settings","Disabling Windows Update entirely on affected computers","Uninstalling the network adapter driver when off-site","Changing the computer's hostname when connecting elsewhere"],"correct":0,"explain":"Setting a network's location profile to 'Public' automatically applies stricter firewall rules and disables network discovery and sharing, which is the appropriate configuration for networks outside a trusted office environment, such as a coffee shop or airport.","sub":"1.5","source":"original-2026-batch"},{"id":385,"domain":"Operating Systems","q":"A technician troubleshooting a network issue wants to see the full path, including each intermediate router hop, that packets take from the user's computer to a remote website, in order to identify where along the route a delay or failure is occurring. Which command should the technician use?","choices":["tracert","ipconfig /all","netdom","gpupdate"],"correct":0,"explain":"The 'tracert' (trace route) command displays each intermediate router hop that packets take on their way to a destination, along with the response time at each hop, helping a technician pinpoint exactly where along the route a delay or failure is occurring.","sub":"1.5","source":"original-2026-batch"},{"id":386,"domain":"Operating Systems","q":"A user's Windows computer is set to obtain an IP address automatically, but after an extended network outage, the computer still shows an outdated cached IP configuration once the network comes back online. Which two commands, run in sequence, would help the computer release its old lease and request a fresh one?","choices":["ipconfig /release followed by ipconfig /renew","format followed by chkdsk","netstat followed by nslookup","gpupdate followed by gpresult"],"correct":0,"explain":"Running 'ipconfig /release' followed by 'ipconfig /renew' releases the computer's current, potentially outdated DHCP lease and then requests a fresh IP address configuration from the DHCP server, which is the appropriate pair of commands to resolve a stale cached network configuration after an outage.","sub":"1.5","source":"original-2026-batch"},{"id":387,"domain":"Operating Systems","q":"A small office wants to share a single folder on one employee's Windows computer with several coworkers on the same local network, without setting up a dedicated file server. What built-in Windows feature allows this direct folder sharing between computers on the same network?","choices":["Windows file and folder sharing (network sharing) settings","Windows Defender Firewall, configured to block all traffic","Disk Cleanup, configured to run automatically","Windows Update, configured for automatic installation"],"correct":0,"explain":"Windows' built-in file and folder sharing settings allow a specific folder on one computer to be shared directly with other computers on the same local network, without requiring a dedicated file server, making it appropriate for a small office wanting simple, direct sharing.","sub":"1.5","source":"original-2026-batch"},{"id":388,"domain":"Security","q":"A home user sets up a new wireless router and wants to use the strongest available Wi-Fi encryption standard to protect their network traffic from eavesdropping. Which of the following options provides the strongest security?","choices":["WPA3","WEP","An open network with no password","WPA using TKIP"],"correct":0,"explain":"WPA3 is the most current and strongest Wi-Fi encryption standard among the choices listed, offering significantly improved security over the older, now-broken WEP standard and the earlier WPA using TKIP.","sub":"2.2","source":"original-2026-batch"},{"id":389,"domain":"Security","q":"A small business wants visiting customers to have internet access through Wi-Fi without giving them any access to the internal business network resources like file servers and printers. What configuration achieves this separation?","choices":["A separate guest wireless network isolated from the internal network","A single shared wireless network with no isolation configured","Disabling Wi-Fi entirely for all users, including customers","Sharing the administrator password with every customer"],"correct":0,"explain":"Configuring a separate guest wireless network, isolated from the internal business network, allows visiting customers to access the internet without being able to reach internal resources like file servers and printers, maintaining a clear security boundary.","sub":"2.2","source":"original-2026-batch"},{"id":390,"domain":"Security","q":"An IT administrator wants to prevent unauthorized devices from connecting to the office Wi-Fi network even if they somehow learn the correct password, by only allowing pre-approved device hardware addresses to connect. What wireless security feature accomplishes this?","choices":["MAC address filtering","Disabling the wireless router's power entirely","Changing the Wi-Fi channel to a less common frequency","Renaming the SSID to something less obvious"],"correct":0,"explain":"MAC address filtering allows an administrator to specify a list of approved device hardware addresses, preventing unauthorized devices from connecting to the wireless network even if they know the correct password, since their MAC address is not on the approved list.","sub":"2.2","source":"original-2026-batch"},{"id":391,"domain":"Security","q":"A technician configuring a new wireless router disables the SSID broadcast, believing this will meaningfully improve network security by hiding the network's name from view. What is the actual security value of this configuration change?","choices":["Minimal, since the network can still be discovered using freely available wireless scanning tools, and hiding the SSID mainly just adds a small inconvenience","It provides complete, unbreakable protection against any unauthorized connection attempt","It automatically encrypts all wireless traffic on the network","It permanently prevents the network from being detected by any device whatsoever"],"correct":0,"explain":"Disabling SSID broadcast provides only minimal security benefit, since the network can still be discovered using freely available wireless scanning tools that detect hidden networks; it should not be relied upon as a primary security control in place of strong encryption and authentication.","sub":"2.2","source":"original-2026-batch"},{"id":392,"domain":"Security","q":"A company sets up its wireless network to require both a username/password combination tied to each individual employee's account and a certificate, using a centralized authentication server, rather than a single shared network password. What type of wireless security configuration does this represent?","choices":["Enterprise (802.1X) authentication using a RADIUS server","A simple pre-shared key (PSK) shared identically among all users","An open network requiring no authentication at all","WEP encryption using a single static key"],"correct":0,"explain":"Requiring individual employee credentials and certificate-based authentication through a centralized authentication server, rather than a single shared password, describes enterprise (802.1X) wireless authentication using a RADIUS server, which provides stronger, individually accountable access control than a simple shared pre-shared key.","sub":"2.2","source":"original-2026-batch"},{"id":393,"domain":"Security","q":"A network administrator wants to segment wireless traffic for different departments onto logically separate networks, even though all departments share the same physical wireless access points, so that a compromise in one department's devices doesn't directly expose another department's traffic. What networking technology enables this logical separation?","choices":["VLANs (Virtual Local Area Networks) applied to the wireless network","Physically installing entirely separate access points for every single department","Disabling Wi-Fi entirely except for one shared open network","Changing only the wireless password for each department"],"correct":0,"explain":"VLANs allow wireless traffic from different departments to be logically segmented onto separate virtual networks, even when sharing the same physical wireless access points, so that a security issue affecting one department's devices does not directly expose traffic belonging to another department.","sub":"2.2","source":"original-2026-batch"},{"id":394,"domain":"Security","q":"A technician discovers that an office's wireless router is still using its factory-default administrator username and password, which are widely published online for that specific router model. What is the most important immediate remediation step?","choices":["Change the router's administrator credentials to a strong, unique username and password","Leave the credentials unchanged, since router settings rarely matter for overall security","Disable the router's Wi-Fi entirely as the only possible fix","Replace the entire router with new hardware, since credentials cannot be changed"],"correct":0,"explain":"Changing the router's administrator credentials away from the widely published factory defaults is the most important immediate remediation step, since leaving default credentials in place would allow anyone who looks up that router model's default password to gain full administrative control over the network.","sub":"2.2","source":"original-2026-batch"},{"id":395,"domain":"Security","q":"A user's computer files have all been renamed with a strange file extension, and a message on screen demands payment in cryptocurrency to restore access to the files. What type of malware is described in this scenario?","choices":["Ransomware","A boot sector virus","Spyware","A worm"],"correct":0,"explain":"Encrypting a victim's files and demanding payment, typically in cryptocurrency, to restore access is the defining behavior of ransomware, distinguishing it from other malware types focused on stealth data theft or self-replication.","sub":"2.3","source":"original-2026-batch"},{"id":396,"domain":"Security","q":"A user notices their computer's webcam indicator light turns on randomly even when they aren't using any video call application, and their antivirus later detects a program secretly monitoring their activity and keystrokes. What type of malware does this describe?","choices":["Spyware","A boot sector virus","A logic bomb","Ransomware"],"correct":0,"explain":"Malware that secretly monitors user activity, including keystrokes and potentially webcam access, without the user's knowledge or consent is spyware, which is designed for covert surveillance rather than immediate visible disruption like ransomware.","sub":"2.3","source":"original-2026-batch"},{"id":397,"domain":"Security","q":"A company's payroll system unexpectedly deletes all employee records on a specific date, and investigation reveals malicious code that had been dormant, waiting for that exact date to trigger before executing. What type of malware is this?","choices":["A logic bomb (specifically a time bomb variant)","A rootkit","A Trojan horse","Adware"],"correct":0,"explain":"Malicious code that remains dormant until a specific triggering condition, such as a particular date, is a logic bomb, and this particular variant triggered by a date/time condition is often called a time bomb.","sub":"2.3","source":"original-2026-batch"},{"id":398,"domain":"Security","q":"A technician discovers that a piece of malware has embedded itself deep within the operating system's core functions, actively hiding its own files and processes from both the user and standard antivirus scans. What type of malware exhibits this specific stealth behavior?","choices":["A rootkit","Adware","A simple computer worm","A phishing email attachment"],"correct":0,"explain":"Malware that embeds itself deep within the operating system and actively hides its own presence, including files and processes, from the user and standard detection tools is a rootkit, which is specifically designed for persistent, stealthy control over a compromised system.","sub":"2.3","source":"original-2026-batch"},{"id":399,"domain":"Security","q":"A user downloads what appears to be a legitimate free game from an unofficial website, but once installed, it secretly grants an attacker remote access to the computer without the user's knowledge. What type of malware does this represent?","choices":["A Trojan horse","A worm that self-replicates across the network","A boot sector virus","A logic bomb"],"correct":0,"explain":"Malware disguised as a legitimate, desirable program, such as a free game, that secretly grants unauthorized access once installed is a Trojan horse, named for its deceptive appearance that convinces the user to install it voluntarily.","sub":"2.3","source":"original-2026-batch"},{"id":400,"domain":"Security","q":"A company's network experiences a rapid, self-propagating infection that spreads from computer to computer across the network without requiring any user interaction like opening a file. What type of malware exhibits this specific self-replicating, network-spreading behavior?","choices":["A worm","Spyware","A logic bomb","A keylogger operating in isolation"],"correct":0,"explain":"Malware that self-propagates across a network from computer to computer without requiring any user interaction is a worm, distinguished from a virus, which typically requires a user to execute an infected file to spread.","sub":"2.3","source":"original-2026-batch"},{"id":401,"domain":"Security","q":"A user's web browser is flooded with intrusive pop-up advertisements, and their browser homepage has been changed without their permission after installing a free browser extension. What type of malware is most likely responsible?","choices":["Adware","Ransomware","A rootkit","A logic bomb"],"correct":0,"explain":"Software that generates intrusive advertisements and modifies browser settings like the homepage, typically bundled with free downloads, is adware, which is generally more of a nuisance than other malware types but can also introduce further security risks.","sub":"2.3","source":"original-2026-batch"},{"id":402,"domain":"Security","q":"A technician suspects a user's computer is infected with malware after noticing unusually high network traffic to an unfamiliar external server, even when the user isn't actively using the internet. What is an appropriate first step in investigating this suspected infection?","choices":["Run a full system scan using updated antivirus/anti-malware software","Immediately reformat the hard drive without any further investigation","Ignore the traffic since it is likely a normal Windows Update process","Disable the computer's antivirus software to rule it out as the cause"],"correct":0,"explain":"Running a full system scan using updated antivirus and anti-malware software is an appropriate first investigative step when suspicious network activity suggests a possible infection, since it can identify and often quarantine or remove a detected threat before more drastic measures are considered.","sub":"2.3","source":"original-2026-batch"},{"id":403,"domain":"Security","q":"After removing an active malware infection from a user's computer, a technician also disables System Restore and then re-enables it to create a fresh restore point. What is the purpose of this specific step in the malware removal process?","choices":["To ensure that any existing restore points, which could contain the malware, aren't used to accidentally reintroduce the infection later","To speed up the computer's boot time permanently","To automatically update all installed software","To change the user's account password as part of remediation"],"correct":0,"explain":"Disabling and re-enabling System Restore after malware removal clears out any existing restore points that might contain a snapshot of the infected system state, preventing an accidental reintroduction of the malware if the user or technician ever performs a system restore later.","sub":"2.3","source":"original-2026-batch"},{"id":404,"domain":"Security","q":"A user's antivirus software flags a downloaded file as a keylogger before the user opens it. What risk was this file specifically designed to pose if it had been allowed to run?","choices":["Secretly recording every keystroke typed, potentially capturing passwords and other sensitive information","Immediately and visibly encrypting all of the user's files","Displaying intrusive pop-up advertisements in the user's browser","Physically damaging the computer's hard drive hardware"],"correct":0,"explain":"A keylogger is specifically designed to secretly record every keystroke a user types, which can capture sensitive information like passwords, credit card numbers, and private messages, making early detection before execution particularly valuable in preventing this covert data theft.","sub":"2.3","source":"original-2026-batch"},{"id":405,"domain":"Security","q":"A technician performing malware remediation on an infected computer follows a specific process: identify and research symptoms, quarantine the infected system, disable System Restore, remediate using updated anti-malware software, schedule scans and updates, enable System Restore, and educate the end user. Why is quarantining the infected system an early step in this process?","choices":["To prevent the malware from spreading to other computers on the network before it can be fully remediated","To immediately and permanently delete all data on the infected computer","To automatically notify the malware's original author of the detection","To skip the need for any further scanning or remediation steps"],"correct":0,"explain":"Quarantining the infected system early in the remediation process, such as by disconnecting it from the network, helps prevent the malware from spreading further to other computers before the infection can be fully investigated and remediated, containing the scope of the incident.","sub":"2.3","source":"original-2026-batch"},{"id":406,"domain":"Security","q":"A user reports that their computer displays fake antivirus warning pop-ups claiming the system is severely infected and urging them to call a phone number or pay for a 'security tool' to fix it, even though their actual antivirus software shows no threats detected. What is this deceptive tactic called?","choices":["Scareware, a form of malware or social engineering that uses fake alarming messages to manipulate the user","A legitimate antivirus alert requiring immediate payment to resolve","A normal Windows Update notification unrelated to security","A hardware failure warning generated by the computer's BIOS"],"correct":0,"explain":"Fake, alarming pop-up warnings designed to scare a user into calling a fraudulent support number or paying for a bogus 'security tool' is scareware, a deceptive tactic that exploits fear rather than reflecting any genuine detection from the user's actual antivirus software.","sub":"2.3","source":"original-2026-batch"},{"id":407,"domain":"Security","q":"An employee receives an email that appears to be from the company's IT department, warning that their account will be locked in one hour unless they click a link and enter their password immediately. The link leads to a fake login page. What social engineering attack is this?","choices":["Phishing","Tailgating","Shoulder surfing","Dumpster diving"],"correct":0,"explain":"An email designed to trick the recipient into entering their credentials on a fake login page, using urgency about account lockout, is a phishing attack, one of the most common social engineering techniques used to steal credentials.","sub":"2.4","source":"original-2026-batch"},{"id":408,"domain":"Security","q":"An unauthorized individual follows closely behind an employee through a secured office door, relying on the employee's courtesy in holding the door open rather than swiping their own badge. What social engineering technique does this describe?","choices":["Tailgating","Phishing","Spear phishing","Vishing"],"correct":0,"explain":"Following closely behind an authorized person through a secured door, relying on courtesy rather than using proper badge access, is tailgating, a physical social engineering technique that bypasses access control systems through human behavior.","sub":"2.4","source":"original-2026-batch"},{"id":409,"domain":"Security","q":"An attacker calls an employee, claiming to be from the company's help desk, and convinces them to reveal their password over the phone by creating a sense of urgency about a supposed system problem. What social engineering technique is being used?","choices":["Vishing (voice phishing)","Shoulder surfing","Dumpster diving","Tailgating"],"correct":0,"explain":"Using a phone call to impersonate a trusted role like the help desk and pressure the victim into revealing sensitive information is vishing, or voice phishing, a social engineering technique conducted over the phone rather than through email or in person.","sub":"2.4","source":"original-2026-batch"},{"id":410,"domain":"Security","q":"A malicious individual searches through a company's trash bins outside the building and discovers discarded documents containing employee names, phone numbers, and internal project details that could be used for a future attack. What social engineering technique does this represent?","choices":["Dumpster diving","Phishing","Vishing","Tailgating"],"correct":0,"explain":"Searching through discarded trash for sensitive information, such as documents containing employee details or internal project data, is dumpster diving, a technique often used for reconnaissance ahead of a more targeted social engineering attack.","sub":"2.4","source":"original-2026-batch"},{"id":411,"domain":"Security","q":"While waiting in line at a coffee shop, an attacker positions themselves to watch over a stranger's shoulder as the stranger enters their banking PIN at an ATM, memorizing the digits. What social engineering technique is being used?","choices":["Shoulder surfing","Tailgating","Dumpster diving","Spear phishing"],"correct":0,"explain":"Watching over someone's shoulder to observe sensitive information being entered, such as a PIN at an ATM, is shoulder surfing, a low-tech social engineering technique that relies purely on visual observation rather than any digital attack.","sub":"2.4","source":"original-2026-batch"},{"id":412,"domain":"Security","q":"An attacker sends a highly personalized email to a company's CFO, referencing specific recent company projects and mimicking the writing style of the CEO, requesting an urgent wire transfer. This differs from a generic phishing email because it is specifically tailored to one individual target. What is this more targeted form of phishing called?","choices":["Spear phishing","Vishing","Shoulder surfing","Dumpster diving"],"correct":0,"explain":"A highly personalized phishing attack targeting a specific individual, using details relevant to that person or their organization to appear more convincing, is spear phishing, distinguished from generic, mass-distributed phishing emails sent broadly.","sub":"2.4","source":"original-2026-batch"},{"id":413,"domain":"Security","q":"An attacker specifically targets a company's Chief Executive Officer with a personalized phishing attack, since a successful compromise of that individual's account would grant access to highly sensitive and valuable information. What term describes phishing specifically targeting a high-profile individual like a CEO?","choices":["Whaling","Vishing","Tailgating","Dumpster diving"],"correct":0,"explain":"Phishing attacks specifically targeting high-profile, high-value individuals such as executives are called whaling, a specialized subset of spear phishing named for targeting the 'big fish' within an organization.","sub":"2.4","source":"original-2026-batch"},{"id":414,"domain":"Security","q":"An attacker leaves a USB flash drive labeled 'Executive Bonus List' in the company parking lot, hoping a curious employee will find it and plug it into a work computer, unknowingly installing malware. What social engineering principle is being exploited in this scenario?","choices":["Curiosity, exploited through a baiting technique using a tempting, mislabeled physical device","Authority, exploited through impersonation of a company executive","Urgency, exploited through a tight artificial deadline","Familiarity, exploited through a long-standing prior relationship"],"correct":0,"explain":"Leaving an enticingly labeled USB drive to lure a curious employee into plugging it into a computer is a baiting technique that specifically exploits human curiosity, distinct from social engineering approaches that instead rely on urgency, authority, or an established relationship.","sub":"2.4","source":"original-2026-batch"},{"id":415,"domain":"Security","q":"An attacker impersonating a senior executive calls an employee and uses an authoritative, demanding tone to pressure them into bypassing normal verification procedures for an urgent request. What social engineering principle is primarily being exploited?","choices":["Authority, since people are often conditioned to comply with requests from someone perceived to hold power or seniority","Scarcity, since the attacker is claiming a limited-time offer","Reciprocity, since the attacker previously did the employee a favor","Social proof, since the attacker claims many other people have already complied"],"correct":0,"explain":"Impersonating a senior executive and using an authoritative, demanding tone to pressure an employee into skipping normal verification procedures primarily exploits the principle of authority, since people are often conditioned to comply readily with requests from someone perceived to hold organizational power or seniority.","sub":"2.4","source":"original-2026-batch"},{"id":416,"domain":"Security","q":"An attacker sends a text message to an employee's personal phone claiming their bank account has been compromised and urging them to click a link and log in immediately to secure it. What social engineering technique, delivered via text message, does this represent?","choices":["Smishing (SMS-based phishing)","Vishing, since it is delivered over a phone call","Tailgating, since it involves physical proximity","Dumpster diving, since it involves discarded information"],"correct":0,"explain":"A phishing attack delivered specifically through a text message (SMS), rather than email or a phone call, is smishing, which exploits the personal and immediate nature of text messaging to pressure quick, unverified action from the recipient.","sub":"2.4","source":"original-2026-batch"},{"id":417,"domain":"Security","q":"A company's security awareness training teaches employees to always verify unusual or urgent requests, such as wire transfers, through a separate, known communication channel before acting, rather than trusting the original message alone. Why is this verification step particularly effective against social engineering attacks?","choices":["It counters the attacker's use of urgency and impersonation by forcing independent confirmation through a channel the attacker likely cannot also control","It has no real effect on social engineering attempts, since attackers can easily fake any communication channel","It only protects against technical malware infections, not human-targeted attacks","It eliminates the need for any other security awareness training content"],"correct":0,"explain":"Requiring independent verification of unusual or urgent requests through a separate, known communication channel directly counters social engineering tactics that rely on urgency and impersonation, since an attacker who has compromised or spoofed one channel likely cannot also control the separate verification channel.","sub":"2.4","source":"original-2026-batch"},{"id":418,"domain":"Security","q":"An employee receives a phone call from someone claiming to be a vendor's technical support representative, who asks a series of seemingly innocent questions about the company's software versions and network setup, none of which seem overtly sensitive individually. What is this information-gathering technique called, and why is it a concern even though no single answer seems sensitive?","choices":["Pretexting, using a fabricated scenario to gather seemingly minor details that can be pieced together to enable a more serious future attack","A legitimate technical support call requiring no further scrutiny","Tailgating, since it involves gaining unauthorized physical access","Dumpster diving, since it involves examining discarded materials"],"correct":0,"explain":"Using a fabricated scenario or false identity, such as posing as vendor technical support, to gather seemingly minor pieces of information is pretexting, and it is a concern even when no single answer seems sensitive because attackers often piece together many small details to build a fuller picture that enables a more targeted, convincing future attack.","sub":"2.4","source":"original-2026-batch"},{"id":419,"domain":"Security","q":"A company wants to ensure that only specific, pre-approved applications can run on shared kiosk computers in a public lobby, blocking any unauthorized software from executing even if someone tries to install it. Which Windows security feature is designed to enforce this restriction?","choices":["AppLocker (application control policies)","Windows Update","Disk Cleanup","Character Map"],"correct":0,"explain":"AppLocker allows administrators to define application control policies that permit only specific, pre-approved applications to run, blocking unauthorized software from executing, which is well suited to a shared kiosk environment requiring tight control over what can run.","sub":"2.5","source":"original-2026-batch"},{"id":420,"domain":"Security","q":"An IT administrator wants to require that users type a complex password containing uppercase letters, numbers, and symbols before their Windows account will accept it. Where in Windows would this policy typically be configured on a domain-joined machine?","choices":["Group Policy password complexity settings","The Windows wallpaper personalization settings","Disk Defragmenter settings","The Character Map application"],"correct":0,"explain":"Password complexity requirements, such as mandating uppercase letters, numbers, and symbols, are typically configured through Group Policy settings on a domain-joined machine, allowing centralized enforcement of password standards across many computers at once.","sub":"2.5","source":"original-2026-batch"},{"id":421,"domain":"Security","q":"A company wants each user account on shared computers to only have the minimum permissions necessary for their daily tasks, preventing standard users from installing software or changing system-wide settings. What Windows account type reflects this restricted configuration?","choices":["A standard user account, rather than an administrator account","An administrator account for every single user, regardless of role","A guest account with full administrative rights","An account with password complexity requirements disabled"],"correct":0,"explain":"Configuring users with standard user accounts, rather than administrator accounts, restricts them to the minimum permissions necessary for daily tasks, preventing them from installing software or changing system-wide settings, which reflects the principle of least privilege applied to Windows account types.","sub":"2.5","source":"original-2026-batch"},{"id":422,"domain":"Security","q":"A technician wants to configure a Windows computer so that after five failed login attempts, the account is temporarily locked out to help prevent a brute-force password guessing attack. What Windows security setting controls this behavior?","choices":["Account lockout policy","Screen saver timeout settings","Disk Cleanup scheduling","Windows Fax and Scan configuration"],"correct":0,"explain":"The account lockout policy setting controls how many failed login attempts are permitted before an account is temporarily locked, which is a specific configurable defense against brute-force password guessing attacks attempting to repeatedly guess a user's password.","sub":"2.5","source":"original-2026-batch"},{"id":423,"domain":"Security","q":"A user steps away from their unlocked computer in a shared office space, and a technician recommends configuring Windows to automatically lock the screen after a short period of inactivity, requiring a password to resume. What Windows setting accomplishes this?","choices":["Screen lock / screen saver timeout with password requirement enabled","Disk Defragmenter automatic scheduling","Character Map default font settings","Windows Fax and Scan auto-answer settings"],"correct":0,"explain":"Configuring a screen lock or screen saver timeout that requires a password to resume automatically locks an unattended computer after a period of inactivity, reducing the risk of an unauthorized person accessing an unlocked computer left unattended in a shared space.","sub":"2.5","source":"original-2026-batch"},{"id":424,"domain":"Security","q":"A company issues smartphones to its sales team and wants the ability to remotely erase all data from a device if it is ever lost or stolen. What technology allows IT to enforce this centrally across all company phones?","choices":["Mobile device management (MDM) software with remote wipe capability","A physical screen protector applied to each device","Windows Fax and Scan configured on each device","Disk Defragmenter installed on each device"],"correct":0,"explain":"Mobile device management (MDM) software allows an IT department to centrally manage company-issued smartphones, including remotely wiping all data from a device if it is ever lost or stolen, protecting sensitive company information from unauthorized access.","sub":"2.6","source":"original-2026-batch"},{"id":425,"domain":"Security","q":"An employee's company-issued smartphone requires a fingerprint or six-digit PIN before the home screen can be accessed. What security purpose does this device-level authentication primarily serve?","choices":["Preventing unauthorized individuals from accessing the device's data if it is lost, stolen, or left unattended","Improving the device's battery life significantly","Increasing the device's available storage capacity","Automatically updating all installed applications"],"correct":0,"explain":"Requiring a fingerprint or PIN before the home screen is accessible primarily serves to prevent unauthorized individuals from accessing the device's data if it is ever lost, stolen, or left unattended, acting as the first line of defense for a mobile device's contents.","sub":"2.6","source":"original-2026-batch"},{"id":426,"domain":"Security","q":"A company's mobile device policy requires that all company data on employee smartphones be stored in an encrypted, sandboxed container, separate from the employee's personal apps and photos. What does this containerization approach specifically achieve?","choices":["Isolating and protecting company data from personal apps, reducing the risk of data leakage between the two while preserving user privacy for personal content","Automatically doubling the device's total storage capacity","Permanently disabling the device's camera for all users","Preventing the device from ever connecting to Wi-Fi networks"],"correct":0,"explain":"Containerization isolates company data in an encrypted, sandboxed area separate from personal apps and photos, reducing the risk of data leaking between company and personal content while still preserving the employee's privacy for their own personal information.","sub":"2.6","source":"original-2026-batch"},{"id":427,"domain":"Security","q":"A manufacturing company's embedded control system, used to operate specialized factory equipment, cannot be easily patched or updated due to strict regulatory certification requirements tied to its exact software version. What security approach is most appropriate for protecting this type of legacy embedded system?","choices":["Network segmentation and isolation, limiting the embedded system's exposure since it cannot be patched like a typical computer","Ignoring the system entirely, since embedded devices require no security consideration","Connecting the device directly to the public internet with no additional controls","Replacing the device's operating system without regard for certification requirements"],"correct":0,"explain":"Since a certified embedded system often cannot be patched without jeopardizing its regulatory certification, network segmentation and isolation, limiting what the device can communicate with, is a more appropriate security approach that reduces exposure without requiring the software itself to be changed.","sub":"2.6","source":"original-2026-batch"},{"id":428,"domain":"Security","q":"An employee's smartphone is configured to automatically connect to any available open Wi-Fi network without prompting the user, including networks in public places like airports. What security risk does this automatic behavior primarily create?","choices":["The device could connect to a malicious rogue access point set up to intercept traffic, without the user's awareness or consent","The device's battery will drain permanently and cannot be recharged","The device's screen resolution will be permanently altered","The device will be unable to make phone calls of any kind"],"correct":0,"explain":"Automatically connecting to any available open Wi-Fi network without prompting the user creates a risk that the device could connect to a malicious rogue access point designed to intercept traffic, since the user has no opportunity to verify the legitimacy of the network before the connection is made.","sub":"2.6","source":"original-2026-batch"},{"id":429,"domain":"Security","q":"A company wants to prevent employees from installing applications from unofficial, unverified third-party app stores on their company-issued Android devices, since such apps could contain malware. What mobile security setting or policy addresses this specific risk?","choices":["Restricting installation to the official app store and disabling installation from unknown sources","Disabling the device's camera entirely","Increasing the device's screen brightness","Disabling the device's built-in clock application"],"correct":0,"explain":"Restricting app installation to the official app store and disabling the ability to install from unknown or unverified third-party sources directly addresses the risk of employees installing malware-laden applications from unofficial, unvetted sources onto company devices.","sub":"2.6","source":"original-2026-batch"},{"id":430,"domain":"Security","q":"A company is retiring several old hard drives that contained sensitive customer financial data, and wants to guarantee the data can never be recovered by anyone, even with specialized forensic tools. What is the most secure disposal method for these drives?","choices":["Physical destruction, such as shredding or degaussing the drives","Simply deleting the files from the drives before disposal","Moving the files to the recycle bin and emptying it","Renaming the files to something unrelated before disposal"],"correct":0,"explain":"Physical destruction methods like shredding or degaussing render the drive's data completely unrecoverable, even by specialized forensic tools, providing the strongest guarantee of data destruction compared to simply deleting files, which can often still be recovered.","sub":"2.7","source":"original-2026-batch"},{"id":431,"domain":"Security","q":"A technician needs to repurpose an old hard drive for a new project after ensuring all previous data has been completely and irrecoverably erased, without physically destroying the drive itself, since it will be reused. What is an appropriate approach?","choices":["A secure data wiping/erasing tool that overwrites the entire drive multiple times according to a recognized standard","Simply dragging the files to the recycle bin and emptying it once","Reformatting the drive using a quick format only","Renaming the drive's volume label and leaving the data otherwise untouched"],"correct":0,"explain":"Using a secure data wiping tool that overwrites the entire drive multiple times according to a recognized standard ensures the previous data is irrecoverably erased while leaving the physical drive intact and reusable, unlike a simple quick format or deletion, which does not securely erase underlying data.","sub":"2.7","source":"original-2026-batch"},{"id":432,"domain":"Security","q":"A company explains to its employees that simply deleting a file and emptying the recycle bin does not actually erase the file's data from the hard drive. What actually happens to the file's data at that point?","choices":["The space is marked as available for reuse, but the actual data typically remains on the drive until overwritten by new data","The data is instantly and permanently overwritten with random data automatically","The data is immediately and physically destroyed at the hardware level","The data is automatically encrypted the moment it is deleted"],"correct":0,"explain":"Deleting a file and emptying the recycle bin typically only marks that disk space as available for reuse; the actual underlying data usually remains recoverable using specialized tools until new data happens to overwrite that same physical location on the drive.","sub":"2.7","source":"original-2026-batch"},{"id":433,"domain":"Security","q":"A company disposes of several old paper documents containing sensitive employee social security numbers by placing them directly in the regular office trash bin. What data destruction risk does this practice create?","choices":["The risk of dumpster diving, where someone could retrieve and misuse the intact sensitive documents from the trash","No risk at all, since paper documents cannot contain any recoverable sensitive information","A risk that only applies to digital data, never physical paper documents","A risk that is automatically eliminated once the trash bin lid is closed"],"correct":0,"explain":"Placing sensitive paper documents directly in regular trash without shredding creates a real risk of dumpster diving, where someone could retrieve the intact documents from the trash and misuse the sensitive information they contain, such as social security numbers.","sub":"2.7","source":"original-2026-batch"},{"id":434,"domain":"Security","q":"A company wants to securely dispose of sensitive printed documents containing customer account details. What physical destruction method is specifically appropriate for paper records?","choices":["Shredding the documents using a cross-cut or micro-cut shredder","Simply crumpling the paper and placing it in the recycling bin","Erasing the paper using a magnetic degausser","Wiping the paper using specialized data-wiping software"],"correct":0,"explain":"Shredding paper documents using a cross-cut or micro-cut shredder physically destroys the readable content, making sensitive information on printed documents like customer account details unrecoverable, whereas degaussing and data-wiping software are methods intended for magnetic or digital storage media, not paper.","sub":"2.7","source":"original-2026-batch"},{"id":435,"domain":"Security","q":"A company's data destruction policy requires that a certificate of destruction be obtained from any third-party vendor hired to dispose of retired storage devices. What purpose does this certificate primarily serve?","choices":["It provides documented proof that the devices were properly and securely destroyed, supporting compliance and accountability","It guarantees the vendor will provide a full cash refund for the destroyed devices","It automatically transfers legal ownership of the destroyed data to the vendor","It has no practical purpose beyond being a routine paperwork formality"],"correct":0,"explain":"A certificate of destruction from a third-party vendor provides documented proof that retired devices were properly and securely destroyed, which supports the company's compliance obligations and provides accountability in case questions later arise about how sensitive data was handled during disposal.","sub":"2.7","source":"original-2026-batch"},{"id":436,"domain":"Security","q":"A technician degausses several old magnetic hard drives before disposal, using a strong magnetic field to scramble the data stored on the drive's platters. What is an important limitation of degaussing as a data destruction method?","choices":["It is not effective on solid-state drives (SSDs), since they do not store data using magnetic platters","It works equally well on both magnetic hard drives and solid-state drives","It permanently improves the storage capacity of the degaussed drive","It has no effect whatsoever on any type of storage media"],"correct":0,"explain":"Degaussing relies on a strong magnetic field to disrupt data stored on magnetic platters, making it effective for traditional magnetic hard drives, but it is not effective on solid-state drives (SSDs), which store data electronically rather than magnetically, requiring a different destruction method.","sub":"2.7","source":"original-2026-batch"},{"id":437,"domain":"Security","q":"A company recycles its old computer equipment through a certified electronics recycler rather than sending it to a general landfill. What is a primary reason for using a certified electronics recycler specifically, beyond simple environmental responsibility?","choices":["Certified recyclers typically follow documented, verifiable processes for both environmentally responsible disposal and secure data destruction","Certified recyclers are always significantly cheaper than any other disposal option","Certified recyclers are legally required to return all recycled devices back to their original owner","There is no meaningful difference between a certified recycler and a general landfill"],"correct":0,"explain":"Using a certified electronics recycler ensures the company benefits from documented, verifiable processes for both environmentally responsible disposal of electronic waste and secure destruction of any remaining data, which a general landfill disposal method would not provide or guarantee.","sub":"2.7","source":"original-2026-batch"},{"id":438,"domain":"Security","q":"A company retires an old server's hard drives and decides to physically remove the drive platters and drill multiple holes completely through them before disposal. What data destruction category does this drilling method fall under?","choices":["Physical destruction, rendering the drive's platters unusable and the data unrecoverable","A form of secure software-based data wiping","A form of low-level formatting performed via the operating system","A method that only works on solid-state drives, not traditional platter-based drives"],"correct":0,"explain":"Drilling multiple holes completely through a hard drive's platters is a physical destruction method, physically damaging the storage medium itself to render the drive's platters unusable and any data on them unrecoverable, distinct from software-based wiping or formatting approaches.","sub":"2.7","source":"original-2026-batch"},{"id":439,"domain":"Security","q":"A company needs to dispose of several old solid-state drives (SSDs) that contained sensitive data, and a technician notes that traditional multi-pass overwriting methods designed for magnetic hard drives are less reliable and effective on SSDs. What data destruction approach is generally more appropriate for SSDs specifically?","choices":["Using the SSD manufacturer's secure erase command, or physically destroying the drive, rather than relying on traditional multi-pass overwriting","Simply performing a quick format and considering the drive fully sanitized","Relying exclusively on degaussing, since it works identically on all drive types","Leaving the SSD's data untouched, since SSDs cannot be securely erased under any method"],"correct":0,"explain":"Due to how SSDs manage data internally with wear leveling, traditional multi-pass overwriting methods designed for magnetic hard drives are less reliable on SSDs; using the manufacturer's dedicated secure erase command, or physically destroying the drive, is generally a more appropriate and reliable approach.","sub":"2.7","source":"original-2026-batch"},{"id":440,"domain":"Security","q":"A company's data destruction policy specifies different retention and destruction timelines for different categories of data, such as financial records needing seven years of retention before destruction, while marketing emails can be destroyed after one year. Why is having category-specific timelines valuable?","choices":["It aligns data destruction practices with actual legal, regulatory, and business requirements that differ by data type, rather than applying a single uniform rule to everything","It has no practical value, since all types of data should always be retained indefinitely regardless of category","It is only relevant for physical paper documents, never digital records","It eliminates the need for the company to ever destroy any data at all"],"correct":0,"explain":"Having category-specific data destruction timelines allows a company to align its practices with actual legal, regulatory, and business requirements that genuinely differ by data type, such as financial records often having mandated multi-year retention requirements, rather than applying one uniform, potentially non-compliant rule to all data equally.","sub":"2.7","source":"original-2026-batch"},{"id":441,"domain":"Security","q":"A technician preparing to dispose of an old company laptop first removes and separately destroys the hard drive, but leaves the rest of the laptop's components, such as the RAM and motherboard, intact for potential resale or recycling. Why is this selective approach to destruction reasonable?","choices":["Sensitive data is primarily stored on the hard drive, so focusing destruction efforts there while allowing other reusable components to be recycled or resold is a reasonable, efficient practice","Every single component of a computer always contains equally sensitive recoverable data requiring destruction","RAM and motherboards should never be reused or recycled under any circumstances","Selective destruction is prohibited under all data destruction policies without exception"],"correct":0,"explain":"Since sensitive data is primarily stored on the hard drive rather than components like RAM or the motherboard, focusing destruction efforts specifically on the drive while allowing other reusable, non-data-bearing components to be recycled or resold is a reasonable and resource-efficient disposal practice.","sub":"2.7","source":"original-2026-batch"},{"id":442,"domain":"Security","q":"A company's IT department maintains a documented chain of custody log tracking every retired device from the moment it is decommissioned until its final destruction is confirmed. What risk does this documented tracking process help mitigate?","choices":["The risk of a device with sensitive data going missing or being improperly disposed of without anyone noticing before proper destruction occurs","The risk of the device's warranty being voided by tracking its location","The risk of the device automatically increasing in resale value over time","The risk of the device requiring a firmware update before destruction"],"correct":0,"explain":"Maintaining a documented chain of custody log for retired devices, from decommissioning through confirmed destruction, helps mitigate the risk of a device containing sensitive data going missing or being improperly disposed of along the way without anyone noticing, since every step and handoff is tracked and accountable.","sub":"2.7","source":"original-2026-batch"},{"id":443,"domain":"Security","q":"A company's mobile device policy states that before a company smartphone is reassigned to a new employee, it must undergo a full factory reset combined with encryption verification to ensure the previous user's data cannot be recovered. Why is combining a factory reset with encryption particularly effective for mobile device sanitization?","choices":["If the device's storage was encrypted, resetting effectively discards the encryption key, making the previously encrypted data cryptographically unrecoverable even if remnants of it technically remain on the storage chip","A factory reset alone, without encryption, always guarantees complete and total data destruction","Encryption has no bearing whatsoever on how effective a factory reset is at removing data","Combining these two steps will always corrupt the device beyond any further usable operation"],"correct":0,"explain":"When a device's storage is encrypted, a factory reset that also discards the encryption key renders any remaining data fragments on the storage chip cryptographically unrecoverable, even if traces of the encrypted data technically still exist physically, making the combination of encryption and reset a particularly effective sanitization approach for mobile devices.","sub":"2.7","source":"original-2026-batch"},{"id":444,"domain":"Security","q":"A home office user sets up a new wireless router and, as one of the first configuration steps, changes the router's administrator login page password away from its factory default. Why is this an important first step for SOHO network security?","choices":["Default administrator credentials are often widely published for specific router models, making them an easy target if left unchanged","Changing the password automatically increases the router's Wi-Fi signal range","Changing the password is required before the router can connect to the internet at all","Changing the password automatically upgrades the router's firmware to the latest version"],"correct":0,"explain":"Default administrator credentials for many router models are widely published online, so changing this password away from the factory default is an important first security step, since leaving it unchanged would allow anyone who looks up that model's default credentials to gain full administrative control over the router.","sub":"2.8","source":"original-2026-batch"},{"id":445,"domain":"Security","q":"A small home office wants to prevent outsiders from easily guessing their Wi-Fi network's purpose or owner, while still using a strong password for actual security. What simple change to the network name (SSID) supports this goal?","choices":["Renaming the SSID to something generic that doesn't reveal the owner's name or business identity","Leaving the SSID completely blank so no name is broadcast at all","Setting the SSID to include the full home address for easy identification by the owner","Setting the SSID identical to the router's administrator password for convenience"],"correct":0,"explain":"Renaming the SSID to something generic, rather than something that reveals the owner's name or business identity, reduces the amount of identifying information broadcast to anyone nearby, though this should be combined with strong encryption and a solid password rather than relied upon as the primary security measure.","sub":"2.8","source":"original-2026-batch"},{"id":446,"domain":"Security","q":"A home user configures their router's firewall to block all unsolicited inbound connection attempts from the internet by default, only allowing traffic that was initiated from inside the home network. What type of firewall behavior does this represent?","choices":["A stateful firewall using default-deny inbound rules, a standard and recommended SOHO configuration","A firewall configured to allow all inbound traffic from any source by default","A firewall that has been completely disabled to maximize network speed","A firewall that only filters outbound traffic and ignores all inbound traffic"],"correct":0,"explain":"Configuring a router's firewall to block unsolicited inbound connections by default, only allowing traffic initiated from inside the network, is a standard and recommended stateful, default-deny inbound configuration for a small office/home office network, providing a baseline level of protection against unsolicited external connection attempts.","sub":"2.8","source":"original-2026-batch"},{"id":447,"domain":"Security","q":"A home office user disables their router's Universal Plug and Play (UPnP) feature after learning that it allows devices on the network to automatically open ports on the firewall without any manual approval. What security concern does disabling UPnP address?","choices":["The risk of malware or compromised devices automatically opening firewall ports without the user's knowledge or explicit consent","The risk that UPnP will permanently disable the router's Wi-Fi radio","The risk that UPnP will cause the router to overheat and shut down","The risk that UPnP will automatically change the router's administrator password"],"correct":0,"explain":"Disabling UPnP addresses the risk that malware or a compromised device on the network could automatically open ports on the router's firewall without the user's knowledge or explicit approval, since UPnP is designed for convenience but can be abused to create unintended openings in the network's perimeter defense.","sub":"2.8","source":"original-2026-batch"},{"id":448,"domain":"Security","q":"A small business wants to keep its router's firmware up to date to patch known security vulnerabilities, but the router does not automatically check for updates. What should the business do to maintain good SOHO security practice?","choices":["Periodically and manually check the router manufacturer's website or admin interface for firmware updates and apply them","Never update the firmware, since updates always introduce new security vulnerabilities","Replace the entire router every time a firmware update becomes available","Assume the router's original firmware is permanently secure and requires no future updates"],"correct":0,"explain":"Since the router doesn't automatically check for updates, periodically and manually checking the manufacturer's website or admin interface for firmware updates and applying them is a necessary practice to patch known security vulnerabilities, since running outdated firmware leaves known, publicly documented flaws unaddressed.","sub":"2.8","source":"original-2026-batch"},{"id":449,"domain":"Security","q":"A home user configures port forwarding on their router to allow a specific application, such as a home security camera system, to be accessed remotely from the internet. What security consideration should the user keep in mind when setting up this port forwarding rule?","choices":["Port forwarding creates a direct path from the internet to a specific internal device, so only necessary ports should be opened and the target device should be kept updated and secured","Port forwarding automatically encrypts all traffic to and from the internal device","Port forwarding has no security implications whatsoever, since routers block all traffic by default regardless of forwarding rules","Port forwarding is only relevant for outbound traffic, never inbound traffic from the internet"],"correct":0,"explain":"Port forwarding creates a direct path from the internet to a specific internal device, which increases that device's exposure to potential attackers, so only the necessary ports should be opened, and the target device itself should be kept updated and properly secured to reduce risk.","sub":"2.8","source":"original-2026-batch"},{"id":450,"domain":"Security","q":"A home office user wants to separate their smart home devices, such as smart plugs and a video doorbell, from their primary computers and financial data, so that a compromised smart device cannot easily reach more sensitive devices on the network. What SOHO network configuration achieves this separation?","choices":["Setting up a separate network segment (such as a guest network or VLAN) specifically for IoT devices","Connecting every single device to the exact same network with no separation whatsoever","Disabling the router's firewall entirely to simplify device communication","Using the same administrator password on every single connected device"],"correct":0,"explain":"Setting up a separate network segment, such as a dedicated guest network or VLAN specifically for IoT devices like smart plugs and video doorbells, isolates those often less-secure devices from primary computers and sensitive data, so that a compromise of one segment does not easily provide a path to the other.","sub":"2.8","source":"original-2026-batch"},{"id":451,"domain":"Security","q":"A small office's router allows administrators to manage its settings remotely over the internet, but the office decides to disable this remote management feature, restricting configuration access to only devices physically on the local network. What security benefit does disabling remote management provide?","choices":["It reduces the router's attack surface by eliminating a potential remote entry point that could be targeted by attackers over the internet","It permanently improves the router's Wi-Fi signal strength","It automatically increases the number of devices that can connect to the network","It has no meaningful security benefit and only inconveniences legitimate administrators"],"correct":0,"explain":"Disabling remote management reduces the router's attack surface by eliminating a potential entry point that could otherwise be targeted by attackers over the internet, restricting administrative access to only those physically present on the local network, which significantly reduces the risk of a remote attacker gaining administrative control.","sub":"2.8","source":"original-2026-batch"},{"id":452,"domain":"Security","q":"A home user wants their router to automatically assign IP addresses to connected devices while also ensuring that only devices with a valid password can join the network in the first place. What two features work together to achieve this combination of automatic addressing and controlled access?","choices":["DHCP for automatic address assignment, combined with WPA3 or WPA2 encryption requiring a password to join","Static IP addressing combined with an entirely open, passwordless network","MAC filtering alone, without any DHCP or encryption configured","UPnP alone, without any DHCP or encryption configured"],"correct":0,"explain":"DHCP handles automatic IP address assignment for devices that successfully join the network, while WPA3 or WPA2 encryption requires a correct password before a device is allowed to join in the first place, and these two features work together to provide both convenience and controlled access.","sub":"2.8","source":"original-2026-batch"},{"id":453,"domain":"Security","q":"A home office user notices their router supports both the 2.4GHz and 5GHz wireless frequency bands and wants to understand the general security-relevant tradeoff between them. What is a key practical difference between these two bands?","choices":["The 5GHz band typically has less interference from common household devices and shorter range, while 2.4GHz has longer range but more potential interference","The 2.4GHz band is always more secure than 5GHz regardless of any other configuration","The 5GHz band cannot be encrypted under any circumstances, unlike 2.4GHz","There is no practical difference between these two bands in any respect"],"correct":0,"explain":"The 5GHz band typically experiences less interference from common household devices like microwaves and cordless phones, which mostly operate on 2.4GHz, but 5GHz generally has a shorter effective range, while 2.4GHz offers longer range but is more prone to interference, a tradeoff relevant to both performance and reliable operation.","sub":"2.8","source":"original-2026-batch"},{"id":454,"domain":"Security","q":"A small office wants to limit the number of devices that can simultaneously connect to their guest Wi-Fi network to prevent unauthorized bandwidth usage or network abuse by an excessive number of unknown devices. What router feature could help address this concern?","choices":["A connection limit setting or bandwidth/device cap specifically applied to the guest network","Disabling the guest network entirely with no alternative provided","Changing the main network's SSID instead of the guest network's SSID","Increasing the guest network's wireless signal strength to maximum"],"correct":0,"explain":"Configuring a connection limit or bandwidth/device cap specifically on the guest network directly addresses the concern about unauthorized bandwidth usage or abuse by an excessive number of unknown devices, without needing to disable guest access entirely or make unrelated changes to the main network.","sub":"2.8","source":"original-2026-batch"},{"id":455,"domain":"Security","q":"A home user's router logs show repeated failed login attempts to the router's administrative interface from an unfamiliar external IP address. What is an appropriate response to this finding?","choices":["Change the router's administrator password immediately, ensure remote management is disabled, and continue monitoring for further attempts","Ignore the log entries, since router login attempts are never a genuine security concern","Immediately disconnect the router from power permanently with no further action","Assume the router is already compromised beyond any possible remediation"],"correct":0,"explain":"Repeated failed login attempts from an unfamiliar external IP address are a legitimate security concern indicating a possible brute-force attempt, and an appropriate response includes immediately changing the administrator password, ensuring remote management is disabled if not already, and continuing to monitor for further suspicious activity.","sub":"2.8","source":"original-2026-batch"},{"id":456,"domain":"Security","q":"A small office router's firewall settings include an option for 'stateful packet inspection,' which the office administrator ensures remains enabled. What does stateful packet inspection provide compared to simpler packet filtering?","choices":["It tracks the state of active network connections, allowing it to intelligently permit legitimate return traffic while blocking unsolicited, unrelated inbound traffic","It only examines the source and destination port numbers, ignoring all other packet information","It permanently blocks all traffic on the network with no exceptions of any kind","It has no functional difference whatsoever compared to simple packet filtering"],"correct":0,"explain":"Stateful packet inspection tracks the state of active network connections, allowing the firewall to intelligently permit legitimate return traffic associated with a connection that was initiated from inside the network, while still blocking unsolicited, unrelated inbound traffic, which is more sophisticated than simple stateless packet filtering based on static rules alone.","sub":"2.8","source":"original-2026-batch"},{"id":457,"domain":"Security","q":"A home office user disables the Wi-Fi Protected Setup (WPS) feature on their router after learning about a known vulnerability affecting its PIN-based authentication method. What security concern does disabling WPS address?","choices":["WPS PIN-based authentication has known vulnerabilities that could allow an attacker to brute-force their way onto the network more easily than defeating strong WPA encryption directly","WPS is required for the router to receive firmware updates, so disabling it prevents any future patching","Disabling WPS will prevent the router from broadcasting its SSID at all","WPS has no known vulnerabilities and disabling it provides no security benefit"],"correct":0,"explain":"WPS PIN-based authentication has well-documented vulnerabilities that can allow an attacker to more easily brute-force their way onto a network compared to attempting to defeat strong WPA/WPA3 encryption directly, so disabling WPS removes this weaker alternative entry point.","sub":"2.8","source":"original-2026-batch"},{"id":458,"domain":"Security","q":"A home office user configures their router to send an email or app notification whenever a new, unrecognized device connects to the network. What security benefit does this notification feature provide?","choices":["It provides earlier awareness of a potentially unauthorized device joining the network, allowing the user to investigate and respond more quickly","It automatically blocks every single new device from connecting without any user action","It permanently increases the router's maximum supported internet speed","It has no security benefit and exists purely as a cosmetic feature"],"correct":0,"explain":"Receiving a notification whenever a new, unrecognized device connects to the network provides earlier awareness of a potentially unauthorized device joining, allowing the user to investigate and respond more quickly, such as by verifying
