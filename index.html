<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CompTIA A+ Core 2 Practice Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%A1</text></svg>" />
<style>
:root{
  --sky:#38bdf8;
  --sky-dark:#0284c7;
  --sky-deep:#0369a1;
  --bg:#eaf6ff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#5b7186;
  --good:#16a34a;
  --good-bg:rgba(22,163,74,0.1);
  --bad:#dc2626;
  --bad-bg:rgba(220,38,38,0.08);
  --border:#d6ecfb;
  --accent2:#0ea5e9;
}
*{box-sizing:border-box}
body{
  font-family:"Segoe UI",Inter,Arial,sans-serif;
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,#bfe9ff 0%,var(--bg) 320px, var(--bg) 100%);
  color:var(--text);
}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 60px}
h1{margin:0 0 4px 0;font-size:26px;color:var(--sky-deep)}
h2{margin:0 0 12px 0;font-size:18px}
.sub{color:var(--muted);font-size:14.5px;margin-bottom:22px;line-height:1.5}
.disclaimer{background:rgba(3,41,64,0.9);color:#f0f9ff;font-size:12.5px;line-height:1.5;border-radius:12px;padding:10px 16px;margin:0 0 20px;text-align:center}
.disclaimer strong{color:#fde047}
.card{
  background:var(--card);
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(3,105,161,0.12);
  border:1px solid var(--border);
  margin-bottom:18px;
}
button{
  background:var(--sky);
  color:#04324a;
  border:0;
  padding:11px 18px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:14px;
}
button:hover{filter:brightness(1.06)}
button:disabled{opacity:.4;cursor:not-allowed}
button.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
button.ghost:hover{color:var(--text);border-color:var(--sky)}
button.danger{background:transparent;color:var(--bad);border:1px solid var(--bad)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
a.backlink{color:var(--sky-deep);text-decoration:none;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;cursor:pointer}
a.backlink:hover{text-decoration:underline}

/* ---- Dashboard ---- */
.hero{
  background:linear-gradient(135deg,#7dd3fc,var(--sky) 55%,var(--sky-dark));
  border-radius:20px;
  padding:32px 28px;
  color:#04324a;
  margin-bottom:26px;
  box-shadow:0 14px 34px rgba(2,132,199,0.28);
}
.hero h1{color:#04324a;font-size:30px}
.hero .sub{color:#0b4c6e;margin-bottom:4px}
.resume-banner{
  background:rgba(255,255,255,0.9);
  border:1px solid rgba(3,105,161,0.25);
  padding:14px 16px;
  border-radius:12px;
  margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:10px}
.tile{
  border-radius:18px;
  padding:22px 18px;
  color:#fff;
  cursor:pointer;
  border:none;
  text-align:left;
  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 10px 24px rgba(15,23,42,0.18);
  transition:transform .12s ease, box-shadow .12s ease;
  font-family:inherit;
}
.tile:hover{transform:translateY(-4px);box-shadow:0 16px 32px rgba(15,23,42,0.26)}
.tile .icon{font-size:34px;line-height:1}
.tile .ttitle{font-size:17px;font-weight:800;margin-top:10px}
.tile .tsub{font-size:12.5px;opacity:.92;margin-top:4px}
.tile.storm{background:linear-gradient(135deg,#475569,#1e293b)}
.tile.sun{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#4a2c00}
.tile.sun .tsub{color:#5c3a00}
.tile.green{background:linear-gradient(135deg,#34d399,#059669)}
.tile.lightning{background:linear-gradient(135deg,#a78bfa,#7c3aed)}
.tile.fire{background:linear-gradient(135deg,#fb923c,#dc2626)}

/* ---- Setup ---- */
.domain-group{margin-bottom:16px}
.domain-group h3{font-size:14px;margin:0 0 8px;color:var(--sky);border-bottom:1px solid var(--border);padding-bottom:6px}
.domain-list{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.domain-item{display:flex;align-items:center;gap:10px;background:#f3fafe;padding:12px 14px;border-radius:10px;border:1px solid var(--border)}
.domain-item label{flex:1;cursor:pointer;font-size:14px}
.domain-count{color:var(--muted);font-size:13px}
.domain-item input{width:18px;height:18px;accent-color:var(--sky);cursor:pointer}
.count-row{display:flex;align-items:center;gap:14px;margin:16px 0}
.count-row input[type=number]{width:90px;background:#f3fafe;border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-size:15px}
.count-row input[type=range]{flex:1;accent-color:var(--sky);height:20px}
.count-row input[type=range]::-webkit-slider-runnable-track{height:8px;background:#e2f3fd;border-radius:999px}
.count-row input[type=range]::-moz-range-track{height:8px;background:#e2f3fd;border-radius:999px}
.note{color:var(--muted);font-size:13px;margin-top:6px}

/* ---- Quiz ---- */
.progress{height:9px;background:#e2f3fd;border-radius:999px;overflow:hidden;margin:14px 0}
.bar{height:9px;background:linear-gradient(90deg,var(--sky),var(--accent2));width:0%;transition:width .3s ease}
.qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:10px}
.qtext{font-weight:700;font-size:17px;line-height:1.5;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{background:#f3fafe;padding:13px 14px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:transform .12s ease,border-color .12s ease;font-size:14.5px;line-height:1.4}
.choice:hover:not(.locked){transform:translateY(-2px);border-color:var(--sky)}
.choice.locked{cursor:default}
.choice.selected-correct{border-color:var(--good);background:var(--good-bg)}
.choice.selected-wrong{border-color:var(--bad);background:var(--bad-bg)}
.choice.reveal-correct{border-color:var(--good);background:var(--good-bg)}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-right:8px}
.tag.good{background:rgba(22,163,74,0.15);color:#15803d}
.tag.bad{background:rgba(220,38,38,0.13);color:#b91c1c}
.explain-box{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);color:#334155;font-size:13.5px;line-height:1.5}
.controls{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px;flex-wrap:wrap}
.score-big{font-size:48px;font-weight:800;line-height:1;color:var(--sky-deep)}
.score-sub{color:var(--muted);font-size:14px;margin-top:4px}
.domain-score{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.domain-score:last-child{border-bottom:0}
.review-item{padding:14px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:0}
.review-q{font-weight:700;font-size:14.5px;margin-bottom:8px}
.pill{display:inline-block;background:rgba(14,165,233,0.14);color:var(--sky-deep);font-size:11px;padding:2px 8px;border-radius:999px;margin-bottom:8px}
.hidden{display:none}
@media(max-width:640px){.score-big{font-size:38px}.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  const a = arr.slice();

    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

  try{

    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s && s.v === 1) return s;
  }catch(e){}
  return null;
}
function saveSession(s){
  s.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
function clearSession(){
  localStorage.removeItem(STORAGE_KEY);
}

  return QUESTION_BANK.find(q => q.id === id);
}

  const d = document.createElement('div');

}

        item.className = 'domain-item';
        const id = 'sub_' + s.id.replace('.','_');
        item.innerHTML = `<input type="checkbox" id="${id}" ${selected.has(s.id)?'checked':''}/>
          <label for="${id}">${s.id} &mdash; ${s.label}</label>
          <span class="domain-count">${counts[s.id]} question${counts[s.id]===1?'':'s'}</span>`;
        item.querySelector('input').addEventListener('change', e => {
          if(e.target.checked) selected.add(s.id); else selected.delete(s.id);
          draw();
        });
        list.appendChild(item);
      });
      groupsEl.appendChild(group);
    });

    document.getElementById('selectAllBtn').addEventListener('click', () => {
      ALL_SUB_IDS.forEach(id => { if(counts[id] > 0) selected.add(id); });
      draw();
    });
    document.getElementById('selectNoneBtn').addEventListener('click', () => {
      selected.clear();
      draw();
    });

    document.getElementById('countSlider').addEventListener('input', e => {
      countVal = parseInt(e.target.value, 10);
      document.getElementById('countNum').value = countVal;
    });
    document.getElementById('countNum').addEventListener('change', e => {
      let v = parseInt(e.target.value, 10) || effMin;
      v = Math.max(effMin, Math.min(effMax, v));
      countVal = v;
      draw();
    });
    document.getElementById('startBtn').addEventListener('click', () => {
      startQuiz(Array.from(selected), countVal);
    });
  }
  draw();
}

function startQuiz(selectedSubs, count){
  const pool = shuffle(poolForSubs(selectedSubs)).slice(0, count);
  const order = pool.map(q => ({ id: q.id, displayOrder: shuffle([0,1,2,3]) }));
  const session = {
    v: 1,
    domains: selectedSubs,
    order: order,
    answers: order.map(() => null),
    current: 0,
    finished: false,
    startedAt: new Date().toISOString()
  };
  saveSession(session);
  renderQuiz(session);
}

// ---------- Quiz screen ----------
function renderQuiz(session){
  const total = session.order.length;
  const idx = session.current;
  const entry = session.order[idx];
  const q = questionById(entry.id);
  const answeredIdx = session.answers[idx];

  const answeredCount = session.answers.filter(a=>a!==null).length;
  const pct = Math.round((idx / total) * 100);

  app.innerHTML = `
    <h1>CompTIA A+ Core 2 Practice Exam</h1>
    <div class="qmeta">
      <span>Question ${idx+1} of ${total} &middot; ${q.sub} ${SUB_LABEL[q.sub] || q.domain}</span>
      <span>${answeredCount} answered</span>
    </div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="qtext">${escapeHtml(q.q)}</div>
      <div class="choices" id="choicesWrap"></div>
      <div id="feedbackWrap"></div>
      <div class="controls">
        <button class="ghost" id="pauseBtn">Pause &amp; Save</button>
        <div class="row">
          <button class="ghost" id="prevBtn" ${idx===0?'disabled':''}>&#9664; Prev</button>
          <button id="nextBtn" disabled>${idx===total-1 ? 'Finish Quiz' : 'Next ▶'}</button>
        </div>
      </div>
    </div>
  `;

  const choicesWrap = document.getElementById('choicesWrap');
  entry.displayOrder.forEach((origIdx, pos) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.innerHTML = `<strong>${String.fromCharCode(65+pos)}.</strong> ${escapeHtml(q.choices[origIdx])}`;
    div.addEventListener('click', () => {
      if(session.answers[idx] !== null) return;
      session.answers[idx] = pos;
      saveSession(session);
      renderQuiz(session);
    });
    choicesWrap.appendChild(div);
  });

  if(answeredIdx !== null){
    lockChoices(entry, q, answeredIdx);
    document.getElementById('nextBtn').disabled = false;
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    session.current = Math.max(0, idx - 1);
    saveSession(session);
    renderQuiz(session);
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(idx === total - 1){
      session.finished = true;
      saveSession(session);
      renderResults(session);
    } else {
      session.current = idx + 1;
      saveSession(session);
      renderQuiz(session);
    }
  });
  document.getElementById('pauseBtn').addEventListener('click', () => {
    saveSession(session);
    renderDashboard();
  });
}

function lockChoices(entry, q, answeredPos){
  const choicesWrap = document.getElementById('choicesWrap');
  const correctPos = entry.displayOrder.indexOf(q.correct);
  const chosenOrigIdx = entry.displayOrder[answeredPos];
  const wasCorrect = chosenOrigIdx === q.correct;

  Array.from(choicesWrap.children).forEach((div, pos) => {
    div.classList.add('locked');
    if(pos === answeredPos && pos === correctPos){
      div.classList.add('selected-correct');
    } else if(pos === answeredPos){
      div.classList.add('selected-wrong');
    } else if(pos === correctPos){
      div.classList.add('reveal-correct');
    }
  });

  const fb = document.getElementById('feedbackWrap');
  let html = '';
  if(wasCorrect){
    html += `<div class="explain-box"><span class="tag good">Correct</span>${escapeHtml(q.explain)}</div>`;
  } else {
    const specific = Array.isArray(q.wrongExplain) && q.wrongExplain[chosenOrigIdx];
    const whyText = specific || `"${escapeHtml(q.choices[chosenOrigIdx])}" doesn't fit this scenario as well as the correct answer below.`;
    html += `<div class="explain-box"><span class="tag bad">Why this isn't it</span>${specific ? escapeHtml(specific) : whyText}</div>`;
    html += `<div class="explain-box"><span class="tag good">Correct answer</span>${escapeHtml(q.choices[q.correct])} &mdash; ${escapeHtml(q.explain)}</div>`;
  }
  fb.innerHTML = html;
}

// ---------- Results screen ----------
function renderResults(session){
  const total = session.order.length;
  let correctCount = 0;
  const perSub = {};
  const missed = [];

  session.order.forEach((entry, i) => {
    const q = questionById(entry.id);
    const answeredPos = session.answers[i];
    const chosenOrigIdx = answeredPos === null ? null : entry.displayOrder[answeredPos];
    const isCorrect = chosenOrigIdx === q.correct;
    if(!perSub[q.sub]) perSub[q.sub] = {correct:0, total:0};
    perSub[q.sub].total++;
    if(isCorrect){ correctCount++; perSub[q.sub].correct++; }
    else missed.push({q, chosenOrigIdx});
  });

  const answeredCount = session.answers.filter(a=>a!==null).length;
  const score = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

  app.innerHTML = `
    <a class="backlink" id="backToDash">&larr; Back to dashboard</a>
    <h1>Results</h1>
    <div class="card" style="text-align:center">
      <div class="score-big">${score}<span style="font-size:24px;color:var(--muted)"> / 100</span></div>
      <div class="score-sub">${correctCount} correct out of ${answeredCount} answered (${total} selected)</div>
    </div>
    <div class="card">
      <h2>By objective</h2>
      <div id="domainBreakdown"></div>
    </div>
    <div class="card">
      <h2>Review missed questions (${missed.length})</h2>
      <div id="missedList">${missed.length===0 ? '<div class="note">Perfect score on answered questions.</div>' : ''}</div>
    </div>
    <div class="row">
      <button id="newQuizBtn">Start New Quiz</button>
    </div>
  `;
  document.getElementById('backToDash').addEventListener('click', () => { clearSession(); renderDashboard(); });

  const db = document.getElementById('domainBreakdown');
  ALL_SUB_IDS.forEach(id => {
    const s = perSub[id];
    if(!s || s.total === 0) return;
    const p = Math.round((s.correct/s.total)*100);
    const row = document.createElement('div');
    row.className = 'domain-score';
    row.innerHTML = `<span>${id} &mdash; ${SUB_LABEL[id]}</span><span>${s.correct}/${s.total} (${p}%)</span>`;
    db.appendChild(row);
  });

  const ml = document.getElementById('missedList');
  missed.forEach(({q, chosenOrigIdx}) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    let yourAnswerHtml;
    if(chosenOrigIdx === null){
      yourAnswerHtml = `<div class="explain-box"><span class="tag bad">Not answered</span></div>`;
    } else {
      const specific = Array.isArray(q.wrongExplain) && q.wrongExplain[chosenOrigIdx];
      yourAnswerHtml = `<div class="explain-box"><span class="tag bad">Your answer</span>${escapeHtml(q.choices[chosenOrigIdx])}${specific ? ' &mdash; ' + escapeHtml(specific) : ''}</div>`;
    }
    div.innerHTML = `
      <span class="pill">${q.sub} &mdash; ${SUB_LABEL[q.sub] || q.domain}</span>
      <div class="review-q">${escapeHtml(q.q)}</div>
      ${yourAnswerHtml}
      <div class="explain-box"><span class="tag good">Correct answer</span>${escapeHtml(q.choices[q.correct])} &mdash; ${escapeHtml(q.explain)}</div>
    `;
    ml.appendChild(div);
  });

  document.getElementById('newQuizBtn').addEventListener('click', () => {
    clearSession();
    renderDashboard();
  });
}

renderDashboard();
</script>
</body>
</html>
