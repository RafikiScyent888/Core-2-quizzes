ackage manually and retry the install.","Delete SoftwareDistribution and keep rerunning Windows Update attempts.","Remove persistence offline, then repair updates.","Disable the firewall and antivirus during the next update attempt."],"correct":2,"explain":"Fake security software and similar malware often tamper with services and update components. If symptoms persist despite \"clean\" scans, use Safe Mode or an offline environment to run updated anti-malware and remove persistence, then repair Windows Update as needed. Simply retrying updates or disabling the firewall does not address the root cause."},{"id":249,"domain":"Software Troubleshooting","q":"A user needs to troubleshoot a program that is automatically launching every time they log into Windows 10, but the application is not listed in the Startup tab of Task Manager or in the Startup folder. Which of the following utilities should the technician use FIRST to locate the source of the autostart behavior?","choices":["Internet Options.","Device Manager.","Indexing Options.","System Configuration (msconfig)."],"correct":3,"explain":"System Configuration (msconfig) lets you review and selectively disable startup items and services beyond what appears in the simple Startup folder. It's a common first tool for investigating and controlling authostart behavior when the Task Manager startup list doesn't show the culprit."},{"id":250,"domain":"Software Troubleshooting","q":"A user reports they downloaded a browser extension that promised to block ads and speed up browsing, but instead their homepage was changed, search results display unwanted ads, and new toolbars appear after every restart. What is the BEST next step to troubleshoot while improving browser security?","choices":["Clear all browsing data and test the browser again.","Remove the extension and use trusted marketplaces only.","Turn off the pop-up blocker so the extension can finish setup.","Update the browser and enable hardware acceleration."],"correct":1,"explain":"The behavior indicates a malicious or unwanted extension. The best immediate step is to remove the extension and reinforce the practice of installing extensions only from trusted, verified marketplaces. Clearing cache or disabling pop-up blockers doesn't remove the underlying cause."},{"id":251,"domain":"Security","q":"A remote employee needs to access an internal company website through their browser while connected to the public internet. The site uses a self-signed certificate, and the employee wants to make sure the connection is secure without changing browser-wide security settings. What is the BEST solution?","choices":["Use private browsing mode and accept the warning each session.","Disable HTTPS protections for that internal internal site only.","Trust the site's certificate in the browser or device store.","Bypass the warning once and bookmark the page for later use."],"correct":2,"explain":"Trusting the specific self-signed certificate by importing it into the browser's trusted store ensures the connection is treated as secure for that site without globally weakening browser security. Repeatedly bypassing warnings or loosening HTTPS settings is insecure."},{"id":252,"domain":"Software Troubleshooting","q":"A SOHO user reports sudden file renaming and ransom notes appearing on a Windows 11 Home PC while it's connected to the home NAS and a shared printer. You confirm the symptoms and determine it's active ransomware. What is the BEST next step in the standard malware-removal workflow?","choices":["Immediately isolate the host from network and removable media.","Restore the system to yesterday's System Restore point.","Run a full antivirus scan and remove detected items.","Reimage the PC from factory media and rebuild the user profile."],"correct":0,"explain":"The top priority with active ransomware is to stop its spread and further encryption. The first action in the malware-removal process is to isolate the host from the network and removable media. Restoration, scanning, or reimaging may come later, but only after containment."},{"id":253,"domain":"Operational Procedures","q":"A help desk technician must view a user's Windows desktop to troubleshoot a GUI-only app. Policy requires: no inbound firewall changes, least privilege (no full admin), session recording for audit, and the ability to disable clipboard/file transfer during the session. What toolset is the BEST fit?","choices":["Use WinRM so the technician can observe the GUI app remotely.","Forward RDP through the router and connect with local admin rights.","Deploy a basic VNC tool with a shared team password.","Use an enterprise RMM tool with consent and session controls."],"correct":3,"explain":"An enterprise RMM (remote monitoring and management) platform can provide outbound-only remote control, fine-grained permissions, session recording, consent prompts, and policy controls for clipboard/file transfer. Opening inbound ports or using unsecured VNC conflicts with the security and audit requirements."},{"id":254,"domain":"Software Troubleshooting","q":"A user reports that their browser homepage was changed without permission, and pop-ups now appear even after switching to a different browser. Antivirus found no known threats. Task Manager only shows legitimate processes. What is the MOST appropriate method to remove this threat fully?","choices":["Run a rootkit scanner to remove hidden malicious kernel components.","Use an anti-malware tool to detect & remove a potentially unwanted program (PUP).","Remove the browser and reinstall it using the default settings.","Restore from a recent backup and reapply all system updates."],"correct":1,"explain":"Homepage hijacks and persistent pop-ups across browsers are often caused by PUPs or adware rather than classic viruses. A reputable anti-malware tool that targets PUPs is the most appropriate first remediation step."},{"id":255,"domain":"Operational Procedures","q":"A small accounting firm stores its server and a network switch in a backroom that shares space with a copier and several boxes of paper. The server recently shut down due to overheating, and an inspection revealed thick dust buildup inside the case and around vents. What is the BEST long-term solution to reduce the likelihood of repeated hardware failures?","choices":["Install a surge suppressor and plug the server into its own outlet.","Move the server to a climate-controlled, ventilated area.","Raise server fan speeds in BIOS and replace the thermal paste annually.","Use canned compressed air monthly to clean the server and switch ports."],"correct":1,"explain":"The core issue is poor environment: dust, heat, and lack of airflow. Moving the server to a dedicated, climate-controlled, and clean area is the best long-term solution. Cleaning dust helps but does not fix the underlying heat and airflow problems."},{"id":256,"domain":"Operating Systems","q":"A technician needs to transfer large files between a Windows 10 PC and an Android smartphone. The files are over 10 GB each. Which filesystem format should the technician use on a USB flash drive to ensure compatibility and support for large files?","choices":["NTFS.","FAT32.","exFAT.","ReFS."],"correct":2,"explain":"exFAT is widely supported by modern Windows and Android devices and supports large file sizes beyond the 4 GB limit of FAT32. NTFS and ReFS are not as universally supported on mobile devices."},{"id":257,"domain":"Operating Systems","q":"An IT admin needs to create a detailed performance baseline for a Windows Server to monitor key counters like disk I/O, memory usage, and network throughput over several days. Which tool provides the MOST robust way to collect and analyze this data over time?","choices":["Resource Monitor (resmon.exe).","Performance Monitor (perfmon).","Task Manager's Performance tab.","System Information (msinfo32.exe)."],"correct":1,"explain":"Performance Monitor (perfmon) can create Data Collector Sets, log performance counters over time, and generate reports. This makes it ideal for building baselines and long-term analysis. Task Manager and Resource Monitor are more for real-time observation."},{"id":258,"domain":"Operating Systems","q":"Users with roaming profiles experience very slow logons and logoffs. Their profiles contain large browser caches and video conference remnants in AppData. What is the BEST remediation?","choices":["Disable Windows Search on all endpoints that use roaming profiles.","Enable Fast Startup and hibernation to speed each sign-in.","Delete roaming profiles at each logon so users start fresh daily.","Redirect user folders and exclude cache paths from roaming."],"correct":3,"explain":"Large, frequently changing cache data should not roam. Redirecting common user folders to OneDrive or network locations and excluding cache directories from roaming profiles reduces profile size and speeds up logon/logoff while preserving user data."},{"id":259,"domain":"Operating Systems","q":"You need a persistent mapped drive to a workgroup NAS from a domain-joined Windows client. The NAS requires local credentials (NAS\backupuser). The mapping should survive reboots and use the supplied credentials automatically. Which command accomplishes this MOST directly?","choices":["net use Z: \\NAS\\share /savecred.","net use Z: \\NAS\\share /smartcard /persistent:yes.","net use Z: \\NAS\\share /persistent:no /user:backupuser.","net use Z: \\NAS\\share /user:NAS\backupuser /persistent:yes."],"correct":3,"explain":"The /persistent:yes flag ensures the mapping survives reboots, and /user:NAS\backupuser supplies the correct local NAS account. The other options either omit persistence or the proper user format."},{"id":260,"domain":"Security","q":"A user connects to a public Wi-Fi hotspot labeled \"CoffeeShop_WiFi\" that does not require a password. The user browses the web and logs into their personal email without issue. Later, sensitive information appears to have been intercepted. Which threat BEST describes what likely occurred?","choices":["An insider threat from a coffee shop employee.","A smishing campaign tied to an SMS login prompt.","An on-path attack through an evil twin hotspot.","A cross-site scripting issue inside the email website."],"correct":2,"explain":"An evil twin access point mimics a legitimate public SSID and allows an attacker to intercept or modify traffic (on-path attack). Open Wi-Fi with no authentication makes it easy to perform this kind of attack."},{"id":261,"domain":"Security","q":"A user's banking app refuses to open, citing \"security risk detected.\" The user previously installed apps through AltStore and enabled Developer Mode; they also used a tweak manager months ago. Storage and connectivity are fine. What is the MOST appropriate fix?","choices":["Update carrier settings and then sign back into the app.","Turn off Developer Mode but keep the existing frameworks in place.","Reinstall the banking app from the App Store only.","Restore the device to stock and remove jailbreak frameworks."],"correct":3,"explain":"Banking apps often refuse to run on devices that appear rooted, jailbroken, or heavily modified. Fully restoring iOS to a clean, stock state and removing all sideloaded/jailbreak frameworks is the most appropriate way to meet the app's security expectations."},{"id":262,"domain":"Operational Procedures","q":"You replaced a user's motherboard under warranty. The endpoint management tool now shows a new hardware serial, but the CMDB still lists the old serial, and one paid software license is assigned to the retired hardware entry. What is the BEST action to maintain accurate records and compliance?","choices":["Leave the CMDB unchanged because the endpoint tool already updated.","Remove the paid license until the next audit cycle finishes.","Update the CMDB, retire the old CI, and reassign licenses.","Write a knowledge base article about duplicate serial numbers."],"correct":2,"explain":"The CMDB is the system of record for assets and configuration items. Updating the CI with the new serial, linking RMA documents, retiring the outdated CI, and correctly associating licenses and warranties maintains compliance and accurate tracking while keeping the same asset tag and user."},{"id":263,"domain":"Operating Systems","q":"A project team complains their \"Project_A\" folder isn't syncing to the company's cloud storage client on Windows 11. The files live in C:\\Data\\Project_A, and the user created a shortcut to that folder inside the OneDrive sync root. The cloud client shows no errors, but nothing from Project_A appears online. What is the MOST appropriate fix?","choices":["Move the actual folder into the OneDrive sync scope.","Use Choose Folders to add any path outside the OneDrive root.","Enable Known Folder Move for Documents to pull the project folder in.","Turn on Files On-Demand and mark the shortcut always available."],"correct":0,"explain":"OneDrive syncs real files and folders that live under its root, not shortcuts pointing elsewhere. Moving the actual Project_A folder into the OneDrive sync scope (or moving the root to cover it) ensures the content is synced."},{"id":264,"domain":"Security","q":"A company wants to move from a shared passphrase Wi-Fi to per-user authentication that can be revoked centrally. Security requires unique session keys, integration with Active Directory, and a preference for certificate-based auth to avoid password reuse. Which configuration BEST meets these goals?","choices":["WPA2-Personal with AES and more frequent PSK rotation.","Use WPA2 or WPA3 Enterprise with 802.1X and EAP-TLS.","WPA3-Personal with a stronger passphrase and shorter rekey interval.","WPA2-Enterprise with only a captive portal and local AP users."],"correct":1,"explain":"WPA2/WPA3-Enterprise with 802.1X and RADIUS provides per-user authentication, unique session keys, and central control. Using EAP-TLS with certificates ties well into AD and avoids password reuse. Personal modes use a shared PSK and do not provide per-user revocation."},{"id":265,"domain":"Operating Systems","q":"A line-of-business service starts, then stops after a few seconds. The startup type is already Automatic, and restarting it fails. You suspect a dependency or logon issue. What is the BEST first step to isolate cause?","choices":["Review SCM events, dependencies, and the service logon account.","Change the service to Automatic Delayed Start and reboot.","Run DISM and SFC before checking any service-level data.","Reset the TCP/IP stack because most service failures are networking related."],"correct":0,"explain":"When services start and then stop, Event Viewer (Service Control Manager logs) is the primary place to look for detailed error messages. Reviewing service dependencies and the Log On account credentials helps determine whether a missing dependency or bad account is causing the failure."},{"id":266,"domain":"Operating Systems","q":"A developer is troubleshooting a custom app that keeps crashing on startup. They suspect a missing DLL or .NET version conflict is the cause. Which MMC snap-in allows them to review application-specific error logs to verify this?","choices":["Local Users and Groups (lusrmgr.msc).","Task Scheduler (taskschd.msc).","Event Viewer (eventvwr.msc).","Disk Management (diskmgmt.msc)."],"correct":2,"explain":"Event Viewer provides access to Application logs where .NET and application crashes are recorded. These logs can show missing DLLs, unhandled exceptions, or version conflicts."},{"id":267,"domain":"Security","q":"An employee reports finding unauthorized credit card numbers and government-issued ID scans stored in a coworker's personal cloud folder that syncs to a corporate workstation. You confirm the files exist and believe this violates company policy and possibly law. What is the BEST immediate action to take?","choices":["Confront the coworker and ask them to explain the files.","Disconnect the workstation and wait for legal to contact IT.","Preserve evidence and escalate per incident response.","Delete the files immediately to prevent misuse."],"correct":2,"explain":"This is a serious potential security and legal incident. The correct response is to follow the incident response plan: preserve evidence, document findings, and escalate to management/legal. Deleting files or confronting the coworker informally can damage evidence and violate procedure."},{"id":268,"domain":"Software Troubleshooting","q":"A system administrator notices that CPU usage on several workstations spikes to 100% during non-business hours. No new software has been installed recently, and antivirus scans show no flagged files. After further investigation, the admin finds a constantly running background process that doesn't correspond to an installed application. What type of malware is MOST likely responsible?","choices":["Boot sector virus.","Fileless malware.","Cryptominer.","Ransomware."],"correct":2,"explain":"Persistent, high CPU usage with a mysterious background process\u2014especially during idle periods\u2014strongly suggests a cryptominer, which uses system resources to mine cryptocurrency without user consent."},{"id":269,"domain":"Security","q":"A branch-office Linux server (no GUI) sits behind a NAT router. The site's firewall allows only outbound 443. You must administer the box via command line and transfer config files, while meeting corporate requirements for strong authentication and centralized logging; you may not open any new inbound ports. Which approach BEST fits?","choices":["Expose SSH on the router and allow password logins from your IP.","Install VNC because it will work through NAT with minimal setup.","Use the corporate SSL VPN over 443, then SSH and SFTP.","Port-forward RDP to a jump box and reach Linux through that system."],"correct":2,"explain":"Using the company's SSL VPN over outbound 443 satisfies the firewall constraint while providing secure, authenticated access. Once on the VPN, you can SSH/SFTP with key-based authentication and logging, meeting strong auth and audit requirements without opening new inbound ports."},{"id":270,"domain":"Security","q":"A post-production workstation will connect to a 40 GbE storage fabric using RDMA, needs to create and manage ReFS volumes for large media datasets, must host inbound RDP sessions, and should be purchasable through standard OEM/retail channels (no volume agreement). Which edition is MOST appropriate?","choices":["Windows 10 Pro for Workstations.","Windows 11 Home.","Windows 10 Enterprise.","Windows 10 Pro."],"correct":0,"explain":"Windows 10 Pro for Workstations adds support for RDMA, ReFS, and high-end hardware features while being available through standard OEM/retail channels. Enterprise typically requires volume licensing agreements."},{"id":271,"domain":"Operational Procedures","q":"Your e-commerce API has a critical, actively exploited vulnerability. The vendor has released a hotfix that requires a 20\u201330 minute outage. Your company has a nightly maintenance window (1\u20133 a.m.), but it's currently 10 a.m. and attacks are escalating. A temporary WAF rule reduces (but does not eliminate) the risk. What is the BEST next step under change management?","choices":["Wait for the next maintenance window and handle it as a normal change.","Apply the WAF rule and delay patching until the next CAB meeting.","Open an emergency change with rollback and approvals.","Deploy the hotfix immediately and fill out the paperwork afterward."],"correct":2,"explain":"An actively exploited, high-risk vulnerability justifies an emergency change. Proper process still applies: submit an emergency change request, document the risk and rollout/rollback plans, get expedited approval, notify stakeholders, apply the fix, and perform a post-change review."},{"id":272,"domain":"Operating Systems","q":"A student is using a Chromebook in class and learns that it relies mostly on web-based applications and cloud storage. Which underlying operating system does Chrome OS use?","choices":["Unix variant.","Linux kernel.","Windows NT kernel.","BSD-based kernel."],"correct":1,"explain":"Chrome OS is built on top of the Linux kernel. It layers Google's user interface and web-centric environment on a Linux base."},{"id":273,"domain":"Operating Systems","q":"A user reports sudden battery drain after installing a fitness tracking app. Battery usage shows the app high on the list with constant Location access and background activity. What is the BEST remediation?","choices":["Restrict Location to \"While Using\" and disable background refresh.","Turn off Bluetooth and Wi-Fi when not in use.","Uninstall and reinstall the app without restoring its data.","Lower the screen brightness and set the screen timeout to the minimum."],"correct":0,"explain":"The fitness app is consuming power by constantly using location services and running in the background. Restricting Location to \"While Using\" and disabling unnecessary background activity directly addresses the cause while still allowing the app to function."},{"id":274,"domain":"Operating Systems","q":"A Windows user cannot install a driver because the installer requires elevated privileges. What is the best next step?","choices":["Run installer as administrator mode.","Run installer in compatibility mode.","Run installer from a local folder.","Run installer after clean boot state."],"correct":0,"explain":"Driver installs typically require administrative privileges. Use Run as administrator or provide admin credentials\u2014do not bypass security controls."},{"id":275,"domain":"Operating Systems","q":"A user reports Windows takes much longer to boot after recent software installs. Which tool is best to review startup impact?","choices":["Task Manager Startup tab view.","System Configuration startup services list.","Resource Monitor startup impact view.","Task Scheduler startup trigger list."],"correct":0,"explain":"Task Manager\u2019s Startup tab shows startup apps and their impact, allowing you to disable unnecessary items."},{"id":276,"domain":"Operating Systems","q":"A Windows PC repeatedly blue-screens immediately after a new storage controller driver update. What is the best immediate recovery action?","choices":["Boot to Safe Mode and roll back.","Boot to Safe Mode and disable device.","Boot to Safe Mode and uninstall driver.","Boot to Safe Mode and update driver."],"correct":0,"explain":"Safe Mode loads minimal drivers, enabling rollback/uninstall of the problematic driver to restore stability."},{"id":277,"domain":"Operating Systems","q":"A user needs to encrypt their entire Windows system drive with TPM integration. Which feature should be enabled?","choices":["BitLocker full disk encryption.","BitLocker To Go removable drive encryption.","EFS file and folder encryption.","Device encryption for supported hardware."],"correct":0,"explain":"BitLocker provides full-disk encryption and commonly integrates with TPM for key protection."},{"id":278,"domain":"Operating Systems","q":"A user on macOS needs to take a screenshot of a selected region only. Which shortcut is correct?","choices":["Shift + Command + 4 pressed.","Shift + Command + 3 pressed.","Control + Shift + Command + 4 pressed.","Command + Option + 4 pressed."],"correct":0,"explain":"On macOS, Shift+Command+4 captures a selected region (Shift+Command+3 captures the entire screen)."},{"id":279,"domain":"Operating Systems","q":"A Linux admin needs to view IP addressing and link status on a modern distro. Which command is best?","choices":["ip addr show command output.","ifconfig interface status command.","nmcli device status command.","ip link show command output."],"correct":0,"explain":"ip addr show (or ip a) is the modern replacement for ifconfig on many distributions."},{"id":280,"domain":"Security","q":"A user receives an email attachment named invoice.zip from an unknown sender and their AV flags it. What is the best action?","choices":["Quarantine and report to security.","Submit attachment for secure analysis.","Verify sender headers before action.","Delete attachment and block sender."],"correct":0,"explain":"Treat as suspicious: quarantine and report per policy. Do not disable protections or spread the file."},{"id":281,"domain":"Security","q":"A technician is disposing of several old SSDs that stored customer data. What is the best method to prevent data recovery?","choices":["Perform secure erase and destroy.","Perform approved media sanitization.","Remove partitions before disposal.","Overwrite and decommission the drive."],"correct":0,"explain":"SSDs should be securely erased (vendor secure erase) and, for high assurance, physically destroyed per policy."},{"id":282,"domain":"Security","q":"A user\u2019s account was compromised after reusing a password across sites. What control most directly reduces this risk going forward?","choices":["Use MFA and unique passwords.","Use only a longer master password.","Enable password manager autofill only.","Change passwords every week only."],"correct":0,"explain":"Unique passwords prevent credential-stuffing spread; MFA adds a second factor to reduce takeover risk."},{"id":283,"domain":"Security","q":"A workstation shows pop-ups and browser redirects even after closing the browser. Which type of threat is most likely?","choices":["Adware or browser hijacker threat.","Malicious browser extension persistence.","Potentially unwanted program activity.","Search homepage redirect malware."],"correct":0,"explain":"Pop-ups/redirects are classic adware/hijacker symptoms; investigate extensions, PUPs, and run scans."},{"id":284,"domain":"Security","q":"A user wants to securely connect to their corporate network from a hotel Wi-Fi. Which solution is best?","choices":["VPN to corporate gateway tunnel.","SSL VPN client to corporate portal.","Always-on VPN profile connection.","IPsec remote access tunnel."],"correct":0,"explain":"A VPN provides encrypted, authenticated remote access without exposing internal services directly."},{"id":285,"domain":"Security","q":"A technician finds a door to the server room propped open. What type of control is primarily being violated?","choices":["Physical security access control.","Badge-based entry authorization.","Mantrap or locked access control.","Surveillance and visitor escort control."],"correct":0,"explain":"An open server-room door bypasses physical controls like locks/badges and increases risk of unauthorized access."},{"id":286,"domain":"Security","q":"A user\u2019s laptop is stolen. The drive was encrypted, but the user is worried about accounts. What should be done first?","choices":["Disable accounts and revoke tokens.","Reset password and revoke sessions.","Disable VPN and remote access only.","Force password change at next sign-in."],"correct":0,"explain":"Even with disk encryption, revoke credentials/sessions, reset passwords, and follow incident procedures."},{"id":287,"domain":"Software Troubleshooting","q":"Windows Update fails with insufficient disk space. What is the best next step?","choices":["Run Disk Cleanup and free space.","Run Storage Sense and remove temp files.","Move update cache to another volume.","Uninstall recent feature packages first."],"correct":0,"explain":"Updates require free space. Use Disk Cleanup, remove temporary files, and consider moving data off the drive."},{"id":288,"domain":"Software Troubleshooting","q":"A user can browse the internet but cannot reach internal file shares by name. They can reach them by IP. What is most likely wrong?","choices":["DNS configuration or name service.","Hosts file or local resolver mismatch.","Wrong UNC share name in mapping.","Internal namespace suffix issue."],"correct":0,"explain":"IP works but name fails indicates name resolution issues such as DNS suffix, DNS server settings, or records."},{"id":289,"domain":"Software Troubleshooting","q":"A Windows user reports that a single application crashes on launch after a recent patch. Other apps work. What is the best first step?","choices":["Reinstall or repair that app.","Repair the app installation package.","Reset the app profile and cache.","Reinstall the app dependencies."],"correct":0,"explain":"Isolated app failure is best addressed by repair/reinstall and checking app logs/compatibility settings first."},{"id":290,"domain":"Software Troubleshooting","q":"A user\u2019s system is extremely slow and the disk LED stays on constantly. Task Manager shows high disk usage by a process. What should be used next?","choices":["Resource Monitor for disk details.","Performance Monitor disk queue counters.","Task Manager process resource view.","Event Viewer disk warning review."],"correct":0,"explain":"Resource Monitor provides detailed disk I/O per process to identify what is causing sustained disk saturation."},{"id":291,"domain":"Software Troubleshooting","q":"A user is locked out after too many failed logins. What is the best action in a managed environment?","choices":["Follow policy to unlock account.","Reset password through approved policy.","Wait for lockout timer to expire.","Escalate to directory services admin."],"correct":0,"explain":"Account lockouts should be handled per policy\u2014verify identity, unlock/reset, and investigate possible attacks."},{"id":292,"domain":"Operating Systems","q":"A technician needs to see detailed IP configuration including DNS servers in Windows. Which command is best?","choices":["ipconfig /all command output.","ipconfig /renew command output.","route print command output.","netstat -an command output."],"correct":0,"explain":"ipconfig /all shows IP, mask, gateway, DHCP, DNS, and adapter details."},{"id":293,"domain":"Operating Systems","q":"A technician needs to verify name resolution from a Windows PC. Which command is best?","choices":["nslookup host query command.","ping host query command.","ipconfig /displaydns command.","tracert host lookup command."],"correct":0,"explain":"nslookup queries DNS directly and helps confirm whether a hostname resolves correctly."},{"id":294,"domain":"Operating Systems","q":"A Windows system file corruption is suspected after repeated application errors. Which tool should be run first?","choices":["Run sfc /scannow command.","Run DISM /RestoreHealth command.","Run chkdsk /scan command.","Run Startup Repair tool first."],"correct":0,"explain":"System File Checker verifies and repairs protected system files; it\u2019s a standard first step for OS integrity issues."},{"id":295,"domain":"Operating Systems","q":"A Linux user needs to list running processes with their PIDs. Which command is best?","choices":["ps aux process listing output.","top live process display output.","pgrep process query output.","systemctl service status output."],"correct":0,"explain":"ps aux shows a snapshot of running processes. top/htop are interactive alternatives."},{"id":296,"domain":"Operating Systems","q":"A technician needs to manage running services on Windows. Which console is best?","choices":["services.msc management console.","Task Manager services tab view.","Computer Management services node.","taskschd.msc scheduling console."],"correct":0,"explain":"services.msc is the Services snap-in used to start/stop/configure Windows services."},{"id":297,"domain":"Operating Systems","q":"A user needs to roll back to a previous working state after a bad driver install, but keep their documents. Which option is best?","choices":["Use System Restore point tool.","Use driver rollback from Device Manager.","Use Last Known Good style recovery.","Use application uninstall and reinstall."],"correct":0,"explain":"System Restore rolls back system changes (drivers/registry) while typically keeping personal files."},{"id":298,"domain":"Operating Systems","q":"A technician wants to view critical system errors and warnings to troubleshoot random restarts. Which tool should be used?","choices":["Event Viewer log inspection tool.","Reliability Monitor stability history tool.","Resource Monitor system activity tool.","Task Scheduler operational log tool."],"correct":0,"explain":"Event Viewer contains system/application logs including crash and shutdown events with timestamps and details."},{"id":299,"domain":"Operating Systems","q":"A user needs to run older software that fails on Windows 11 due to legacy behavior. What feature is best to try first?","choices":["Compatibility mode for the app.","Windows Sandbox for the app.","Hyper-V virtual machine isolation.","Program Compatibility Troubleshooter wizard."],"correct":0,"explain":"Compatibility mode can emulate older OS behaviors for specific apps without weakening system security broadly."},{"id":300,"domain":"Software Troubleshooting","q":"A user reports their PC is encrypting files and demanding payment. What is the best immediate action?","choices":["Isolate device from the network.","Disconnect mapped drives and shares.","Power off the device immediately.","Disable the infected user account."],"correct":0,"explain":"Ransomware containment starts with isolation to stop spread/exfiltration, then follow incident response procedures."},{"id":301,"domain":"Software Troubleshooting","q":"A malware infection is suspected. What should be done before attempting removal to preserve evidence in a business setting?","choices":["Document symptoms and actions taken.","Capture evidence and preserve logs.","Isolate the host from the network.","Notify security and follow process."],"correct":0,"explain":"Document symptoms and actions to support incident handling, chain-of-custody, and future prevention."},{"id":302,"domain":"Software Troubleshooting","q":"A technician needs the most effective way to remove persistent malware on a user PC in a high-risk scenario. What is best?","choices":["Back up data then reimage system.","Use Safe Mode with offline scanning.","Use recovery tools and malware cleanup.","Restore from known good backup."],"correct":0,"explain":"For severe/persistent infections, reimaging from a known-good source is often the most reliable remediation."},{"id":303,"domain":"Operational Procedures","q":"A technician needs to remotely assist a Windows user and view their desktop with consent. Which built-in tool is appropriate?","choices":["Quick Assist remote support tool.","Remote Assistance support session.","Remote Desktop with user handoff.","Microsoft Teams screen share."],"correct":0,"explain":"Quick Assist is a built-in Windows remote assistance tool designed for user consent and screen sharing."},{"id":304,"domain":"Operational Procedures","q":"A user can access a shared folder but cannot save files to it. Other users can. What is the most likely cause?","choices":["Share or NTFS permissions issue.","Read-only share permission assignment.","NTFS modify permission not granted.","Offline files cache credential issue."],"correct":0,"explain":"If access works but write fails, permissions (share/NTFS) are the likely cause for that specific user."},{"id":305,"domain":"Operational Procedures","q":"A technician is about to make a risky change on a production PC. What should be done first?","choices":["Obtain approval and plan rollback.","Document scope and risk first.","Verify backup and rollback steps first.","Notify affected users before change."],"correct":0,"explain":"Follow change management: approvals, backups/restore points, maintenance windows, and rollback planning."},{"id":306,"domain":"Operational Procedures","q":"A technician resolves an issue. What is the next best step per troubleshooting best practice?","choices":["Document solution and close ticket.","Verify full functionality with user.","Update documentation and knowledge base.","Escalate to higher-tier support."],"correct":0,"explain":"Documentation is a required final step: symptoms, cause, fix, and preventive recommendations."},{"id":307,"domain":"Operational Procedures","q":"A technician is asked to work on a user\u2019s system containing sensitive data. What is the most appropriate behavior?","choices":["Follow privacy policy and consent.","Obtain user permission before access.","Limit handling to necessary data only.","Follow company confidentiality process."],"correct":0,"explain":"Respect privacy, obtain consent, and follow policy. Access only what is necessary for the task."},{"id":308,"domain":"Operating Systems","q":"A user wants to prevent unauthorized app installs on a company-owned phone. What is the best control?","choices":["MDM with app allow/deny policy.","Disable unknown sources installation.","Apply device owner restrictions.","Require managed app deployment."],"correct":0,"explain":"Mobile device management can enforce app restrictions, installation controls, and compliance policies."},{"id":309,"domain":"Operating Systems","q":"A user\u2019s phone battery drains rapidly after installing a \u201cfree VPN\u201d app. What is the best first step?","choices":["Uninstall app and review permissions.","Review app battery and data usage.","Restrict app background permissions.","Confirm app source and reputation."],"correct":0,"explain":"Suspicious apps often abuse permissions/background activity. Remove it and review permissions/usage before drastic steps."},{"id":310,"domain":"Operational Procedures","q":"A technician uses a script to map drives for multiple users at logon. What is the primary benefit of scripting here?","choices":["Consistent repeatable configuration.","Reusable automated user provisioning.","Scalable repeatable logon configuration.","Reduced manual mapping errors."],"correct":0,"explain":"Scripting automates repetitive tasks consistently across many endpoints, reducing manual errors and time."},{"id":311,"domain":"Security","q":"A technician needs to restrict unknown applications from running on Windows endpoints. Which control is best?","choices":["Application allowlisting control.","Software restriction policy control.","Managed endpoint application policy.","Publisher-based code execution control."],"correct":0,"explain":"Allowlisting permits only approved executables, reducing risk from unknown/malicious programs."},{"id":312,"domain":"Security","q":"A user\u2019s PC has a BIOS password but the OS still boots to the login screen without it. What is most likely happening?","choices":["BIOS password set for setup only.","UEFI boot password not user password.","Drive password not enabled at boot.","Fast startup bypassing prompt flow."],"correct":0,"explain":"Many systems allow a BIOS/UEFI password for entering setup only, not a power-on password."},{"id":313,"domain":"Operating Systems","q":"A technician needs to renew a DHCP lease on a Windows PC. Which command is correct?","choices":["ipconfig /renew command used.","ipconfig /release command used.","ipconfig /flushdns command used.","netsh interface reset command."],"correct":0,"explain":"ipconfig /renew requests a new DHCP lease for the adapter(s)."},{"id":314,"domain":"Operational Procedures","q":"A user deleted a document yesterday and needs it back. Backups exist. What is the best action?","choices":["Restore from backup or versioning.","Restore previous file version copy.","Recover file from File History.","Recover file from backup snapshot."],"correct":0,"explain":"Use backups/version history first. Hardware replacement and OS reinstall are not appropriate initial responses."},{"id":315,"domain":"Operational Procedures","q":"A Windows PC will not boot after a failed update. The user needs files preserved. What is the best option first?","choices":["Use Windows recovery environment.","Use Startup Repair from WinRE.","Use System Restore from WinRE.","Use Safe Mode from WinRE."],"correct":0,"explain":"WinRE offers Startup Repair, uninstall updates, restore points, and advanced tools while preserving data."},{"id":316,"domain":"Operating Systems","q":"A macOS user reports the system is running slowly and storage is nearly full. What is the best first action?","choices":["Review storage and remove large items.","Review storage in System Settings.","Use About This Mac storage tools.","Move large files off local disk."],"correct":0,"explain":"Low disk space can severely affect performance. Review storage usage and remove/move large files first."},{"id":317,"domain":"Operating Systems","q":"A Linux user cannot execute a script and receives a permission denied error. What is the best fix?","choices":["Add execute permission with chmod.","Run script with sudo command.","Change ownership with chown command.","Launch script with bash filename."],"correct":0,"explain":"Permission denied often means the executable bit is missing. chmod +x sets execute permissions appropriately."},{"id":318,"domain":"Security","q":"A user\u2019s email client fails to connect securely and reports a certificate name mismatch. What is the most likely cause?","choices":["Server name does not match cert.","Untrusted issuing CA on server.","Expired server certificate on host.","Client clock skew breaks validation."],"correct":0,"explain":"A name mismatch occurs when the hostname used does not match the certificate\u2019s subject/SAN."},{"id":319,"domain":"Operating Systems","q":"A user can read a file but cannot modify it on an NTFS volume. What is the most likely reason?","choices":["NTFS permissions deny write access.","Read permission without modify rights.","Inherited permissions block editing.","Share access differs from NTFS access."],"correct":0,"explain":"Read without modify commonly indicates NTFS permissions or inherited ACLs that do not grant write/modify."},{"id":320,"domain":"Operating Systems","q":"A user wants email to stay on the server and sync state across devices. Which protocol best fits?","choices":["IMAP synchronized mailbox access.","POP3 local mailbox retrieval.","SMTP outgoing mail transport.","Exchange ActiveSync synchronization."],"correct":0,"explain":"IMAP keeps messages on the server and synchronizes status across multiple devices."},{"id":321,"domain":"Software Troubleshooting","q":"A user can print to a network printer by IP but not by printer name. Other users print by name. What is the best first check?","choices":["Verify client DNS and name records.","Verify printer share path syntax.","Verify print server hostname resolution.","Verify stale hosts file entry."],"correct":0,"explain":"If IP works but name fails for one client, it\u2019s likely client DNS settings or name resolution rather than printer hardware."},{"id":322,"domain":"Operational Procedures","q":"A user asks to disable OS updates because they are inconvenient. What is the best response?","choices":["Explain risks and follow patch policy.","Explain update delay increases exposure.","Offer a maintenance window instead.","Escalate if user refuses policy."],"correct":0,"explain":"Disabling updates increases risk. Follow organizational policy and schedule updates with minimal disruption."},{"id":323,"domain":"Security","q":"A technician discovers a user connected to a rogue access point named like the corporate SSID. What is the best immediate action?","choices":["Disconnect and report security incident.","Forget the SSID and disable Wi-Fi.","Switch to cellular or known network.","Capture details and notify security."],"correct":0,"explain":"A spoofed SSID suggests an evil twin attack. Disconnect, capture details if allowed, and report per incident procedures."},{"id":324,"domain":"Operational Procedures","q":"A technician needs a repeatable process to ensure all steps are followed during workstation deployment. What document is best?","choices":["Standard operating procedure checklist.","Runbook for deployment workflow.","Standardized deployment procedure guide.","Build validation checklist document."],"correct":0,"explain":"SOPs and checklists standardize procedures, improve consistency, and support auditing/training."},{"id":325,"domain":"Security","q":"A user\u2019s browser warns that a website certificate is untrusted. What is the safest guidance?","choices":["Do not proceed and verify site.","Verify URL and certificate details.","Use trusted bookmark to reach site.","Contact organization through known channel."],"correct":0,"explain":"Untrusted cert warnings can indicate MITM or misconfiguration. Avoid proceeding and verify the legitimate site identity."},{"id":326,"domain":"Operating Systems","q":"A technician is installing Windows on a UEFI system with Secure Boot enabled. Which partition style is typically required?","choices":["GPT partition style for UEFI boot.","MBR partition style for legacy BIOS.","UEFI-compatible FAT32 boot structure.","Partition style matching firmware mode."],"correct":0,"explain":"UEFI installs typically use GPT (with an EFI System Partition). MBR is common for legacy BIOS installs."},{"id":327,"domain":"Security","q":"A manager wants all staff to have local admin rights to reduce helpdesk tickets. What principle argues against this?","choices":["Least privilege access principle.","Separation of duties principle.","Need-to-know access principle.","Role-based access assignment principle."],"correct":0,"explain":"Least privilege limits permissions to what\u2019s required, reducing attack surface and accidental system changes."},{"id":328,"domain":"Software Troubleshooting","q":"A technician is diagnosing an intermittent issue and wants to identify the most likely cause quickly. What should be done first?","choices":["Question user and identify changes.","Question the user and note changes.","Establish theory of probable cause.","Check for recent updates or actions."],"correct":0,"explain":"Start with information gathering: identify symptoms, reproduce if possible, and note recent changes before invasive actions."},{"id":329,"domain":"Operational Procedures","q":"A user repeatedly falls for phishing emails. What is the most effective long-term control?","choices":["Security awareness training program.","Enable MFA for all email logins.","Use phishing-resistant sign-in prompts.","Simulated phishing with follow-up coaching."],"correct":0,"explain":"Awareness training plus reporting procedures reduces successful phishing and improves user behavior over time."},{"id":330,"domain":"Software Troubleshooting","q":"A Windows PC is slow and Task Manager shows very high memory usage with heavy paging. Which upgrade most directly helps?","choices":["Add additional RAM to the system.","Install faster SSD storage device.","Upgrade CPU to higher core count.","Reduce startup app memory use."],"correct":0,"explain":"High paging indicates insufficient RAM. Adding RAM reduces disk swapping and improves responsiveness."},{"id":331,"domain":"Security","q":"A technician needs to allow Remote Desktop from the local subnet only. What is the best configuration to change?","choices":["Firewall rule scope to local subnet.","Remote Desktop firewall profile rule.","Allowed users on Remote Desktop list.","NLA and RDP listener configuration."],"correct":0,"explain":"Use a host firewall rule permitting RDP and scope it to the local subnet; avoid exposing RDP to the internet."},{"id":332,"domain":"Operating Systems","q":"A company wants to lock and wipe mobile devices that are lost, even if offsite. What capability enables this?","choices":["MDM remote lock and wipe feature.","Mobile device management platform.","Corporate device enrollment policy.","Managed compliance and access controls."],"correct":0,"explain":"MDM supports remote lock/wipe, compliance checks, and device tracking depending on platform/policy."},{"id":333,"domain":"Operational Procedures","q":"A technician must query many Windows PCs for installed patches. Which tool is most appropriate?","choices":["PowerShell remote query scripting.","WSUS or update reporting console.","WMIC remote query command set.","Endpoint management inventory report."],"correct":0,"explain":"PowerShell can query installed updates remotely at scale, reducing time and improving consistency."},{"id":334,"domain":"Operating Systems","q":"A user installs an app and it only affects their own profile, not other users on the PC. Which installation type was likely used?","choices":["Per-user installation for profile.","Machine-wide installation for all users.","Portable application in user profile.","Store app deployment to one account."],"correct":0,"explain":"Per-user installs typically write to the user profile and do not apply system-wide for all users."},{"id":335,"domain":"Security","q":"A caller claims to be from IT and asks for the user\u2019s MFA code to \u201cverify identity.\u201d What is the best user action?","choices":["Refuse and report the attempt.","Hang up and contact IT directly.","Refuse the code and verify caller.","Report the social engineering attempt."],"correct":0,"explain":"MFA codes should never be shared. This is a classic social engineering attempt\u2014refuse and report per policy."},{"id":336,"domain":"Operational Procedures","q":"A Windows PC fails to start and shows repeated automatic repair loops. Which tool is most appropriate first?","choices":["Startup Repair in WinRE tools.","System Restore in WinRE tools.","Safe Mode with command prompt.","Boot configuration repair commands."],"correct":0,"explain":"WinRE Startup Repair can fix common boot issues. If it fails, use advanced recovery options."},{"id":337,"domain":"Security","q":"A user delays installing critical security patches for weeks. What is the most accurate risk?","choices":["Exposure to known exploits increases.","Delayed remediation of known CVEs.","Higher likelihood of exploit compromise.","Extended window for attacker use."],"correct":0,"explain":"Delaying patches leaves systems vulnerable to publicly known vulnerabilities with existing exploit code."},{"id":338,"domain":"Operating Systems","q":"A user needs to log in while off the corporate network using the same credentials as in the office. Which account type best supports this?","choices":["Domain account with cached creds.","Local account with synced password.","Azure AD account with offline cache.","Federated sign-in with offline token."],"correct":0,"explain":"Domain accounts can use cached credentials for offline logon depending on policy and prior authentication."},{"id":339,"domain":"Security","q":"A technician is hardening a PC and wants to reduce attack surface by removing unnecessary applications. What is this called?","choices":["Reducing attack surface by hardening.","Removing unnecessary services and apps.","Disabling unused features and ports.","Minimizing exposed attack vectors."],"correct":0,"explain":"Hardening includes removing unnecessary software/services to reduce the attack surface."},{"id":340,"domain":"Operating Systems","q":"A Windows external drive must be writable by both Windows and macOS without additional drivers. Which file system is best?","choices":["exFAT cross-platform file system.","FAT32 universal compatibility file system.","NTFS native Windows permissions file system.","APFS Apple-native solid state format."],"correct":0,"explain":"exFAT is broadly supported by Windows and macOS for read/write and is common for external media."},{"id":341,"domain":"Security","q":"A technician finds RDP exposed directly to the internet on TCP 3389. What is the best remediation?","choices":["Remove exposure and require VPN.","Restrict RDP behind VPN access.","Use RD Gateway instead of direct exposure.","Limit inbound access to managed paths."],"correct":0,"explain":"Expose RDP only through secure access like VPN or gateway with MFA; simply changing ports is insufficient."},{"id":342,"domain":"Operational Procedures","q":"A frustrated user becomes verbally abusive while you troubleshoot. What is the best response?","choices":["Stay calm and follow escalation.","Stay professional and de-escalate.","Set boundaries and involve management.","Follow procedure and escalate abuse."],"correct":0,"explain":"Maintain professionalism, set boundaries, and escalate per policy if the user remains abusive."},{"id":343,"domain":"Operational Procedures","q":"A critical update requires a reboot during business hours. What is the best practice?","choices":["Schedule reboot in maintenance window.","Announce outage and maintenance timing.","Coordinate restart with stakeholders.","Perform reboot during approved window."],"correct":0,"explain":"Plan changes to minimize impact: maintenance windows, user notification, and rollback plans are best practice."},{"id":344,"domain":"Security","q":"A user leaves the company. What is the best action regarding their accounts?","choices":["Disable accounts per offboarding policy.","Disable mailbox and access tokens.","Revoke VPN and remote access rights.","Follow account deprovisioning process."],"correct":0,"explain":"Offboarding should disable accounts promptly per policy, preserving data and audit trails as required."},{"id":345,"domain":"Operating Systems","q":"A user wants convenience but still strong phone security. Which configuration is best practice?","choices":["Biometrics plus strong passcode.","Strong passcode with biometric unlock.","Auto-lock plus biometric sign-in.","Long PIN with device encryption enabled."],"correct":0,"explain":"Use biometrics for convenience and keep a strong passcode as fallback. Biometrics alone is not sufficient."},{"id":346,"domain":"Operating Systems","q":"A technician needs to check and manage local user accounts and groups quickly on Windows Pro. Which tool is best?","choices":["lusrmgr.msc local users console.","Computer Management local users node.","net user local account commands.","Settings account family access page."],"correct":0,"explain":"Local Users and Groups (lusrmgr.msc) manages local accounts/groups on supported Windows editions."}]
</script>

<script>
const QUESTION_BANK = JSON.parse(document.getElementById('question-data').textContent);
const DOMAINS = ["Operating Systems","Security","Software Troubleshooting","Operational Procedures"];
const MIN_Q = 45, MAX_Q = 245;
const STORAGE_KEY = "core2_quiz_session_v1";

const app = document.getElementById('app');

function domainCounts(){
  const c = {};
  DOMAINS.forEach(d => c[d] = 0);
  QUESTION_BANK.forEach(q => c[q.domain]++);
  return c;
}
function poolForDomains(selected){
  return QUESTION_BANK.filter(q => selected.includes(q.domain));
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function loadSession(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s && s.v === 1) return s;
  }catch(e){}
  return null;
}
function saveSession(s){
  s.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
function clearSession(){
  localStorage.removeItem(STORAGE_KEY);
}
function questionById(id){
  return QUESTION_BANK.find(q => q.id === id);
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// ---------- Dashboard ----------
function renderDashboard(){
  const existing = loadSession();
  app.innerHTML = `
    <div class="hero">
      <h1>CompTIA A+ Core 2 Practice Exam</h1>
      <div class="sub">${QUESTION_BANK.length} questions across all Core 2 (220-1202) objective domains: Operating Systems, Security, Software Troubleshooting, and Operational Procedures.</div>
    </div>
    ${existing && !existing.finished ? `
      <div class="resume-banner">
        <div><strong>Quiz in progress</strong> &mdash; ${existing.answers.filter(a=>a!==null).length} of ${existing.order.length} answered (started ${new Date(existing.startedAt).toLocaleString()}).</div>
        <div class="row">
          <button id="resumeBtn">Resume Quiz</button>
          <button id="discardBtn" class="danger">Discard</button>
        </div>
      </div>` : ``}
    <div class="tiles">
      <button class="tile storm" id="fullExamTile">
        <div class="icon">&#9928;&#65039;</div>
        <div>
          <div class="ttitle">Full Practice Exam</div>
          <div class="tsub">Choose domains &amp; 45&ndash;245 questions</div>
        </div>
      </button>
      <button class="tile sun" id="quick10Tile">
        <div class="icon">&#9728;&#65039;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">10 questions &middot; all objectives</div>
        </div>
      </button>
      <button class="tile green" id="quick15Tile">
        <div class="icon">&#127807;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">15 questions &middot; all objectives</div>
        </div>
      </button>
      <button class="tile lightning" id="quick20Tile">
        <div class="icon">&#9889;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">20 questions &middot; all objectives</div>
        </div>
      </button>
      <button class="tile fire" id="quick25Tile">
        <div class="icon">&#128293;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">25 questions &middot; all objectives</div>
        </div>
      </button>
    </div>
  `;
  document.getElementById('fullExamTile').addEventListener('click', renderSetup);
  document.getElementById('quick10Tile').addEventListener('click', () => startQuiz(DOMAINS.slice(), 10));
  document.getElementById('quick15Tile').addEventListener('click', () => startQuiz(DOMAINS.slice(), 15));
  document.getElementById('quick20Tile').addEventListener('click', () => startQuiz(DOMAINS.slice(), 20));
  document.getElementById('quick25Tile').addEventListener('click', () => startQuiz(DOMAINS.slice(), 25));
  if(existing && !existing.finished){
    document.getElementById('resumeBtn').addEventListener('click', () => renderQuiz(existing));
    document.getElementById('discardBtn').addEventListener('click', () => { clearSession(); renderDashboard(); });
  }
}

// ---------- Setup screen ----------
function renderSetup(){
  const counts = domainCounts();
  const selected = new Set(DOMAINS);
  let countVal = 100;

  function currentPool(){
    return poolForDomains(Array.from(selected));
  }

  function draw(){
    const pool = currentPool();
    const available = pool.length;
    const effMax = Math.max(1, Math.min(MAX_Q, available));
    const effMin = Math.min(MIN_Q, effMax);
    if(countVal > effMax) countVal = effMax;
    if(countVal < effMin) countVal = effMin;

    app.innerHTML = `
      <a class="backlink" id="backToDash">&larr; Back to dashboard</a>
      <h1>Full Practice Exam</h1>
      <div class="sub">Pick your objective domains and question count to begin.</div>
      <div class="card">
        <h2>1. Choose objective domains</h2>
        <div class="domain-list" id="domainList"></div>
        <h2 style="margin-top:22px">2. Number of questions</h2>
        <div class="count-row">
          <input type="range" id="countSlider" min="${effMin}" max="${effMax}" value="${countVal}" ${effMax<=effMin?'disabled':''}/>
          <input type="number" id="countNum" min="${effMin}" max="${effMax}" value="${countVal}" />
        </div>
        <div class="note">Choose between ${MIN_Q} and ${MAX_Q} questions. Currently <strong>${available}</strong> question${available===1?'':'s'} available for the selected domains${available < countVal ? ' — count has been capped.' : ''}.</div>
        <div class="row" style="margin-top:20px">
          <button id="startBtn" ${available===0?'disabled':''}>Start Quiz</button>
        </div>
      </div>
    `;
    document.getElementById('backToDash').addEventListener('click', renderDashboard);

    const list = document.getElementById('domainList');
    DOMAINS.forEach(d => {
      const item = document.createElement('div');
      item.className = 'domain-item';
      const id = 'dom_' + d.replace(/\W+/g,'_');
      item.innerHTML = `<input type="checkbox" id="${id}" ${selected.has(d)?'checked':''}/>
        <label for="${id}">${d}</label>
        <span class="domain-count">${counts[d]} question${counts[d]===1?'':'s'}</span>`;
      item.querySelector('input').addEventListener('change', e => {
        if(e.target.checked) selected.add(d); else selected.delete(d);
        if(selected.size === 0){ e.target.checked = true; selected.add(d); }
        draw();
      });
      list.appendChild(item);
    });

    document.getElementById('countSlider').addEventListener('input', e => {
      countVal = parseInt(e.target.value, 10);
      document.getElementById('countNum').value = countVal;
    });
    document.getElementById('countNum').addEventListener('change', e => {
      let v = parseInt(e.target.value, 10) || effMin;
      v = Math.max(effMin, Math.min(effMax, v));
      countVal = v;
      draw();
    });
    document.getElementById('startBtn').addEventListener('click', () => {
      startQuiz(Array.from(selected), countVal);
    });
  }
  draw();
}

function startQuiz(selectedDomains, count){
  const pool = shuffle(poolForDomains(selectedDomains)).slice(0, count);
  const order = pool.map(q => ({ id: q.id, displayOrder: shuffle([0,1,2,3]) }));
  const session = {
    v: 1,
    domains: selectedDomains,
    order: order,
    answers: order.map(() => null),
    current: 0,
    finished: false,
    startedAt: new Date().toISOString()
  };
  saveSession(session);
  renderQuiz(session);
}

// ---------- Quiz screen ----------
function renderQuiz(session){
  const total = session.order.length;
  const idx = session.current;
  const entry = session.order[idx];
  const q = questionById(entry.id);
  const answeredIdx = session.answers[idx];

  const answeredCount = session.answers.filter(a=>a!==null).length;
  const pct = Math.round((idx / total) * 100);

  app.innerHTML = `
    <h1>CompTIA A+ Core 2 Practice Exam</h1>
    <div class="qmeta">
      <span>Question ${idx+1} of ${total} &middot; ${q.domain}</span>
      <span>${answeredCount} answered</span>
    </div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="qtext">${escapeHtml(q.q)}</div>
      <div class="choices" id="choicesWrap"></div>
      <div id="feedbackWrap"></div>
      <div class="controls">
        <button class="ghost" id="pauseBtn">Pause &amp; Save</button>
        <div class="row">
          <button class="ghost" id="prevBtn" ${idx===0?'disabled':''}>&#9664; Prev</button>
          <button id="nextBtn" disabled>${idx===total-1 ? 'Finish Quiz' : 'Next ▶'}</button>
        </div>
      </div>
    </div>
  `;

  const choicesWrap = document.getElementById('choicesWrap');
  entry.displayOrder.forEach((origIdx, pos) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.innerHTML = `<strong>${String.fromCharCode(65+pos)}.</strong> ${escapeHtml(q.choices[origIdx])}`;
    div.addEventListener('click', () => {
      if(session.answers[idx] !== null) return;
      session.answers[idx] = pos;
      saveSession(session);
      renderQuiz(session);
    });
    choicesWrap.appendChild(div);
  });

  if(answeredIdx !== null){
    lockChoices(entry, q, answeredIdx);
    document.getElementById('nextBtn').disabled = false;
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    session.current = Math.max(0, idx - 1);
    saveSession(session);
    renderQuiz(session);
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(idx === total - 1){
      session.finished = true;
      saveSession(session);
      renderResults(session);
    } else {
      session.current = idx + 1;
      saveSession(session);
      renderQuiz(session);
    }
  });
  document.getElementById('pauseBtn').addEventListener('click', () => {
    saveSession(session);
    renderDashboard();
  });
}

function lockChoices(entry, q, answeredPos){
  const choicesWrap = document.getElementById('choicesWrap');
  const correctPos = entry.displayOrder.indexOf(q.correct);
  const chosenOrigIdx = entry.displayOrder[answeredPos];
  const wasCorrect = chosenOrigIdx === q.correct;

  Array.from(choicesWrap.children).forEach((div, pos) => {
    div.classList.add('locked');
    if(pos === answeredPos && pos === correctPos){
      div.classList.add('selected-correct');
    } else if(pos === answeredPos){
      div.classList.add('selected-wrong');
    } else if(pos === correctPos){
      div.classList.add('reveal-correct');
    }
  });

  const fb = document.getElementById('feedbackWrap');
  let html = '';
  if(wasCorrect){
    html += `<div class="explain-box"><span class="tag good">Correct</span>${escapeHtml(q.explain)}</div>`;
  } else {
    html += `<div class="explain-box"><span class="tag bad">Why this isn't it</span>"${escapeHtml(q.choices[chosenOrigIdx])}" doesn't fit this scenario as well as the correct answer below.</div>`;
    html += `<div class="explain-box"><span class="tag good">Correct answer</span>${escapeHtml(q.choices[q.correct])} &mdash; ${escapeHtml(q.explain)}</div>`;
  }
  fb.innerHTML = html;
}

// ---------- Results screen ----------
function renderResults(session){
  const total = session.order.length;
  let correctCount = 0;
  const perDomain = {};
  DOMAINS.forEach(d => perDomain[d] = {correct:0, total:0});
  const missed = [];

  session.order.forEach((entry, i) => {
    const q = questionById(entry.id);
    const answeredPos = session.answers[i];
    const chosenOrigIdx = answeredPos === null ? null : entry.displayOrder[answeredPos];
    const isCorrect = chosenOrigIdx === q.correct;
    perDomain[q.domain].total++;
    if(isCorrect){ correctCount++; perDomain[q.domain].correct++; }
    else missed.push({q, chosenOrigIdx});
  });

  const answeredCount = session.answers.filter(a=>a!==null).length;
  const score = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

  app.innerHTML = `
    <a class="backlink" id="backToDash">&larr; Back to dashboard</a>
    <h1>Results</h1>
    <div class="card" style="text-align:center">
      <div class="score-big">${score}<span style="font-size:24px;color:var(--muted)"> / 100</span></div>
      <div class="score-sub">${correctCount} correct out of ${answeredCount} answered (${total} selected)</div>
    </div>
    <div class="card">
      <h2>By objective domain</h2>
      <div id="domainBreakdown"></div>
    </div>
    <div class="card">
      <h2>Review missed questions (${missed.length})</h2>
      <div id="missedList">${missed.length===0 ? '<div class="note">Perfect score on answered questions.</div>' : ''}</div>
    </div>
    <div class="row">
      <button id="newQuizBtn">Start New Quiz</button>
    </div>
  `;
  document.getElementById('backToDash').addEventListener('click', () => { clearSession(); renderDashboard(); });

  const db = document.getElementById('domainBreakdown');
  DOMAINS.forEach(d => {
    const s = perDomain[d];
    if(s.total === 0) return;
    const p = Math.round((s.correct/s.total)*100);
    const row = document.createElement('div');
    row.className = 'domain-score';
    row.innerHTML = `<span>${d}</span><span>${s.correct}/${s.total} (${p}%)</span>`;
    db.appendChild(row);
  });

  const ml = document.getElementById('missedList');
  missed.forEach(({q, chosenOrigIdx}) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    let yourAnswerHtml = chosenOrigIdx === null
      ? `<div class="explain-box"><span class="tag bad">Not answered</span></div>`
      : `<div class="explain-box"><span class="tag bad">Your answer</span>${escapeHtml(q.choices[chosenOrigIdx])}</div>`;
    div.innerHTML = `
      <span class="pill">${q.domain}</span>
      <div class="review-q">${escapeHtml(q.q)}</div>
      ${yourAnswerHtml}
      <div class="explain-box"><span class="tag good">Correct answer</span>${escapeHtml(q.choices[q.correct])} &mdash; ${escapeHtml(q.explain)}</div>
    `;
    ml.appendChild(div);
  });

  document.getElementById('newQuizBtn').addEventListener('click', () => {
    clearSession();
    renderDashboard();
  });
}

renderDashboard();
</script>
</body>
</html>
