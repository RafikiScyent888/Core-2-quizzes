o allow employees to remotely access their office desktop computers from home without exposing the Remote Desktop Protocol (RDP) port directly to the public internet, which would be a significant security risk. What approach addresses this concern while still enabling remote access?","choices":["Requiring remote users to first connect through a VPN before being able to reach the RDP service on their office computer","Directly exposing the RDP port to the internet with no additional protective measures, since RDP is inherently secure by default","Disabling RDP entirely with no remote desktop access provided under any circumstances","Sharing the office computer's local administrator password publicly to simplify remote connections"],"correct":0,"explain":"Requiring remote users to first establish a VPN connection before being able to reach the RDP service addresses the security risk of directly exposing the RDP port to the public internet, since the VPN provides an additional authenticated, encrypted layer before the RDP connection itself is even attempted.","sub":"4.8","source":"original-2026-batch"},{"id":608,"domain":"Operational Procedures","q":"A company's remote access solution automatically disconnects a VPN session after 30 minutes of user inactivity, requiring the user to reauthenticate to resume. What security purpose does this automatic session timeout serve?","choices":["It reduces the risk of an unattended, still-connected remote session being misused by someone else if the legitimate user steps away","It has no security purpose and exists purely to reduce server bandwidth costs","It permanently prevents the same user from ever reconnecting to the VPN again","It automatically and permanently locks the user's account after the first timeout occurs"],"correct":0,"explain":"Automatically disconnecting an inactive VPN session after a set period reduces the risk of an unattended, still-connected remote session being misused by someone else if the legitimate user steps away without manually disconnecting, requiring reauthentication to resume access.","sub":"4.8","source":"original-2026-batch"},{"id":609,"domain":"Operational Procedures","q":"A technician providing remote support to a user asks the user to read a one-time connection code aloud over the phone before starting a remote support session, rather than the technician simply connecting without any user action. What security purpose does requiring this user-provided code serve?","choices":["It ensures the remote session is only established with the explicit, active participation and consent of the actual user being supported","It has no security purpose and exists purely as an unnecessary extra step for the technician","It automatically encrypts the entire remote support session using a stronger algorithm","It permanently prevents the technician from ever needing further authentication in future sessions"],"correct":0,"explain":"Requiring the user to actively read aloud a one-time connection code ensures the remote support session is only established with the user's explicit, active participation and consent, rather than allowing a technician, or an attacker impersonating one, to connect without the actual user's active involvement.","sub":"4.8","source":"original-2026-batch"},{"id":610,"domain":"Operational Procedures","q":"A company's IT policy prohibits employees from using free, unofficial remote access tools downloaded from unverified websites to access their work computers from home, instead requiring the use of the company's officially sanctioned and vetted remote access solution. What risk does this policy help mitigate?","choices":["The risk of an unvetted, potentially insecure or malicious remote access tool introducing a security vulnerability into the company's network","The risk of employees being unable to work from home under any circumstances","The risk of the company's officially sanctioned tool being more expensive than free alternatives","A risk that only applies to employees working in the IT department specifically"],"correct":0,"explain":"Prohibiting unofficial, unvetted remote access tools and requiring use of the company's officially sanctioned solution helps mitigate the risk of an unverified tool introducing a security vulnerability, such as weak encryption or an intentionally malicious backdoor, into the company's network through an uncontrolled remote access pathway.","sub":"4.8","source":"original-2026-batch"},{"id":611,"domain":"Operational Procedures","q":"A remote worker's laptop is configured to automatically reconnect to the company VPN whenever it detects an active internet connection, without requiring the user to manually initiate the connection each time. What operational benefit does this automatic reconnection provide, and what security consideration should accompany it?","choices":["It improves convenience and consistency of secure connectivity, but should still require proper authentication each time to avoid creating a persistent, unauthenticated access path","It eliminates the need for any authentication whatsoever once the automatic reconnection feature is enabled","It has no operational benefit and only increases the laptop's power consumption","It automatically disables the laptop's local firewall once the VPN connects"],"correct":0,"explain":"Automatic VPN reconnection improves convenience and consistency of secure connectivity for the remote worker, but it should still require proper authentication each time it reconnects, ensuring the feature doesn't inadvertently create a persistent, unauthenticated access path if the device were ever lost, stolen, or accessed by someone other than the legitimate user.","sub":"4.8","source":"original-2026-batch"},{"id":612,"domain":"Security","q":"A home office router allows administrators to view a log of every device that has connected over the past 30 days, including timestamps and MAC addresses. What security benefit does reviewing this connection log periodically provide?","choices":["It helps identify unfamiliar devices that may have connected without authorization, prompting further investigation or a password change","It automatically blocks every device that has ever connected to the network","It permanently increases the router's maximum Wi-Fi signal range","It has no security value and exists purely for router diagnostic purposes"],"correct":0,"explain":"Periodically reviewing the router's connection log helps identify unfamiliar devices that may have connected without authorization, prompting further investigation or a precautionary password change, which is a proactive SOHO security practice rather than a purely diagnostic exercise.","sub":"2.8","source":"original-2026-batch"},{"id":613,"domain":"Software Troubleshooting","q":"A technician removing malware from a computer discovers that the infection modified the Windows Registry to automatically relaunch itself at every startup. What should the technician do in addition to removing the malware's main files?","choices":["Locate and remove the malicious registry entries responsible for automatically relaunching the malware at startup","Assume the malware cannot actually be removed once it has modified the registry","Reinstall only the web browser, since registry changes never affect other applications","Ignore the registry entries, since they will resolve automatically over time"],"correct":0,"explain":"Since the malware modified the registry to automatically relaunch itself at startup, simply removing the malware's files without also locating and removing the associated malicious registry entries would allow the infection to persist and relaunch again the next time the computer starts.","sub":"3.2","source":"original-2026-batch"},{"id":614,"domain":"Software Troubleshooting","q":"A user's smartphone app displays completely blank white screens instead of its normal content, even after the phone was restarted, though other apps continue to work normally. What is a reasonable troubleshooting step specific to this one app?","choices":["Clear the app's cache and data, or check for an available update, since the issue is isolated to a single app rather than the whole device","Immediately assume the phone's entire display panel has failed","Immediately assume the phone's battery needs replacement","Factory reset the entire phone as the first troubleshooting step"],"correct":0,"explain":"Since the blank screen issue is isolated to one specific app while all others work normally, clearing that app's cache and data, or checking for an available update, is a reasonable app-specific troubleshooting step, rather than assuming a device-wide hardware failure.","sub":"3.3","source":"original-2026-batch"},{"id":615,"domain":"Software Troubleshooting","q":"A user's smartphone shows a warning that a recently installed app is requesting to become the default SMS handler, even though the app's stated purpose has nothing to do with messaging. What is a reasonable, security-conscious response to this request?","choices":["Deny the request, since an app requesting control over SMS messaging unrelated to its stated purpose is a red flag for potentially malicious behavior","Grant the request immediately, since all apps benefit from having SMS access regardless of their actual function","Ignore the warning entirely, since default app requests never have any security implications","Uninstall every other app on the phone instead of addressing the specific suspicious request"],"correct":0,"explain":"An app requesting to become the default SMS handler despite having no stated purpose related to messaging is a red flag for potentially malicious behavior, such as intercepting verification codes or sending unauthorized premium messages, making denial the appropriate security-conscious response.","sub":"3.4","source":"original-2026-batch"},{"id":616,"domain":"Operational Procedures","q":"A company's change management documentation requires that every proposed change specify a designated backup approver who can authorize the change if the primary approver is unavailable. What risk does this backup approver requirement address?","choices":["The risk of a time-sensitive change being delayed or stalled because the primary approver is unreachable when a decision is needed","The risk of a change costing more than originally budgeted","The risk of a change requiring additional hardware purchases","The risk of a change being implemented on the wrong day of the week"],"correct":0,"explain":"Designating a backup approver addresses the risk of a time-sensitive change being delayed or stalled simply because the primary approver is unreachable when a timely decision is needed, ensuring the change process can still move forward without being blocked by a single point of failure in the approval chain.","sub":"4.2","source":"original-2026-batch"},{"id":617,"domain":"Operational Procedures","q":"A data center's fire suppression system undergoes a scheduled inspection and testing cycle every year, verifying the system will function correctly if it is ever needed in an actual emergency. Why is this regular testing important, even if the system has never been triggered?","choices":["An untested fire suppression system could fail to function correctly during an actual emergency, so regular inspection verifies it remains ready and reliable","Testing the system is purely a formality with no bearing on whether it would actually work during a real fire","Fire suppression systems never require any maintenance once they are initially installed","Regular testing is only required if the data center has experienced a fire in the past"],"correct":0,"explain":"An untested fire suppression system could have a hidden malfunction or degraded component that would only become apparent during an actual emergency, so regular scheduled inspection and testing verifies the system remains ready and reliable well before it is ever actually needed.","sub":"4.4","source":"original-2026-batch"},{"id":618,"domain":"Operational Procedures","q":"A technician is asked to give a status update to a user during a lengthy repair, but the underlying technical issue is genuinely complex and difficult to summarize briefly. What is the most professional approach to this update?","choices":["Provide a concise, honest summary in plain language, avoiding overwhelming technical detail while still giving the user a realistic sense of progress","Explain every single technical detail in full depth regardless of the user's technical background","Tell the user nothing at all until the repair is entirely finished","Make up a simplified but inaccurate explanation just to end the conversation quickly"],"correct":0,"explain":"Providing a concise, honest summary in plain language, without either overwhelming the user with unnecessary technical depth or leaving them with no information at all, gives the user a realistic sense of progress while respecting both their time and their non-technical background.","sub":"4.6","source":"original-2026-batch"},{"id":619,"domain":"Operational Procedures","q":"A remote worker's company laptop is stolen from their car while the VPN client was left in an already-authenticated, connected state. What security consequence does this scenario illustrate about leaving a remote access session active on an unattended device?","choices":["A stolen device with an active, authenticated remote session could allow the thief immediate access to internal company resources without needing to separately authenticate","A stolen device poses no additional risk as long as the VPN software itself is password protected on next launch","The VPN connection would have automatically and instantly terminated the moment the laptop left the office Wi-Fi range","This scenario is only a concern if the thief also happens to know the user's original VPN password"],"correct":0,"explain":"A stolen device with an already-authenticated, active VPN session could allow a thief immediate access to internal company resources without needing to separately authenticate, illustrating why device-level security like screen locks and reasonable session timeouts matter even when remote access itself is properly secured.","sub":"4.8","source":"original-2026-batch"}]</script>

<script>
const QUESTION_BANK = JSON.parse(document.getElementById('question-data').textContent);
const DOMAINS = ["Operating Systems","Security","Software Troubleshooting","Operational Procedures"];
const SUB_OBJECTIVES = {
  "Operating Systems": [
    { id: "1.1", label: "OS Types & Purposes" },
    { id: "1.2", label: "Windows Installation & Upgrades" },
    { id: "1.3", label: "Windows Editions & Features" },
    { id: "1.4", label: "Windows System Tools & Utilities" },
    { id: "1.5", label: "Windows Networking & Settings" },
    { id: "1.6", label: "macOS & Linux Tools" },
  ],
  "Security": [
    { id: "2.1", label: "Physical Security & Concepts" },
    { id: "2.2", label: "Wireless & Network Security" },
    { id: "2.3", label: "Malware Types & Removal" },
    { id: "2.4", label: "Social Engineering & Threats" },
    { id: "2.5", label: "Windows Security Settings" },
    { id: "2.6", label: "Mobile & Embedded Device Security" },
    { id: "2.7", label: "Data Destruction & Disposal" },
    { id: "2.8", label: "SOHO Security Configuration" },
  ],
  "Software Troubleshooting": [
    { id: "3.1", label: "Windows OS Troubleshooting" },
    { id: "3.2", label: "PC Security & Malware Removal" },
    { id: "3.3", label: "Mobile OS & App Troubleshooting" },
    { id: "3.4", label: "Mobile Security Troubleshooting" },
  ],
  "Operational Procedures": [
    { id: "4.1", label: "Documentation & Ticketing" },
    { id: "4.2", label: "Change Management" },
    { id: "4.3", label: "Backup & Recovery Methods" },
    { id: "4.4", label: "Safety & Environmental Controls" },
    { id: "4.5", label: "Privacy, Licensing & Policy" },
    { id: "4.6", label: "Communication & Professionalism" },
    { id: "4.7", label: "Scripting Basics" },
    { id: "4.8", label: "Remote Access Technologies" },
  ],
};
const SUB_LABEL = {};
Object.values(SUB_OBJECTIVES).forEach(list => list.forEach(s => SUB_LABEL[s.id] = s.label));
const ALL_SUB_IDS = Object.values(SUB_OBJECTIVES).flat().map(s => s.id);
const MIN_Q = 45, MAX_Q = 245;
const STORAGE_KEY = "core2_quiz_session_v2";

const app = document.getElementById('app');

function subCounts(){
  const c = {};
  ALL_SUB_IDS.forEach(id => c[id] = 0);
  QUESTION_BANK.forEach(q => { if(c[q.sub] !== undefined) c[q.sub]++; });
  return c;
}
function poolForSubs(selected){
  return QUESTION_BANK.filter(q => selected.includes(q.sub));
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function loadSession(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s && s.v === 1) return s;
  }catch(e){}
  return null;
}
function saveSession(s){
  s.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
function clearSession(){
  localStorage.removeItem(STORAGE_KEY);
}
function questionById(id){
  return QUESTION_BANK.find(q => q.id === id);
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// ---------- Dashboard ----------
function renderDashboard(){
  const existing = loadSession();
  app.innerHTML = `
    <div class="hero">
      <h1>CompTIA A+ Core 2 Practice Exam</h1>
      <div class="sub">${QUESTION_BANK.length} questions across all Core 2 (220-1202) objective domains: Operating Systems, Security, Software Troubleshooting, and Operational Procedures.</div>
    </div>
    <div class="disclaimer"><strong>Educational use only.</strong> This site is a self-study practice tool built from original study questions. It is not affiliated with, endorsed by, or sponsored by CompTIA&reg;. CompTIA and A+ are trademarks of CompTIA, Inc. Objective tagging is an informal study aid, not an official exam blueprint &mdash; always confirm current exam content on comptia.org.</div>
    ${existing && !existing.finished ? `
      <div class="resume-banner">
        <div><strong>Quiz in progress</strong> &mdash; ${existing.answers.filter(a=>a!==null).length} of ${existing.order.length} answered (started ${new Date(existing.startedAt).toLocaleString()}).</div>
        <div class="row">
          <button id="resumeBtn">Resume Quiz</button>
          <button id="discardBtn" class="danger">Discard</button>
        </div>
      </div>` : ``}
    <div class="tiles">
      <button class="tile storm" id="fullExamTile">
        <div class="icon">&#9928;&#65039;</div>
        <div>
          <div class="ttitle">Full Practice Exam</div>
          <div class="tsub">Choose domains &amp; 45&ndash;245 questions</div>
        </div>
      </button>
      <button class="tile sun" id="quick10Tile">
        <div class="icon">&#9728;&#65039;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">10 questions &middot; all objectives</div>
        </div>
      </button>
      <button class="tile green" id="quick15Tile">
        <div class="icon">&#127807;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">15 questions &middot; all objectives</div>
        </div>
      </button>
      <button class="tile lightning" id="quick20Tile">
        <div class="icon">&#9889;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">20 questions &middot; all objectives</div>
        </div>
      </button>
      <button class="tile fire" id="quick25Tile">
        <div class="icon">&#128293;</div>
        <div>
          <div class="ttitle">Quick Quiz</div>
          <div class="tsub">25 questions &middot; all objectives</div>
        </div>
      </button>
    </div>
  `;
  document.getElementById('fullExamTile').addEventListener('click', renderSetup);
  document.getElementById('quick10Tile').addEventListener('click', () => startQuiz(ALL_SUB_IDS.slice(), 10));
  document.getElementById('quick15Tile').addEventListener('click', () => startQuiz(ALL_SUB_IDS.slice(), 15));
  document.getElementById('quick20Tile').addEventListener('click', () => startQuiz(ALL_SUB_IDS.slice(), 20));
  document.getElementById('quick25Tile').addEventListener('click', () => startQuiz(ALL_SUB_IDS.slice(), 25));
  if(existing && !existing.finished){
    document.getElementById('resumeBtn').addEventListener('click', () => renderQuiz(existing));
    document.getElementById('discardBtn').addEventListener('click', () => { clearSession(); renderDashboard(); });
  }
}

// ---------- Setup screen ----------
function renderSetup(){
  const counts = subCounts();
  const selected = new Set(ALL_SUB_IDS.filter(id => counts[id] > 0));
  let countVal = 100;

  function currentPool(){
    return poolForSubs(Array.from(selected));
  }

  function draw(){
    const pool = currentPool();
    const available = pool.length;
    const effMax = Math.max(1, Math.min(MAX_Q, available));
    const effMin = Math.min(MIN_Q, effMax);
    if(countVal > effMax) countVal = effMax;
    if(countVal < effMin) countVal = effMin;

    app.innerHTML = `
      <a class="backlink" id="backToDash">&larr; Back to dashboard</a>
      <h1>Full Practice Exam</h1>
      <div class="sub">Pick your objectives and question count to begin.</div>
      <div class="card">
        <h2>1. Choose objectives</h2>
        <div class="row" style="margin-bottom:10px">
          <button class="ghost" id="selectAllBtn">Select All</button>
          <button class="ghost" id="selectNoneBtn">Deselect All</button>
        </div>
        <div id="domainGroups"></div>
        <h2 style="margin-top:22px">2. Number of questions</h2>
        <div class="count-row">
          <input type="range" id="countSlider" min="${effMin}" max="${effMax}" value="${countVal}" ${effMax<=effMin?'disabled':''}/>
          <input type="number" id="countNum" min="${effMin}" max="${effMax}" value="${countVal}" />
        </div>
        <div class="note">Choose between ${MIN_Q} and ${MAX_Q} questions. Currently <strong>${available}</strong> question${available===1?'':'s'} available for the selected objectives${available < countVal ? ' — count has been capped.' : ''}.</div>
        <div class="row" style="margin-top:20px">
          <button id="startBtn" ${available===0?'disabled':''}>Start Quiz</button>
        </div>
      </div>
    `;
    document.getElementById('backToDash').addEventListener('click', renderDashboard);

    const groupsEl = document.getElementById('domainGroups');
    DOMAINS.forEach(d => {
      const subs = SUB_OBJECTIVES[d].filter(s => counts[s.id] > 0);
      if(subs.length === 0) return;
      const group = document.createElement('div');
      group.className = 'domain-group';
      group.innerHTML = `<h3>${d}</h3><div class="domain-list"></div>`;
      const list = group.querySelector('.domain-list');
      subs.forEach(s => {
        const item = document.createElement('div');
        item.className = 'domain-item';
        const id = 'sub_' + s.id.replace('.','_');
        item.innerHTML = `<input type="checkbox" id="${id}" ${selected.has(s.id)?'checked':''}/>
          <label for="${id}">${s.id} &mdash; ${s.label}</label>
          <span class="domain-count">${counts[s.id]} question${counts[s.id]===1?'':'s'}</span>`;
        item.querySelector('input').addEventListener('change', e => {
          if(e.target.checked) selected.add(s.id); else selected.delete(s.id);
          draw();
        });
        list.appendChild(item);
      });
      groupsEl.appendChild(group);
    });

    document.getElementById('selectAllBtn').addEventListener('click', () => {
      ALL_SUB_IDS.forEach(id => { if(counts[id] > 0) selected.add(id); });
      draw();
    });
    document.getElementById('selectNoneBtn').addEventListener('click', () => {
      selected.clear();
      draw();
    });

    document.getElementById('countSlider').addEventListener('input', e => {
      countVal = parseInt(e.target.value, 10);
      document.getElementById('countNum').value = countVal;
    });
    document.getElementById('countNum').addEventListener('change', e => {
      let v = parseInt(e.target.value, 10) || effMin;
      v = Math.max(effMin, Math.min(effMax, v));
      countVal = v;
      draw();
    });
    document.getElementById('startBtn').addEventListener('click', () => {
      startQuiz(Array.from(selected), countVal);
    });
  }
  draw();
}

function startQuiz(selectedSubs, count){
  const pool = shuffle(poolForSubs(selectedSubs)).slice(0, count);
  const order = pool.map(q => ({ id: q.id, displayOrder: shuffle([0,1,2,3]) }));
  const session = {
    v: 1,
    domains: selectedSubs,
    order: order,
    answers: order.map(() => null),
    current: 0,
    finished: false,
    startedAt: new Date().toISOString()
  };
  saveSession(session);
  renderQuiz(session);
}

// ---------- Quiz screen ----------
function renderQuiz(session){
  const total = session.order.length;
  const idx = session.current;
  const entry = session.order[idx];
  const q = questionById(entry.id);
  const answeredIdx = session.answers[idx];

  const answeredCount = session.answers.filter(a=>a!==null).length;
  const pct = Math.round((idx / total) * 100);

  app.innerHTML = `
    <h1>CompTIA A+ Core 2 Practice Exam</h1>
    <div class="qmeta">
      <span>Question ${idx+1} of ${total} &middot; ${q.sub} ${SUB_LABEL[q.sub] || q.domain}</span>
      <span>${answeredCount} answered</span>
    </div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="qtext">${escapeHtml(q.q)}</div>
      <div class="choices" id="choicesWrap"></div>
      <div id="feedbackWrap"></div>
      <div class="controls">
        <button class="ghost" id="pauseBtn">Pause &amp; Save</button>
        <div class="row">
          <button class="ghost" id="prevBtn" ${idx===0?'disabled':''}>&#9664; Prev</button>
          <button id="nextBtn" disabled>${idx===total-1 ? 'Finish Quiz' : 'Next ▶'}</button>
        </div>
      </div>
    </div>
  `;

  const choicesWrap = document.getElementById('choicesWrap');
  entry.displayOrder.forEach((origIdx, pos) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.innerHTML = `<strong>${String.fromCharCode(65+pos)}.</strong> ${escapeHtml(q.choices[origIdx])}`;
    div.addEventListener('click', () => {
      if(session.answers[idx] !== null) return;
      session.answers[idx] = pos;
      saveSession(session);
      renderQuiz(session);
    });
    choicesWrap.appendChild(div);
  });

  if(answeredIdx !== null){
    lockChoices(entry, q, answeredIdx);
    document.getElementById('nextBtn').disabled = false;
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    session.current = Math.max(0, idx - 1);
    saveSession(session);
    renderQuiz(session);
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(idx === total - 1){
      session.finished = true;
      saveSession(session);
      renderResults(session);
    } else {
      session.current = idx + 1;
      saveSession(session);
      renderQuiz(session);
    }
  });
  document.getElementById('pauseBtn').addEventListener('click', () => {
    saveSession(session);
    renderDashboard();
  });
}

function lockChoices(entry, q, answeredPos){
  const choicesWrap = document.getElementById('choicesWrap');
  const correctPos = entry.displayOrder.indexOf(q.correct);
  const chosenOrigIdx = entry.displayOrder[answeredPos];
  const wasCorrect = chosenOrigIdx === q.correct;

  Array.from(choicesWrap.children).forEach((div, pos) => {
    div.classList.add('locked');
    if(pos === answeredPos && pos === correctPos){
      div.classList.add('selected-correct');
    } else if(pos === answeredPos){
      div.classList.add('selected-wrong');
    } else if(pos === correctPos){
      div.classList.add('reveal-correct');
    }
  });

  const fb = document.getElementById('feedbackWrap');
  let html = '';
  if(wasCorrect){
    html += `<div class="explain-box"><span class="tag good">Correct</span>${escapeHtml(q.explain)}</div>`;
  } else {
    html += `<div class="explain-box"><span class="tag bad">Why this isn't it</span>"${escapeHtml(q.choices[chosenOrigIdx])}" doesn't fit this scenario as well as the correct answer below.</div>`;
    html += `<div class="explain-box"><span class="tag good">Correct answer</span>${escapeHtml(q.choices[q.correct])} &mdash; ${escapeHtml(q.explain)}</div>`;
  }
  fb.innerHTML = html;
}

// ---------- Results screen ----------
function renderResults(session){
  const total = session.order.length;
  let correctCount = 0;
  const perSub = {};
  const missed = [];

  session.order.forEach((entry, i) => {
    const q = questionById(entry.id);
    const answeredPos = session.answers[i];
    const chosenOrigIdx = answeredPos === null ? null : entry.displayOrder[answeredPos];
    const isCorrect = chosenOrigIdx === q.correct;
    if(!perSub[q.sub]) perSub[q.sub] = {correct:0, total:0};
    perSub[q.sub].total++;
    if(isCorrect){ correctCount++; perSub[q.sub].correct++; }
    else missed.push({q, chosenOrigIdx});
  });

  const answeredCount = session.answers.filter(a=>a!==null).length;
  const score = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

  app.innerHTML = `
    <a class="backlink" id="backToDash">&larr; Back to dashboard</a>
    <h1>Results</h1>
    <div class="card" style="text-align:center">
      <div class="score-big">${score}<span style="font-size:24px;color:var(--muted)"> / 100</span></div>
      <div class="score-sub">${correctCount} correct out of ${answeredCount} answered (${total} selected)</div>
    </div>
    <div class="card">
      <h2>By objective</h2>
      <div id="domainBreakdown"></div>
    </div>
    <div class="card">
      <h2>Review missed questions (${missed.length})</h2>
      <div id="missedList">${missed.length===0 ? '<div class="note">Perfect score on answered questions.</div>' : ''}</div>
    </div>
    <div class="row">
      <button id="newQuizBtn">Start New Quiz</button>
    </div>
  `;
  document.getElementById('backToDash').addEventListener('click', () => { clearSession(); renderDashboard(); });

  const db = document.getElementById('domainBreakdown');
  ALL_SUB_IDS.forEach(id => {
    const s = perSub[id];
    if(!s || s.total === 0) return;
    const p = Math.round((s.correct/s.total)*100);
    const row = document.createElement('div');
    row.className = 'domain-score';
    row.innerHTML = `<span>${id} &mdash; ${SUB_LABEL[id]}</span><span>${s.correct}/${s.total} (${p}%)</span>`;
    db.appendChild(row);
  });

  const ml = document.getElementById('missedList');
  missed.forEach(({q, chosenOrigIdx}) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    let yourAnswerHtml = chosenOrigIdx === null
      ? `<div class="explain-box"><span class="tag bad">Not answered</span></div>`
      : `<div class="explain-box"><span class="tag bad">Your answer</span>${escapeHtml(q.choices[chosenOrigIdx])}</div>`;
    div.innerHTML = `
      <span class="pill">${q.sub} &mdash; ${SUB_LABEL[q.sub] || q.domain}</span>
      <div class="review-q">${escapeHtml(q.q)}</div>
      ${yourAnswerHtml}
      <div class="explain-box"><span class="tag good">Correct answer</span>${escapeHtml(q.choices[q.correct])} &mdash; ${escapeHtml(q.explain)}</div>
    `;
    ml.appendChild(div);
  });

  document.getElementById('newQuizBtn').addEventListener('click', () => {
    clearSession();
    renderDashboard();
  });
}

renderDashboard();
</script>
</body>
</html>
