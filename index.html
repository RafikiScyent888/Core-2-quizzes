<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CompTIA A+ Core 2 Practice Exam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%A1</text></svg>" />
<style>
:root{
  --sky:#38bdf8;
  --sky-dark:#0284c7;
  --sky-deep:#0369a1;
  --bg:#eaf6ff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#5b7186;
  --good:#16a34a;
  --good-bg:rgba(22,163,74,0.1);
  --bad:#dc2626;
  --bad-bg:rgba(220,38,38,0.08);
  --border:#d6ecfb;
  --accent2:#0ea5e9;
}
*{box-sizing:border-box}
body{
  font-family:"Segoe UI",Inter,Arial,sans-serif;
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,#bfe9ff 0%,var(--bg) 320px, var(--bg) 100%);
  color:var(--text);
}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 60px}
h1{margin:0 0 4px 0;font-size:26px;color:var(--sky-deep)}
h2{margin:0 0 12px 0;font-size:18px}
.sub{color:var(--muted);font-size:14.5px;margin-bottom:22px;line-height:1.5}
.disclaimer{background:rgba(3,41,64,0.9);color:#f0f9ff;font-size:12.5px;line-height:1.5;border-radius:12px;padding:10px 16px;margin:0 0 20px;text-align:center}
.disclaimer strong{color:#fde047}
.card{
  background:var(--card);
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(3,105,161,0.12);
  border:1px solid var(--border);
  margin-bottom:18px;
}
button{
  background:var(--sky);
  color:#04324a;
  border:0;
  padding:11px 18px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:14px;
}
button:hover{filter:brightness(1.06)}
button:disabled{opacity:.4;cursor:not-allowed}
button.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
button.ghost:hover{color:var(--text);border-color:var(--sky)}
button.danger{background:transparent;color:var(--bad);border:1px solid var(--bad)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
a.backlink{color:var(--sky-deep);text-decoration:none;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;cursor:pointer}
a.backlink:hover{text-decoration:underline}

/* ---- Dashboard ---- */
.hero{
  background:linear-gradient(135deg,#7dd3fc,var(--sky) 55%,var(--sky-dark));
  border-radius:20px;
  padding:32px 28px;
  color:#04324a;
  margin-bottom:26px;
  box-shadow:0 14px 34px rgba(2,132,199,0.28);
}
.hero h1{color:#04324a;font-size:30px}
.hero .sub{color:#0b4c6e;margin-bottom:4px}
.resume-banner{
  background:rgba(255,255,255,0.9);
  border:1px solid rgba(3,105,161,0.25);
  padding:14px 16px;
  border-radius:12px;
  margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:10px}
.tile{
  border-radius:18px;
  padding:22px 18px;
  color:#fff;
  cursor:pointer;
  border:none;
  text-align:left;
  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 10px 24px rgba(15,23,42,0.18);
  transition:transform .12s ease, box-shadow .12s ease;
  font-family:inherit;
}
.tile:hover{transform:translateY(-4px);box-shadow:0 16px 32px rgba(15,23,42,0.26)}
.tile .icon{font-size:34px;line-height:1}
.tile .ttitle{font-size:17px;font-weight:800;margin-top:10px}
.tile .tsub{font-size:12.5px;opacity:.92;margin-top:4px}
.tile.storm{background:linear-gradient(135deg,#475569,#1e293b)}
.tile.sun{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#4a2c00}
.tile.sun .tsub{color:#5c3a00}
.tile.green{background:linear-gradient(135deg,#34d399,#059669)}
.tile.lightning{background:linear-gradient(135deg,#a78bfa,#7c3aed)}
.tile.fire{background:linear-gradient(135deg,#fb923c,#dc2626)}

/* ---- Setup ---- */
.domain-group{margin-bottom:16px}
.domain-group h3{font-size:14px;margin:0 0 8px;color:var(--sky);border-bottom:1px solid var(--border);padding-bottom:6px}
.domain-list{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.domain-item{display:flex;align-items:center;gap:10px;background:#f3fafe;padding:12px 14px;border-radius:10px;border:1px solid var(--border)}
.domain-item label{flex:1;cursor:pointer;font-size:14px}
.domain-count{color:var(--muted);font-size:13px}
.domain-item input{width:18px;height:18px;accent-color:var(--sky);cursor:pointer}
.count-row{display:flex;align-items:center;gap:14px;margin:16px 0}
.count-row input[type=number]{width:90px;background:#f3fafe;border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-size:15px}
.count-row input[type=range]{flex:1;accent-color:var(--sky);height:20px}
.count-row input[type=range]::-webkit-slider-runnable-track{height:8px;background:#e2f3fd;border-radius:999px}
.count-row input[type=range]::-moz-range-track{height:8px;background:#e2f3fd;border-radius:999px}
.note{color:var(--muted);font-size:13px;margin-top:6px}

/* ---- Quiz ---- */
.progress{height:9px;background:#e2f3fd;border-radius:999px;overflow:hidden;margin:14px 0}
.bar{height:9px;background:linear-gradient(90deg,var(--sky),var(--accent2));width:0%;transition:width .3s ease}
.qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:10px}
.qtext{font-weight:700;font-size:17px;line-height:1.5;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{background:#f3fafe;padding:13px 14px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:transform .12s ease,border-color .12s ease;font-size:14.5px;line-height:1.4}
.choice:hover:not(.locked){transform:translateY(-2px);border-color:var(--sky)}
.choice.locked{cursor:default}
.choice.selected-correct{border-color:var(--good);background:var(--good-bg)}
.choice.selected-wrong{border-color:var(--bad);background:var(--bad-bg)}
.choice.reveal-correct{border-color:var(--good);background:var(--good-bg)}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-right:8px}
.tag.good{background:rgba(22,163,74,0.15);color:#15803d}
.tag.bad{background:rgba(220,38,38,0.13);color:#b91c1c}
.explain-box{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);color:#334155;font-size:13.5px;line-height:1.5}
.controls{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px;flex-wrap:wrap}
.score-big{font-size:48px;font-weight:800;line-height:1;color:var(--sky-deep)}
.score-sub{color:var(--muted);font-size:14px;margin-top:4px}
.domain-score{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.domain-score:last-child{border-bottom:0}
.review-item{padding:14px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:0}
.review-q{font-weight:700;font-size:14.5px;margin-bottom:8px}
.pill{display:inline-block;background:rgba(14,165,233,0.14);color:var(--sky-deep);font-size:11px;padding:2px 8px;border-radius:999px;margin-bottom:8px}
.hidden{display:none}
@media(max-width:640px){.score-big{font-size:38px}.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script id="question-data" type="application/json">[{"id":1,"domain":"Operating Systems","q":"A technician is preparing laptops for a large company that requires domain join, centralized Group Policy control, and advanced security management. Which Windows edition best fits that requirement?","choices":["Windows Home.","Windows Enterprise.","Windows S mode.","Windows in Safe Mode."],"correct":1,"explain":"Windows Enterprise is intended for large-scale organizational deployment and supports centralized management and advanced security capabilities.","sub":"1.5"},{"id":2,"domain":"Operating Systems","q":"A home user wants to connect a new PC to a business domain and manage local policies through gpedit.msc, but those options are missing. Which edition is the most likely cause?","choices":["Windows Home.","Windows Pro.","Windows Enterprise.","Windows Education."],"correct":0,"explain":"Windows Home commonly lacks domain join and Local Group Policy management features that are available in higher editions.","sub":"1.5"},{"id":3,"domain":"Operating Systems","q":"An administrator wants one console that can launch Event Viewer, Device Manager, and Disk Management from a common framework. Which Windows feature should the administrator use?","choices":["Microsoft Management Console.","Windows Recovery Environment.","Programs and Features.","Remote Desktop Connection."],"correct":0,"explain":"Microsoft Management Console hosts administrative snap-ins and provides a common interface for many management tools.","sub":"1.4"},{"id":4,"domain":"Software Troubleshooting","q":"A user reports that an application keeps crashing after an update. Which built-in tool should a technician open first to review application and system error logs?","choices":["Task Scheduler.","Event Viewer.","Disk Cleanup.","System Configuration."],"correct":1,"explain":"Event Viewer is used to review logged events for applications, services, and the operating system.","sub":"3.1"},{"id":5,"domain":"Software Troubleshooting","q":"A background printing component is stuck and needs to be restarted without rebooting the system. Which tool should the technician use?","choices":["Services.","Task Manager startup tab.","Resource Monitor.","System Information."],"correct":0,"explain":"The Services console is used to start, stop, and configure background services such as the Print Spooler.","sub":"3.1"},{"id":6,"domain":"Security","q":"A user wants to remove a legacy desktop application that was installed with a standard installer rather than from the Microsoft Store. Where should the technician go first?","choices":["Programs and Features.","Network and Sharing Center.","Credential Manager.","Windows Security."],"correct":0,"explain":"Programs and Features is the classic Windows interface for uninstalling or modifying traditional desktop programs.","sub":"2.1"},{"id":7,"domain":"Operating Systems","q":"A PC boots slowly after several new applications were installed, and the technician wants to isolate nonessential startup items during troubleshooting. Which tool is most appropriate?","choices":["System Configuration.","File History.","Disk Management.","Reliability Monitor."],"correct":0,"explain":"System Configuration is commonly used to troubleshoot boot behavior, startup processes, and selective startup scenarios.","sub":"1.4"},{"id":8,"domain":"Operational Procedures","q":"After a faulty driver update, Windows still starts but behaves unpredictably. The user wants to roll back system settings without affecting personal documents. Which recovery feature is most appropriate?","choices":["System Restore.","BitLocker.","Storage Spaces.","Remote Assistance."],"correct":0,"explain":"System Restore rolls back system files, drivers, and settings to a prior restore point without acting as a user data backup solution.","sub":"4.3"},{"id":9,"domain":"Security","q":"A technician is formatting an internal Windows workstation drive and needs support for permissions, quotas, and encryption. Which file system should be selected?","choices":["FAT32.","exFAT.","NTFS.","ISO9660."],"correct":2,"explain":"NTFS is the standard Windows file system for internal volumes because it supports permissions and other advanced features.","sub":"2.1"},{"id":10,"domain":"Security","q":"A user wants to encrypt only a confidential HR folder on an NTFS volume rather than the entire drive. Which Windows feature best meets that requirement?","choices":["BitLocker.","EFS.","Secure Boot.","Storage Sense."],"correct":1,"explain":"Encrypting File System encrypts individual files and folders, while BitLocker is intended for full-volume encryption.","sub":"2.5"},{"id":11,"domain":"Security","q":"A company issues laptops to traveling employees and wants data protected if a device is stolen and the drive is removed for offline access. Which Windows feature should be enabled?","choices":["BitLocker.","File History.","Disk Cleanup.","Clipboard history."],"correct":0,"explain":"BitLocker provides full-volume encryption to help protect data when a system is lost, stolen, or accessed outside the normal boot process.","sub":"2.5"},{"id":12,"domain":"Operating Systems","q":"A technician needs to determine which process is generating heavy disk I/O and network activity in real time. Which built-in tool provides that level of detail?","choices":["Resource Monitor.","Task Scheduler.","Programs and Features.","Local Users and Groups."],"correct":0,"explain":"Resource Monitor gives detailed process-level visibility into CPU, disk, memory, and network usage.","sub":"1.1"},{"id":13,"domain":"Operational Procedures","q":"An administrator wants a PowerShell maintenance script to run automatically every Sunday at 2:00 a.m. Which Windows tool should be used?","choices":["Task Scheduler.","System Information.","Event Viewer.","Device Manager."],"correct":0,"explain":"Task Scheduler is used to automate programs, scripts, and other actions based on time or event triggers.","sub":"4.7"},{"id":14,"domain":"Operating Systems","q":"A technician needs one report that lists BIOS details, hardware resources, loaded components, and the software environment on a Windows PC. Which utility should be opened?","choices":["System Information.","Performance Monitor.","Disk Cleanup.","Services."],"correct":0,"explain":"System Information provides a consolidated view of hardware, components, and software environment details.","sub":"1.4"},{"id":15,"domain":"Operating Systems","q":"A newly installed drive appears in firmware but not in File Explorer. The technician needs to initialize it, create a partition, and assign a drive letter. Which tool should be used?","choices":["Disk Management.","Storage Sense.","Programs and Features.","System Restore."],"correct":0,"explain":"Disk Management is the standard GUI tool for initializing disks, creating volumes, and assigning drive letters.","sub":"1.4"},{"id":16,"domain":"Software Troubleshooting","q":"A Windows system is showing signs of corruption, and the technician wants to verify protected operating system files against known-good copies. Which command should be run first?","choices":["sfc /scannow.","chkdsk /r.","gpupdate /force.","net use."],"correct":0,"explain":"System File Checker verifies and repairs protected Windows system files.","sub":"3.1"},{"id":17,"domain":"Operating Systems","q":"A workstation experienced an improper shutdown, and the technician suspects file system errors or unreadable sectors on the drive. Which command is most appropriate?","choices":["diskpart clean.","format /q.","chkdsk /r.","bootrec /fixboot."],"correct":2,"explain":"chkdsk /r checks for logical file system errors and attempts to locate recoverable data in bad sectors.","sub":"1.2"},{"id":18,"domain":"Operating Systems","q":"A user says the workstation is not receiving an IP address from DHCP. Which command should the technician use first to view the current TCP/IP settings?","choices":["ipconfig.","tasklist.","gpresult /r.","whoami /all."],"correct":0,"explain":"ipconfig displays adapter IP settings and is commonly used as a first step in Windows network troubleshooting.","sub":"1.5"},{"id":19,"domain":"Security","q":"A domain user reports that newly assigned policies have not yet applied to the workstation. Which command should the technician run to refresh policy immediately?","choices":["gpupdate /force.","gpresult /r.","ipconfig /release.","sfc /verifyonly."],"correct":0,"explain":"gpupdate /force reapplies policy settings from local and domain policy sources.","sub":"2.1"},{"id":20,"domain":"Security","q":"A help desk technician needs to disable a local account on a standalone PC without editing the registry or opening Settings. Which tool is best suited for that task on supported editions?","choices":["lusrmgr.msc.","cleanmgr.exe.","winver.exe.","dxdiag.exe."],"correct":0,"explain":"Local Users and Groups, opened with lusrmgr.msc, is used to manage local accounts and groups on supported editions.","sub":"2.1"},{"id":21,"domain":"Security","q":"A standard user launches a tool that requires administrative privileges, and Windows asks for approval before allowing the change. Which security feature is performing that function?","choices":["User Account Control.","Fast User Switching.","NTFS inheritance.","Offline Files."],"correct":0,"explain":"User Account Control prompts when elevation is needed, helping prevent silent administrative changes.","sub":"2.5"},{"id":22,"domain":"Operating Systems","q":"A system will not boot normally after a bad update, and the technician needs access to Startup Repair and System Restore. Which environment should be opened?","choices":["Windows Recovery Environment.","Microsoft Store.","Windows Sandbox.","Task Scheduler library."],"correct":0,"explain":"Windows Recovery Environment includes advanced startup and repair tools used when Windows cannot start normally.","sub":"1.1"},{"id":23,"domain":"Operational Procedures","q":"A user accidentally overwrote a document yesterday and wants to restore an earlier version from a Windows feature designed to keep copies of personal files. Which feature should the technician check?","choices":["File History.","BitLocker To Go.","System Configuration.","Credential Manager."],"correct":0,"explain":"File History is designed to keep versioned backups of user files so earlier versions can be restored.","sub":"4.1"},{"id":24,"domain":"Operating Systems","q":"A school issues locked-down student laptops that should install apps primarily from the Microsoft Store to reduce risk and simplify support. Which Windows mode best matches that requirement?","choices":["Safe Mode.","S mode.","Audit mode.","Recovery mode."],"correct":1,"explain":"S mode restricts systems to a narrower application model centered on Microsoft Store apps.","sub":"1.3"},{"id":25,"domain":"Operating Systems","q":"Users on a small office private network cannot see each other for printer sharing even though connectivity works. Which Windows feature should the technician verify is enabled?","choices":["Network Discovery.","Windows Hello.","Credential Guard.","Storage Spaces."],"correct":0,"explain":"Network Discovery allows a Windows device to find and be found by other devices on a network, supporting common sharing workflows.","sub":"1.1"},{"id":26,"domain":"Security","q":"A security-conscious administrator wants users to perform daily tasks with minimal privileges and only elevate when needed. Which account type should be assigned for normal work?","choices":["Standard user account.","Built-in Administrator.","Domain Admins account.","Local admin service account."],"correct":0,"explain":"A standard user account follows least privilege and reduces risk during everyday activity.","sub":"2.5"},{"id":27,"domain":"Operating Systems","q":"A software vendor instructs a technician to modify a specific registry value to complete troubleshooting. Which Windows utility should be used?","choices":["regedit.","msconfig.","perfmon.","taskschd.msc."],"correct":0,"explain":"Registry Editor, launched with regedit, is used to view and modify registry keys and values.","sub":"1.4"},{"id":28,"domain":"Software Troubleshooting","q":"A user reports that a webcam stopped working after a driver update, and the technician wants to check for warning icons, disabled hardware, or driver problems. Which tool should be opened?","choices":["Device Manager.","Services.","Disk Cleanup.","Task Scheduler."],"correct":0,"explain":"Device Manager shows installed hardware and highlights device and driver issues through status indicators and properties.","sub":"3.1"},{"id":29,"domain":"Operational Procedures","q":"A support technician needs graphical remote access to a Windows PC in an edition that supports hosting remote sessions. Which Windows feature is the best fit?","choices":["Remote Desktop.","Nearby Sharing.","File History.","Storage Sense."],"correct":0,"explain":"Remote Desktop provides remote graphical access to supported Windows systems for administration or support.","sub":"4.8"},{"id":30,"domain":"Software Troubleshooting","q":"A user says the computer has become less stable over the past week, but cannot remember exactly when the crashes started. Which tool should a technician review to see a timeline of failures and software changes?","choices":["Reliability Monitor.","Credential Manager.","Local Security Policy.","Disk Management."],"correct":0,"explain":"Reliability Monitor provides a historical stability timeline that helps correlate failures with updates and other system changes.","sub":"3.1"},{"id":31,"domain":"Operating Systems","q":"A user reports that their Windows 10 laptop intermittently loses connectivity only when roaming between different floors using the same SSID. Other users don’t experience the issue. Which of the following Windows settings should you verify FIRST to align with enterprise roaming behavior?","choices":["Wi‑Fi NIC power mgmt & roaming aggressiveness.","VPN roaming timers and reconnect behavior.","Preferred DNS suffix order on the Wi‑Fi NIC.","IPv4 interface metric on the Wi‑Fi NIC."],"correct":0,"explain":"Roaming and intermittent drops tied to movement point to wireless adapter power saving and roaming aggressiveness behaviors at the NIC level.","sub":"1.5"},{"id":32,"domain":"Security","q":"A technician wants to centrally standardize Windows Update deferral periods and control when feature updates are installed on a fleet of Windows 10 Pro laptops in a domain. Which built‑in mechanism is MOST appropriate?","choices":["Configure Active Hours on each managed device.","Use the Windows Update Troubleshooter.","Set update pauses in the local WU panel.","Configure WUfB by Group Policy."],"correct":3,"explain":"Windows Update for Business through Group Policy is designed for domain‑based centralized update deferral and control.","sub":"2.1"},{"id":33,"domain":"Operating Systems","q":"A Windows 10 system boots to a black screen with a blinking cursor immediately after POST. No Windows logo appears. Which tool is the BEST choice to validate and repair the boot sector and BCD store from the Windows Recovery Environment command prompt?","choices":["bcdedit /set {default} bootlog Yes.","bootrec /fixmbr and bootrec /rebuildbcd.","sfc /scannow /offbootdir=C:\\ /offwindir=C:\\Windows.","bcdboot C:\\Windows /s C:."],"correct":1,"explain":"A black screen before the Windows logo typically indicates a boot loader or BCD issue; bootrec is the right utility.","sub":"1.1"},{"id":34,"domain":"Operating Systems","q":"A user’s Windows 10 desktop cannot access network shares by hostname but can access them using IP address. Internet browsing by URL fails as well, but pinging public IPs succeeds. Which Windows setting should be investigated FIRST?","choices":["DNS suffix search order on the NIC.","Name-resolution cache or hosts-file issue.","DNS server configuration on the NIC.","NRPT or proxy-based name resolution."],"correct":2,"explain":"Hostname resolution failing while IP works points directly to DNS server misconfiguration in the NIC settings.","sub":"1.1"},{"id":35,"domain":"Security","q":"An enterprise deploys a standardized Windows 10 image. Post‑deployment, several laptops show activation errors. The systems are supposed to use KMS‑based activation. Which command should the technician run from an elevated command prompt to force KMS activation troubleshooting?","choices":["slmgr /dlv details.","slmgr /skms kmsserver:1688 config.","slmgr /xpr status.","slmgr /ato activation."],"correct":3,"explain":"slmgr /ato initiates Windows activation and is standard for troubleshooting KMS/MAK activation issues.","sub":"2.1"},{"id":36,"domain":"Operating Systems","q":"A help desk technician wants to prevent non‑administrative users from changing network adapter IP settings, but still allow them to join wireless networks. The environment uses Active Directory. Which option BEST meets this requirement?","choices":["Use GPO to limit adapter changes.","Use GPO to restrict Network Connections.","Use GPO to hide IPv4 and IPv6 pages.","Use GPO to deploy approved Wi‑Fi profiles."],"correct":1,"explain":"Group Policy can specifically restrict access to the Network Connections UI while still allowing basic connectivity use.","sub":"1.5"},{"id":37,"domain":"Operating Systems","q":"A Windows 10 system frequently displays “Limited or no connectivity” on a specific wired NIC. IPCONFIG shows an APIPA address. Other devices on the same switch port work fine. Which action is the MOST appropriate first step in a layered troubleshooting approach?","choices":["Release and renew the DHCP lease.","Check NIC driver status and adapter props.","Reinstall the NIC, then renew the address.","Test with a known-good patch cable and port."],"correct":2,"explain":"APIPA with a single host suggests a local NIC/driver issue; reinstalling the NIC is a logical first local step.","sub":"1.1"},{"id":38,"domain":"Operational Procedures","q":"A technician needs to script the backup of critical user data prior to performing an in‑place upgrade of Windows 10. Corporate standards require including Desktop, Documents, and Favorites with minimal effort using a Microsoft‑native tool. Which option is the MOST appropriate?","choices":["Use USMT for user-profile migration.","Use File History for profile and library data.","Use robocopy for profile and library backups.","Use OneDrive Known Folder Move for sync."],"correct":0,"explain":"USMT is specifically designed to capture and restore user state including profile data during migrations.","sub":"4.7"},{"id":39,"domain":"Operating Systems","q":"A user cannot access a legacy web application that requires TLS 1.0 from a hardened Windows 10 system. Other HTTPS sites work properly. Which setting is the MOST likely cause?","choices":["Add the site to Trusted Sites.","TLS 1.0 is disabled in browser security.","Outbound HTTPS is blocked by Windows Firewall.","Static IPv4 is configured instead of DHCP."],"correct":1,"explain":"Legacy TLS dependence with other HTTPS working strongly indicates specific protocol disablement in browser/OS security settings.","sub":"1.1"},{"id":40,"domain":"Software Troubleshooting","q":"After a recent driver update, a user’s Windows 10 system experiences repeated BSODs referencing a display driver. Which Windows feature allows the technician to revert to the previously installed driver with minimal disruption?","choices":["Driver tab > Update Driver.","System Restore before the driver update.","msconfig > Boot > Base video.","Driver tab > Roll Back Driver."],"correct":3,"explain":"Device Manager’s Roll Back Driver is specifically intended to revert to the previous driver version.","sub":"3.1"},{"id":41,"domain":"Operating Systems","q":"A Windows 10 Pro laptop is joined to an Active Directory domain. A user needs to create a one‑time network share mapping using alternate credentials to access a secure file server. Which command is MOST appropriate?","choices":["net view \\\\server /all.","runas /user:DOMAIN\\username explorer.exe.","net use Z: \\\\server\\share /user:DOMAIN\\username.","cmdkey /add:server /user:DOMAIN\\username /pass:*."],"correct":2,"explain":"net use with drive letter and /user allows mapping with alternate domain credentials.","sub":"1.1"},{"id":42,"domain":"Operating Systems","q":"A Windows 10 user reports that their system takes an extremely long time to display the desktop after login. Task Manager shows sustained 100% disk usage by a third‑party antivirus product during startup. Which is the BEST Windows‑centric remediation approach that preserves security posture?","choices":["Use Startup tab & update the AV version.","Use Reliability Monitor to confirm the pattern.","Move the AV scan to a later startup window.","Use a clean boot to isolate startup services."],"correct":0,"explain":"Tuning startup items and updating AV is better than disabling AV and aligns with performance best practices.","sub":"1.4"},{"id":43,"domain":"Security","q":"A technician must allow inbound Remote Desktop access to a Windows 10 device over the local LAN while leaving the Windows Defender Firewall enabled. Which is the MOST appropriate configuration step?","choices":["Enable Network Discovery for the Private profile.","Enable the Remote Desktop firewall rule.","Allow SMB and file/printer firewall rules.","Open TCP 3389 with a custom inbound rule."],"correct":1,"explain":"The built‑in Remote Desktop inbound rule is the correct and least‑privilege firewall modification.","sub":"2.2"},{"id":44,"domain":"Software Troubleshooting","q":"A user’s Windows 10 system frequently crashes after resuming from sleep, but works fine after a clean reboot. Which power‑related configuration area is the MOST likely starting point for troubleshooting?","choices":["Advanced power settings & device power use.","Modern Standby sleep behavior in firmware.","Fast Startup and hybrid shutdown settings.","Battery saver and sleep timeout policies."],"correct":0,"explain":"Sleep/resume issues often relate to driver power management and advanced power settings.","sub":"3.1"},{"id":45,"domain":"Operating Systems","q":"A technician wants to capture detailed boot sequence information on a problematic Windows 10 workstation that intermittently hangs before the logon screen. Which boot option is MOST appropriate for initial data gathering?","choices":["Enable verbose boot messages.","Enable Safe Mode with Networking.","Enable Boot logging.","Enable low-resolution video."],"correct":2,"explain":"Boot logging creates ntbtlog.txt with driver load data, ideal for intermittent startup analysis.","sub":"1.1"},{"id":46,"domain":"Operating Systems","q":"A Windows 10 user complains that their mapped drive to \\\\SERVER\\SHARE disappears after reboot. The mapping works when re‑created manually using File Explorer. What is the BEST way to persist the mapping using built‑in tools?","choices":["Map the drive from elevated CMD.","Create a startup shortcut to the UNC path.","Store server credentials in Credential Manager.","Use Reconnect at sign-in or /persistent:yes."],"correct":3,"explain":"Persistent mappings via Explorer or net use /persistent:yes ensure the drive reconnects at logon.","sub":"1.1"},{"id":47,"domain":"Software Troubleshooting","q":"A technician suspects that a third‑party startup program is causing random application crashes. Which built‑in Windows utility is the MOST targeted way to selectively disable startup services and troubleshoot the issue?","choices":["msconfig.","Task Manager > Startup tab.","Services.msc for startup service review.","Autoruns for startup entry review."],"correct":0,"explain":"msconfig (System Configuration) allows selective startup and service isolation.","sub":"3.1"},{"id":48,"domain":"Operating Systems","q":"A Windows 10 system on a corporate network consistently receives an IP address, but cannot communicate outside its local subnet. IPCONFIG shows no default gateway. Where should the technician look FIRST to resolve this issue?","choices":["Firewall profile or local routing rules.","NIC settings for VLAN or jumbo frames.","DHCP scope option for the default gateway.","Switch port speed and duplex negotiation."],"correct":2,"explain":"No default gateway from DHCP means the scope options are likely misconfigured or missing the router option.","sub":"1.1"},{"id":49,"domain":"Software Troubleshooting","q":"A Windows 10 system fails Windows updates repeatedly with errors referencing corrupted system files. SFC reports it found corrupt files but was unable to fix some of them. What is the MOST appropriate next command to run before attempting updates again?","choices":["sfc /verifyonly output.","dism /restorehealth output.","chkdsk /scan output.","wuauclt /detectnow output."],"correct":1,"explain":"DISM repair of the component store is the proper next step when SFC cannot fix all files.","sub":"3.1"},{"id":50,"domain":"Security","q":"A user working remotely over a VPN reports that they can access internal file shares but cannot browse the public internet while connected. The VPN administrator wants to allow split tunneling. Which setting is MOST likely to be changed on the client side?","choices":["Disable IPv6 on the VPN adapter.","Set the VPN connection as metered.","Lower the physical NIC metric.","Uncheck default gateway on remote network."],"correct":0,"explain":"Split tunneling is commonly achieved by disabling the VPN adapter’s use of the remote default gateway.","sub":"2.2"},{"id":51,"domain":"Operating Systems","q":"A technician wants to quickly determine whether a Windows 10 system is obtaining its IP address from DHCP or using a statically assigned configuration without opening the GUI. Which command provides this information most directly?","choices":["netsh interface ipv4 show config.","route print output.","ipconfig /all output.","getmac /v output."],"correct":2,"explain":"ipconfig /all clearly shows whether DHCP is enabled and the lease details if applicable.","sub":"1.1"},{"id":52,"domain":"Operating Systems","q":"A Windows 10 user complains that search results from the Start menu do not include locally installed applications or documents, only web results. Which built‑in Windows feature should be checked or rebuilt FIRST?","choices":["Default apps by file type.","Cortana and cloud search settings.","Start menu layout policy.","Search indexing options & service."],"correct":3,"explain":"Start menu search depends heavily on the Windows Search service and index configuration.","sub":"1.1"},{"id":53,"domain":"Operating Systems","q":"A laptop user reports that Windows 10 shows “No battery detected” even though the system runs when plugged in. After confirming the battery is physically present, what is the MOST appropriate next troubleshooting step within Windows before replacing hardware?","choices":["Reinstall the ACPI battery device.","Update chipset and power drivers.","Run the power troubleshooter and rebuild plans.","Disable battery device, reboot, and rescan."],"correct":0,"explain":"Battery detection issues often require removing/reinstalling the ACPI battery device before declaring hardware failure.","sub":"1.1"},{"id":54,"domain":"Software Troubleshooting","q":"After a malware infection, a Windows 10 system’s browser continually redirects to unwanted sites, despite the malware scan showing clean. Hosts file entries were removed, but the behavior persists. Which additional setting is MOST likely involved?","choices":["A malicious browser extension remains.","A modified search provider or homepage.","A synced browser-profile issue persists.","A malicious proxy remains in browser settings."],"correct":3,"explain":"Browser hijacking frequently relies on malicious proxy settings that persist after basic cleanup.","sub":"3.1"},{"id":55,"domain":"Operating Systems","q":"A technician needs to verify which applications are listening on specific TCP ports on a Windows 10 workstation as part of a network connectivity issue. Which command is BEST suited for this purpose?","choices":["tasklist /svc output.","netstat -ano output.","Get-NetTCPConnection output.","arp -a output."],"correct":1,"explain":"netstat -ano shows listening ports with associated process IDs, key for port/application mapping.","sub":"1.1"},{"id":56,"domain":"Operating Systems","q":"After joining a Windows 10 Pro laptop to a domain, the user can no longer log in with their original local account name (without specifying the computer name). Which is the MOST correct way to log in using the old local account?","choices":["DOMAIN\\username.","username@domain.local.","Administrator\\username.",".\\username or COMPUTERNAME\\username."],"correct":3,"explain":"Dot-backslash or COMPUTERNAME\\username explicitly targets the local SAM account after domain join.","sub":"1.5"},{"id":57,"domain":"Operational Procedures","q":"A technician suspects that Group Policy is not being applied correctly to a Windows 10 domain client. Which command provides the MOST detailed information about the Resultant Set of Policy (RSoP) and applied GPOs?","choices":["gpresult /r or gpresult /h report.html.","rsop.msc console.","gpupdate /force output.","secedit /export /cfg policy.inf."],"correct":0,"explain":"gpresult produces a detailed RSoP report, ideal for diagnosing GPO application issues.","sub":"4.1"},{"id":58,"domain":"Security","q":"A Windows 10 system begins to show pop‑ups indicating that files are being encrypted, and file extensions change rapidly. The user disconnects from the network. What is the MOST immediate next step the technician should take on that workstation?","choices":["Capture the ransom note and begin scans.","Reconnect briefly to copy logs to a share.","Power off the machine & preserve evidence.","Start System Restore before rebooting."],"correct":2,"explain":"With active ransomware, immediate shutdown helps halt encryption and preserve forensic evidence.","sub":"2.3"},{"id":59,"domain":"Operating Systems","q":"A user cannot access a particular internal web application but can access other intranet sites. Pinging the server by hostname works. Other users can access the application. Which is the MOST appropriate first troubleshooting step on the affected Windows 10 machine?","choices":["Review the certificate chain and roots.","Reset the browser profile and extensions.","Compare behavior over VPN and LAN.","Clear cache/cookies & try another browser."],"correct":3,"explain":"Application‑specific issues with healthy network connectivity typically start with browser‑level troubleshooting.","sub":"1.1"},{"id":60,"domain":"Operating Systems","q":"After performing an in‑place upgrade of Windows 10, a technician needs to confirm that core system files are intact and not corrupted. Which single command is MOST appropriate to run from an elevated command prompt as a post‑upgrade validation step?","choices":["DISM /CheckHealth output.","sfc /scannow output.","chkdsk /scan output.","winver output."],"correct":1,"explain":"System File Checker (sfc /scannow) verifies and repairs protected system files after major changes.","sub":"1.1"},{"id":61,"domain":"Operating Systems","q":"A user saves files into a local folder that is supposed to sync to a shared cloud workspace, but coworkers never see the new files. Which setting is the MOST likely misconfigured?","choices":["The sync client is excluding that folder from replication.","The folder is syncing only to the user's personal cloud area.","The shared workspace is mounted with read-only offline access.","The document library is opening from a cached local shortcut."],"correct":0,"explain":"When files stay local but never appear in the shared workspace, the usual fault is the sync client scope or folder-selection setting.","sub":"1.1"},{"id":62,"domain":"Software Troubleshooting","q":"A technician needs to launch an old finance application that crashes after opening on Windows 11. Which built-in approach should be tried FIRST?","choices":["Run the app by using Program Compatibility settings.","Launch the app once as an administrator from its shortcut.","Repair the app installation from Apps and Features first.","Install the latest supported .NET runtime for the program."],"correct":0,"explain":"Program Compatibility settings are the least disruptive first step for an older app that worked on previous Windows versions.","sub":"3.1"},{"id":63,"domain":"Operating Systems","q":"A user cannot find a mapped department share after signing in to a replacement Windows laptop. Which action is MOST likely to restore access quickly?","choices":["Reconnect the network drive by using the correct UNC path.","Add the share again through Work or school account resources.","Enable Network Discovery and refresh available locations.","Reauthenticate to the file server with domain credentials."],"correct":0,"explain":"Mapped drives depend on the correct UNC path and often must be reconnected on a replacement device.","sub":"1.1"},{"id":64,"domain":"Operating Systems","q":"A workstation repeatedly boots to a blue recovery screen after a bad driver update. Which Windows tool is the BEST first rollback option?","choices":["Use Startup Settings and roll back the device driver.","Use System Restore from recovery tools to revert recent changes.","Boot into Safe Mode and uninstall the recently updated device.","Choose Last known good startup settings from recovery options."],"correct":0,"explain":"If the issue started after a driver update, rolling back that driver from startup recovery or Safe Mode is the fastest targeted fix.","sub":"1.1"},{"id":65,"domain":"Operating Systems","q":"A user reports that typing in Search returns no local apps, even though the apps open normally from shortcuts. Which service area should be checked FIRST?","choices":["The Windows indexing and search components status.","The Start menu search permissions and content settings.","The user profile's search database and search host process.","The app execution alias and default app registration state."],"correct":0,"explain":"Broken indexing or search components commonly cause missing results while installed apps still function normally.","sub":"1.1"},{"id":66,"domain":"Operating Systems","q":"A company needs a way for field laptops to receive Windows updates from Microsoft but defer feature releases until testing is complete. Which option BEST fits?","choices":["Use Windows Update for Business deferral policies.","Use Group Policy to pause all updates on each laptop manually.","Use WSUS with feature approvals after pilot validation.","Use servicing rings to defer feature updates while allowing quality patches."],"correct":0,"explain":"Windows Update for Business allows controlled deferral of feature updates while keeping normal quality updates flowing.","sub":"1.1"},{"id":67,"domain":"Software Troubleshooting","q":"A user says the laptop signs in, but only a black screen with a cursor appears. Which troubleshooting step should be tried EARLY?","choices":["Restart Explorer from Task Manager or Safe Mode.","Sign out and back in after ending a stuck shell session.","Boot to Safe Mode and test whether the desktop shell loads.","Restart the graphics driver and check for a shell initialization failure."],"correct":0,"explain":"A black screen with a cursor after sign-in often points to Explorer failing to launch rather than full OS corruption.","sub":"3.1"},{"id":68,"domain":"Operating Systems","q":"A technician needs to verify the exact Windows edition, build number, and activation state on a PC. Which built-in utility is BEST?","choices":["Use Settings or winver with the activation page.","Use System Information with Windows Activation details.","Use Control Panel System and the Activation status page.","Use the About page and verify activation under System settings."],"correct":0,"explain":"winver shows edition and build, and the activation page confirms license status.","sub":"1.5"},{"id":69,"domain":"Operational Procedures","q":"A laptop user wants personal files protected from accidental deletion or overwrite but does not need a full system image. Which Windows feature is BEST?","choices":["File History with a separate backup destination.","Previous Versions with File History enabled on the library.","OneDrive version history for Desktop and Documents folders.","Backup and Restore for selected user libraries only."],"correct":0,"explain":"File History is designed for versioned backup of user files rather than full-disk recovery.","sub":"4.3"},{"id":70,"domain":"Operating Systems","q":"A user receives a pop-up that states the PC cannot install a major Windows feature update because there is not enough free space. What should be done FIRST?","choices":["Free local storage by using Storage Sense or cleanup.","Use temporary external storage for Windows Setup if prompted.","Remove old update files and unused apps from the system drive.","Move large personal files off the OS volume before retrying the upgrade."],"correct":0,"explain":"Feature updates need working space; freeing local storage is the first practical step.","sub":"1.2"},{"id":71,"domain":"Operating Systems","q":"A technician is preparing a USB device to repair a Windows boot problem on a UEFI system. Which file system should the boot media typically use?","choices":["FAT32 to support broad UEFI boot compatibility.","NTFS so the recovery media can store larger image files.","exFAT for removable media that must boot on modern systems.","FAT16 because firmware reads it before Windows loads."],"correct":0,"explain":"UEFI firmware broadly supports FAT32 boot media, making it the standard choice for Windows installation and recovery USB drives.","sub":"1.2"},{"id":72,"domain":"Security","q":"A user can browse the web, but Outlook cannot reach Microsoft 365 from the desktop app until the system clock is corrected. What caused this?","choices":["Time drift broke secure authentication validation.","A corrupted Outlook profile broke modern authentication tokens.","Incorrect regional settings caused Microsoft 365 sign-in failures.","Cached credentials no longer matched the user's cloud session."],"correct":0,"explain":"Large time drift can break certificate and token validation even when general connectivity still works.","sub":"2.1"},{"id":73,"domain":"Operating Systems","q":"A shared workstation should erase local changes whenever a student signs out, but the school still wants normal Windows each session. Which approach BEST fits?","choices":["Use a nonpersistent virtual desktop environment.","Use mandatory profiles with folder redirection to reset changes.","Use shared PC mode with sign-out cleanup policies enabled.","Use kiosk mode with automatic profile removal after sign-out."],"correct":0,"explain":"A nonpersistent desktop returns to a clean baseline after sign-out, which matches shared-lab requirements.","sub":"1.1"},{"id":74,"domain":"Software Troubleshooting","q":"A user reports that a printer is installed, but every job remains stuck in the queue and nothing prints. Which Windows service should be checked FIRST?","choices":["The Print Spooler service state and restart option.","The printer port assignment and online device status.","The queue for paused or errored print jobs on the workstation.","The installed driver package and default printer mapping."],"correct":0,"explain":"A stalled print queue is most often tied to the Print Spooler service.","sub":"3.1"},{"id":75,"domain":"Operating Systems","q":"A technician must access Device Manager remotely on a user’s PC but should not take full interactive control of the whole desktop. Which built-in tool is MOST appropriate?","choices":["Use Computer Management to connect remotely.","Use MMC with the Device Manager snap-in against the remote host.","Use PowerShell remoting to query Plug and Play devices remotely.","Use Remote Assistance in view-only mode for guided device checks."],"correct":0,"explain":"Computer Management can connect to another Windows machine for focused administration without full-screen remote control.","sub":"1.4"},{"id":76,"domain":"Operating Systems","q":"A user needs to restore one deleted document version from yesterday without rolling back the whole operating system. Which Windows method is BEST?","choices":["Restore the file from File History versions.","Open Previous Versions for the parent folder and recover the file.","Restore the document from OneDrive or SharePoint version history.","Recover the deleted item from the recycle bin or backup location."],"correct":0,"explain":"File History restores specific file versions without changing system files or installed applications.","sub":"1.1"},{"id":77,"domain":"Software Troubleshooting","q":"A technician needs to repair corrupted Windows system files while the operating system is still bootable. Which command should be run FIRST?","choices":["Run SFC /scannow from an elevated command prompt.","Run DISM /Online /Cleanup-Image /RestoreHealth first.","Run chkdsk /scan on the system volume before rebooting.","Run a repair install from mounted Windows installation media."],"correct":0,"explain":"System File Checker is the first-line tool for repairing protected Windows system files on a bootable installation.","sub":"3.1"},{"id":78,"domain":"Software Troubleshooting","q":"A PC boots, but apps fail to launch and servicing errors appear after an interrupted update. Which command commonly repairs the Windows image store?","choices":["Run DISM /Online /Cleanup-Image /RestoreHealth.","Run SFC /scannow after the image health scan completes.","Run Windows Update Troubleshooter to repair servicing components.","Run DISM with ScanHealth to confirm corruption before remediation."],"correct":0,"explain":"DISM repairs the component store that SFC relies on when update or servicing corruption exists.","sub":"3.1"},{"id":79,"domain":"Software Troubleshooting","q":"A user needs a command-line tool to view and end unresponsive processes on Windows. Which tool BEST matches?","choices":["Use tasklist and taskkill from Command Prompt.","Use Get-Process and Stop-Process in PowerShell.","Use Task Manager Details tab to end the hung process.","Use Resource Monitor to identify and terminate the process."],"correct":0,"explain":"tasklist displays running processes and taskkill ends them from the command line.","sub":"3.1"},{"id":80,"domain":"Operating Systems","q":"A technician wants to start Windows with only essential services and drivers to test whether a third-party startup item is causing a problem. Which mode is BEST?","choices":["Boot into Safe Mode for minimal Windows startup.","Use a clean boot to isolate non-Microsoft startup services.","Boot with selective startup from System Configuration.","Use Safe Mode with Networking if remote tools are required."],"correct":0,"explain":"Safe Mode loads a minimal set of drivers and services, making it ideal for isolating third-party startup issues.","sub":"1.1"},{"id":81,"domain":"Security","q":"A user must encrypt a Windows laptop so that data remains protected if the device is stolen. Which Windows feature is BEST?","choices":["Enable BitLocker drive encryption on the volume.","Require a startup PIN with TPM-backed device encryption.","Enable BitLocker To Go for removable drives used with the laptop.","Store the recovery key in a managed account or directory service."],"correct":0,"explain":"BitLocker protects data at rest by encrypting the drive and is the standard Windows answer for stolen-device risk.","sub":"2.5"},{"id":82,"domain":"Operating Systems","q":"A technician needs to change a Windows network profile from Public to Private so discovery and file sharing work on a trusted LAN. Where should this be changed?","choices":["Use the network adapter properties in Settings.","Use the network connection's profile type under Network and Internet.","Use Windows Security firewall network profile settings.","Use advanced sharing settings for the active connection."],"correct":0,"explain":"The network profile for a connection is changed from the network adapter or connection properties in Settings.","sub":"1.1"},{"id":83,"domain":"Operating Systems","q":"A new local printer driver installs correctly, but users still cannot print because Windows sends jobs to an offline port. What should be corrected?","choices":["Set the printer to the proper TCP/IP or USB port.","Reassign the queue to the currently reachable printer port.","Verify the printer is not bound to a WSD port that is offline.","Match the installed printer object to the device's active port."],"correct":0,"explain":"If the wrong printer port is selected, jobs queue but never reach the actual printer.","sub":"1.1"},{"id":84,"domain":"Operational Procedures","q":"A technician wants to open a scriptable shell that can query services, manage processes, and automate Windows administration natively. Which tool is BEST?","choices":["Use PowerShell for Windows administration tasks.","Use Windows Terminal with PowerShell profiles for automation.","Use Command Prompt with administrative scripts and utilities.","Use the MMC console with task automation snap-ins."],"correct":0,"explain":"PowerShell is the native Windows automation and administration shell.","sub":"4.7"},{"id":85,"domain":"Security","q":"A Windows user loses access to a file because NTFS permissions were tightened on a shared folder. What permission principle should the technician review FIRST?","choices":["Least privilege and inherited NTFS permission entries.","Effective permissions from group membership and share access.","Explicit deny entries overriding inherited allow permissions.","Ownership and permission inheritance on the parent folder."],"correct":0,"explain":"NTFS access problems are usually solved by reviewing least privilege, inheritance, and explicit deny or allow entries.","sub":"2.5"},{"id":86,"domain":"Operating Systems","q":"A technician needs to configure a Windows computer to receive an IP address automatically from the network. What should be enabled on the adapter?","choices":["Set IPv4 to obtain an address automatically.","Enable automatic DNS assignment on the same adapter.","Verify DHCP client is enabled for the active interface.","Remove any static gateway and subnet values from IPv4 settings."],"correct":0,"explain":"Automatic IPv4 addressing uses DHCP and is enabled through the adapter’s TCP/IPv4 settings.","sub":"1.1"},{"id":87,"domain":"Operating Systems","q":"A user forgot the password for a Microsoft account on a Windows PC and cannot sign in. What is the proper first recovery path?","choices":["Reset the password through Microsoft account recovery.","Use another trusted sign-in method tied to the Microsoft account.","Start the online account recovery workflow from a separate device.","Verify the PC has internet access for cloud credential validation."],"correct":0,"explain":"A Microsoft account password should be reset through Microsoft’s account recovery process, not through local SAM manipulation.","sub":"1.1"},{"id":88,"domain":"Operating Systems","q":"A technician needs to see whether CPU, memory, disk, or network activity is bottlenecking a Windows system in real time. Which tool is BEST?","choices":["Use Resource Monitor to inspect live activity.","Use Task Manager Performance and Details views together.","Use Performance Monitor counters for real-time system bottlenecks.","Use Reliability Monitor to correlate recent resource-related issues."],"correct":0,"explain":"Resource Monitor shows real-time utilization and process-level resource activity across core subsystems.","sub":"1.4"},{"id":89,"domain":"Software Troubleshooting","q":"A Windows desktop repeatedly logs the user into a temporary profile after each restart. Which troubleshooting area should be checked FIRST?","choices":["Profile corruption in the user profile registry path.","A failed Profile Service load during sign-in processing.","Incorrect permissions on the user's profile folder.","A damaged user hive or ProfileList SID mapping."],"correct":0,"explain":"Temporary profile logons commonly point to profile corruption or a broken ProfileList registry mapping.","sub":"3.1"},{"id":90,"domain":"Operating Systems","q":"A technician must recover a Windows system that will not start normally after boot files were damaged. Which recovery tool is MOST appropriate?","choices":["Use Startup Repair from the Windows recovery tools.","Use bootrec commands from WinRE to repair startup records.","Use System Restore from recovery to revert boot-related changes.","Use BCD repair tools after booting to the recovery environment."],"correct":0,"explain":"Startup Repair is designed to fix common boot-file and startup configuration problems.","sub":"1.1"},{"id":91,"domain":"Security","q":"A technician is securing a shared workstation. Management wants to ensure that default accounts do not provide unnecessary access and that only authorized users can log in. Which of the following actions should the technician perform?","choices":["Require full-disk encryption on all drives","Change default administrator passwords and disable the guest account","Enable AutoRun and configure screen lock","Configure password expiration for all accounts only"],"correct":1,"explain":"Changing default admin passwords and disabling the guest account removes easy entry points and enforces that only known, authorized accounts can sign in. Full-disk encryption, screen locks, and password expiration are useful, but they do not directly address insecure default and guest accounts.","sub":"2.6"},{"id":92,"domain":"Security","q":"A technician needs to deploy an operating system to 50 new laptops in a corporate environment. The goal is to minimize manual intervention during setup while ensuring each device receives the same preconfigured image. Which of the following installation methods BEST meets this requirement?","choices":["Clean install using USB media on each device","Multiboot installation with user-selected OS options","Zero-touch deployment","Repair installation using existing system partitions"],"correct":2,"explain":"Zero-touch deployment uses automated deployment tools and answer files so systems receive a standard image with minimal or no technician interaction. Manual clean installs and repair installs require far more hands-on work, and multiboot adds complexity rather than standardization.","sub":"2.1"},{"id":93,"domain":"Software Troubleshooting","q":"A user reports that several personal files are missing or have been renamed on their Windows PC. The technician also notices unexpected desktop alerts from the operating system. Which of the following should the technician suspect FIRST?","choices":["Outdated device drivers for storage controllers","Malware infection","Misconfigured NTFS permissions on user folders","Corrupted system restore points"],"correct":1,"explain":"Abrupt file renaming, missing documents, and odd alerts or pop-ups are classic signs of malware, including ransomware and other file-manipulating threats. Driver or NTFS issues may affect access, but they are less likely to rename files or trigger suspicious alerts.","sub":"3.1"},{"id":94,"domain":"Security","q":"A technician is configuring new user accounts on a Windows workstation. Management requires that passwords must contain a mix of letters, numbers, and special characters and expire every 90 days. Which of the following security considerations is being implemented?","choices":["NTFS permissions on system volumes","Password complexity and expiration policies","Full-disk encryption for confidential data","Account lockout policies after multiple failures"],"correct":1,"explain":"Requiring specific character types and regular password changes directly relates to password complexity and expiration policies. Lockout policies govern how many bad attempts are allowed, and NTFS or encryption protect data, not the structure of the password itself.","sub":"2.1"},{"id":95,"domain":"Security","q":"A technician is securing a Windows workstation used by multiple users. The goal is to allow a user to access only their personal files while preventing changes to system files and other users' data. Which of the following is the BEST configuration to achieve this?","choices":["Configure the account as a standard user and set appropriate NTFS permissions on folders","Assign the user as an administrator and disable User Account Control (UAC)","Assign the user as a guest account and disable NTFS permissions","Enable BitLocker and assign full control permissions to all users"],"correct":0,"explain":"A standard user account combined with properly configured NTFS permissions ensures users can work with their own data but cannot modify system files or other users' folders. Giving admin rights or disabling NTFS protections undermines least privilege and isolation.","sub":"2.5"},{"id":96,"domain":"Security","q":"A technician wants to prevent malware from automatically executing when a USB drive is connected to a Windows workstation. Which of the following hardening techniques should the technician implement?","choices":["Disable AutoRun","Configure failed logon attempts lockout only","Restrict user log-in times","Enable full-disk encryption on all fixed drives"],"correct":0,"explain":"Disabling AutoRun/AutoPlay stops removable media from launching programs automatically, a common malware vector. Lockout thresholds, logon time restrictions, and disk encryption help in other areas but do not directly stop USB-based autorun threats.","sub":"2.3"},{"id":97,"domain":"Security","q":"A user complains that their Windows PC cannot access the corporate network, but other devices on the same network work fine. The technician notices desktop alerts indicating network authentication failures. Which of the following should the technician suspect FIRST?","choices":["Incorrect network credentials or account issues","Malware infection on the default gateway","Browser misconfiguration on all endpoints","Outdated antivirus definitions on the file server"],"correct":0,"explain":"If other devices work but this one shows authentication failures, the likely cause is bad credentials or an account problem for that user or machine. Gateway malware or server antivirus definitions would usually affect many users, not just one endpoint.","sub":"2.3"},{"id":98,"domain":"Operating Systems","q":"During an OS installation, a technician is asked to preserve the user's personal files but start with a fresh copy of the operating system. Applications will need to be reinstalled afterward. Which of the following installation methods should the technician use?","choices":["In-place upgrade","Repair installation","Zero-touch deployment of a standard image that wipes the drive","Image deployment that overwrites all existing partitions"],"correct":1,"explain":"A repair installation (also called an in-place repair/refresh depending on version) reinstalls core OS files while preserving user data, often requiring apps to be reinstalled. A full image deployment or wipe will remove user data, and an in-place upgrade focuses on moving to a newer version, not refreshing the existing one.","sub":"1.2"},{"id":99,"domain":"Security","q":"A user reports that their browser keeps redirecting to unfamiliar websites and shows frequent certificate warnings. Other browsers on the same PC are functioning normally. Which of the following is the MOST likely cause?","choices":["Compromised browser settings or a malicious extension","Failing network interface card on the workstation","Incorrect NTFS permissions on browser folders","Outdated operating system updates on the domain controller"],"correct":0,"explain":"When only one browser is affected by redirects and warnings, it points to that browser's configuration: hijacked home page/search settings or a malicious add-on. Hardware issues or domain controller patches would impact all network traffic or multiple systems, not just one browser.","sub":"2.1"},{"id":100,"domain":"Security","q":"A technician is configuring a Windows workstation so that users can log in using a PIN, fingerprint, or facial recognition instead of a traditional password. Which of the following features should the technician enable?","choices":["Encrypting File System (EFS)","Windows Hello","BitLocker-To-Go","User Account Control (UAC)"],"correct":1,"explain":"Windows Hello provides PIN, biometric, and multi-factor sign-in methods as alternatives to traditional passwords. EFS encrypts files, BitLocker-To-Go secures removable drives, and UAC controls elevation, not authentication methods.","sub":"2.6"},{"id":101,"domain":"Security","q":"A user attempts to upgrade from Windows 8.1 Home to Windows 11 Pro but receives an error stating that the hardware is not supported. Which of the following should the technician check FIRST before attempting the upgrade again?","choices":["Whether System Restore is enabled for the OS volume","Hardware compatibility with Windows 11 requirements","Availability of third-party drivers for legacy peripherals","Existence of a recovery partition on the system"],"correct":1,"explain":"Windows 11 has strict hardware requirements, including TPM 2.0, Secure Boot, and supported CPUs. If the error mentions unsupported hardware, confirming compatibility is the first step. Restore points, recovery partitions, and drivers are secondary to meeting minimum requirements.","sub":"2.1"},{"id":102,"domain":"Security","q":"A company wants to encrypt sensitive files on a Windows workstation so that only the owner can access them, even if someone else logs into the computer. Which of the following security features should the technician use?","choices":["Encrypting File System (EFS)","BitLocker on the system drive only","NTFS share permissions on the folder","Windows Defender Firewall rules"],"correct":0,"explain":"EFS encrypts files tied to a specific user account and certificate. Even if another user signs into the same machine, they cannot open those EFS-protected files. BitLocker protects entire volumes, and NTFS permissions or firewalls control access, not encryption per-user.","sub":"2.5"},{"id":103,"domain":"Security","q":"A technician is configuring Windows Defender Firewall on a Windows 11 workstation joined to a corporate domain. Management requires that only domain-admin-approved inbound connections be allowed while blocking unsolicited external traffic. Which of the following configurations BEST meets this requirement?","choices":["Enable the firewall and configure inbound rules to allow only required services, blocking all others by default","Disable the firewall and rely solely on the perimeter hardware firewall","Allow all inbound traffic and configure outbound rules to block unknown applications","Disable outbound rules and enable only the public network profile"],"correct":0,"explain":"A secure host firewall configuration uses a default deny stance: block unsolicited inbound traffic and explicitly allow only necessary services. Turning the firewall off or allowing all inbound traffic violates least privilege and increases the attack surface.","sub":"2.2"},{"id":104,"domain":"Security","q":"A Windows 11 system is being deployed to a laptop that will be frequently used on public Wi-Fi. The security policy requires protection of all data at rest, including hibernation and temp files, without changing user workflows. Which of the following should the technician configure FIRST?","choices":["EFS on the user profile folder only","BitLocker full-disk encryption with TPM and PIN","NTFS permissions on the Documents folder only","A third-party antivirus suite without disk encryption"],"correct":1,"explain":"BitLocker full-disk encryption protects the entire volume, including system files, hibernation, and temp data, satisfying the “all data at rest” requirement. EFS affects selected files only, NTFS permissions do not encrypt data, and antivirus alone does not provide encryption.","sub":"2.5"},{"id":105,"domain":"Security","q":"A technician needs to deploy a standardized Windows 11 image that already includes corporate applications, security baselines, and local policies. The deployment will occur over the network to multiple VLANs. Which of the following technologies would be the BEST choice to support this scenario?","choices":["Manual installation using standalone ISO media on each system","Network-based image deployment using PXE and a deployment server","Local repair installation from the existing OS","Multiboot configuration with user-selected operating systems"],"correct":1,"explain":"PXE-based network deployment with an imaging server allows centralized rollout of a preconfigured image to many machines efficiently. Manual ISO installs do not scale, and repair or multiboot are not suited for standardized, mass deployment.","sub":"2.1"},{"id":106,"domain":"Security","q":"A help desk technician wants to ensure that a standard user in Windows cannot install unsigned software or make system-level changes without explicit administrator approval. Which of the following features should be properly configured to enforce this requirement?","choices":["Windows Hello for Business","User Account Control (UAC) set to always notify for changes","Remote Assistance with full control","BitLocker-To-Go on external drives"],"correct":1,"explain":"UAC prompts for admin credentials when software or system settings require elevation, preventing standard users from making unauthorized changes. Windows Hello controls sign-in, BitLocker-To-Go protects removable media, and Remote Assistance is for remote control, not local elevation.","sub":"2.5"},{"id":107,"domain":"Security","q":"A security administrator is reviewing local group memberships on a Windows 10 system. One account used by multiple shift workers is a member of the local Administrators group. This practice violates the principle of least privilege. Which of the following is the BEST corrective action?","choices":["Remove the shared account from Administrators and create individual standard user accounts","Disable the local Guest account only","Move the account to the Backup Operators group","Enable AutoRun for all removable media"],"correct":0,"explain":"Shared admin accounts break accountability and violate least privilege. Each worker should have their own standard account, and admin access should be tightly controlled. Disabling Guest or changing groups without fixing the shared nature does not solve the core problem.","sub":"2.1"},{"id":108,"domain":"Security","q":"After joining a Windows 11 device to an Active Directory domain, the technician must ensure that users cannot change critical security settings such as firewall rules or password policies. Which of the following should be used to centrally enforce these restrictions?","choices":["Local Security Policy only on each individual device","Group Policy Objects applied to the appropriate OU","Device Manager hardware profiles","Windows Defender Offline scan configuration"],"correct":1,"explain":"In a domain environment, Group Policy Objects (GPOs) applied to OUs centrally control settings like firewall rules and password policies. Local Security Policy works only per machine and can be overridden by domain policies.","sub":"2.5"},{"id":109,"domain":"Security","q":"A user reports that their Windows 10 laptop frequently prompts for credentials when accessing a mapped network drive, even though “Remember my credentials” is selected. Security policy requires centralized credential management with minimal local caching. Which of the following tools should the technician review FIRST?","choices":["BitLocker recovery key manager","Performance Monitor counters","Windows Credential Manager settings","Task Scheduler library"],"correct":2,"explain":"Credential Manager stores saved usernames and passwords for network resources. If mapped drives keep prompting, reviewing and adjusting Credential Manager entries is the logical first step. BitLocker, Task Scheduler, and Performance Monitor are unrelated to stored network credentials.","sub":"2.5"},{"id":110,"domain":"Operating Systems","q":"During a Windows installation, a technician is asked to create a configuration that allows users to choose between Windows 10 and a previously installed Linux distribution each time the computer boots. Which of the following installation types is being configured?","choices":["Zero-touch deployment","Multiboot installation","Repair installation","Virtualized OS installation only"],"correct":1,"explain":"A multiboot installation sets up multiple operating systems on the same hardware, offering a boot menu at startup. Zero-touch deals with automated deployment, repair focuses on fixing an existing OS, and virtualization runs OSs inside VMs rather than as direct boot options.","sub":"1.6"},{"id":111,"domain":"Security","q":"A Windows 11 user reports seeing “This app has been blocked by your system administrator” when trying to run an unapproved executable downloaded from the internet. Which of the following technologies is MOST likely enforcing this restriction?","choices":["System Restore","Windows Hello","AppLocker or application control policies","Hyper-V virtual switches"],"correct":2,"explain":"AppLocker and similar application control policies block unauthorized executables based on rules such as publisher, path, or hash. System Restore, Windows Hello, and Hyper-V networking are not responsible for blocking application launches.","sub":"2.1"},{"id":112,"domain":"Security","q":"A technician is tasked with ensuring that a Windows image used for deployment is hardened before being captured. Which of the following steps should be performed in the reference image PRIOR to capture?","choices":["Apply all current security updates and remove unused default applications","Disable Windows Update permanently to avoid post-deployment changes","Configure user-specific documents and personal data for the template account","Join the reference image to the production domain before capture"],"correct":0,"explain":"A hardened reference image should be fully patched and stripped of unnecessary software to reduce the attack surface. Disabling Windows Update or embedding personal data is bad practice, and joining the reference to the production domain can cause SID and trust issues after deployment.","sub":"2.1"},{"id":113,"domain":"Security","q":"An organization wants to ensure that sensitive data copied to USB flash drives from Windows workstations is always encrypted, even when the drive leaves the building. Which of the following features is the BEST solution?","choices":["EFS applied to the user's Documents folder","BitLocker-To-Go on removable drives","Windows Hello PIN-only sign-in","NTFS permissions restricted to the local user"],"correct":1,"explain":"BitLocker-To-Go encrypts data on removable drives so that if the USB is lost or used on another system, its contents remain protected. EFS and NTFS permissions protect data on a specific Windows installation, not across different machines.","sub":"2.5"},{"id":114,"domain":"Operating Systems","q":"A user wants to upgrade from Windows 10 Home to Windows 11 Pro in place, retaining installed applications and user data. Before proceeding, the technician must confirm that the system has TPM 2.0 enabled. Which tool or location in Windows is the BEST place to verify TPM status?","choices":["Device Manager > Disk drives","TPM Management console (tpm.msc)","Task Scheduler > Microsoft > Windows","Windows Memory Diagnostic"],"correct":1,"explain":"The TPM Management console (tpm.msc) reports TPM presence, version, and status, making it the correct place to verify TPM 2.0. Disk drives, Task Scheduler, and memory diagnostics are unrelated to TPM support.","sub":"1.4"},{"id":115,"domain":"Operating Systems","q":"A technician is asked to configure a kiosk-style Windows device that automatically signs in with a restricted account and runs only a single approved application. This device will be placed in a public lobby. Which of the following Windows features is MOST appropriate for this use case?","choices":["Assigned access / kiosk mode","Multiboot with separate user profiles","Remote Desktop with full admin privileges","Developer mode with unrestricted sideloading"],"correct":0,"explain":"Assigned access (kiosk mode) locks a Windows session to a single app, perfect for lobby or public terminals. Multiboot, Remote Desktop with admin, or developer mode all increase complexity or risk rather than hardening the station.","sub":"1.1"},{"id":116,"domain":"Security","q":"During user onboarding, a technician is instructed to ensure that passwords cannot be reused for several cycles and that users must choose new passwords that differ from old ones. Which of the following policy settings should be configured to support this requirement?","choices":["Account lockout threshold and duration","Password history and minimum password age","Interactive logon message text","Local audit policy for logon events"],"correct":1,"explain":"Password history prevents reuse of a certain number of previous passwords, and minimum password age stops users from quickly cycling through passwords to reuse an old one. Lockout policies deal with failed attempts, not reuse.","sub":"2.1"},{"id":117,"domain":"Security","q":"A Windows 10 laptop is used by a traveling executive who often works offline. The security team requires that if the device is lost, the data should remain protected and cannot be accessed by simply moving the drive to another computer. Which of the following BEST meets this requirement?","choices":["NTFS compression on the system volume","BitLocker with TPM-based protection","Windows Defender Firewall with default rules","EFS on only the Documents and Desktop folders"],"correct":1,"explain":"BitLocker full-disk encryption tied to TPM prevents the drive from being decrypted if it’s removed and placed in another system. NTFS compression is not a security control, and EFS only protects specific files, leaving the rest of the disk exposed.","sub":"2.5"},{"id":118,"domain":"Operating Systems","q":"A technician is performing a clean installation of Windows on a system that previously had multiple partitions with various operating systems. The user wants a simplified setup with a single OS and maximum contiguous space. Which of the following actions should the technician take during the installation process?","choices":["Delete existing partitions and create a new single partition before installing Windows","Leave all partitions intact and install Windows over the oldest OS","Create additional logical drives inside the extended partition only","Install Windows to unallocated space while leaving old bootloaders unchanged"],"correct":0,"explain":"Deleting old partitions and creating a new one consolidates space and removes legacy OS remnants, giving a clean single-OS environment. Installing over old systems or keeping old partitions can leave fragmented space and confusing boot configurations.","sub":"1.2"},{"id":119,"domain":"Security","q":"A help desk technician suspects that a Windows 11 system has been compromised by a recent phishing attack. Before running malware scans, the technician wants to verify whether any unauthorized programs are configured to start automatically at login. Which of the following built-in tools is BEST suited for this initial review?","choices":["Disk Management","Task Manager Startup tab","Windows Memory Diagnostic","Local Group Policy Editor > Password Policy"],"correct":1,"explain":"The Startup tab in Task Manager shows which programs are set to run at logon, making it a quick way to spot suspicious entries. Disk Management, memory diagnostics, and password policy do not list startup applications.","sub":"2.4"},{"id":120,"domain":"Security","q":"After applying new security baselines, a technicia
