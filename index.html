mes /S /COPY:DAT /R:3 /W:5.","md \\newfs\\homes && robocopy \\oldfs\\homes \\newfs\\homes /E /R:3."],"correct":1,"explain":"Robocopy with /MIR mirrors the tree (including deletions), /COPY:DATSOU preserves data, attributes, timestamps, security, owner, and auditing, /R and /W handle retries on a flaky link, and /LOG outputs a detailed log. This single command most fully meets the migration requirements.","sub":"1.2"},{"id":246,"domain":"Operating Systems","q":"A domain-joined laptop can browse the web on office Wi-Fi, and ping filesrv01 resolves to the correct IP. However, attempting \\filesrv01\\dept fails immediately with \"The network path was not found.\" The same user can access the share over VPN from home. On the laptop, the current network profile shows Public. What is the BEST fix on the client?","choices":["Add a persistent static route to the file server subnet on the client.","Switch the network profile to Private.","Replace internal DNS with public resolvers to refresh the SMB name lookup.","Configure a proxy bypass list for the internal file server hostname."],"correct":1,"explain":"On Windows, firewall rules for file and printer sharing are often disabled on Public networks. Marking the network as Private and ensuring File and Printer Sharing and Network Discovery are allowed for that profile enables SMB access to internal shares. DNS and routing are already working, as the name resolves and the share works over VPN.","sub":"1.1"},{"id":247,"domain":"Security","q":"A help desk notes that many 802.11n/ac clients on an older SSID connect but report low speeds. The AP security is set to WPA/WPA2 mixed mode with TKIP+AES to \"support legacy gear.\" No hardware changes are allowed. What single change will MOST improve performance and security for modern clients?","choices":["Keep WPA/WPA2 mixed mode and rotate the shared key more often.","Use WPA2 or WPA3 with AES-CCMP only.","Enable Kerberos directly on the access point to speed authentication.","Move to TKIP-only because it may reduce encryption overhead."],"correct":1,"explain":"TKIP limits data rates and is considered insecure. Using WPA2 (or WPA3) with AES-CCMP only removes legacy TKIP constraints and improves both performance and security for modern clients, even without changing hardware.","sub":"2.2"},{"id":248,"domain":"Software Troubleshooting","q":"A PC recently showed fake security warnings and now Windows Updates fail with various codes. AV scans in normal mode show clean, but services won't stay started and update attempts roll back. Which is the BEST next step to remediate?","choices":["Download the cumulative update package manually and retry the install.","Delete SoftwareDistribution and keep rerunning Windows Update attempts.","Remove persistence offline, then repair updates.","Disable the firewall and antivirus during the next update attempt."],"correct":2,"explain":"Fake security software and similar malware often tamper with services and update components. If symptoms persist despite \"clean\" scans, use Safe Mode or an offline environment to run updated anti-malware and remove persistence, then repair Windows Update as needed. Simply retrying updates or disabling the firewall does not address the root cause.","sub":"3.1"},{"id":249,"domain":"Software Troubleshooting","q":"A user needs to troubleshoot a program that is automatically launching every time they log into Windows 10, but the application is not listed in the Startup tab of Task Manager or in the Startup folder. Which of the following utilities should the technician use FIRST to locate the source of the autostart behavior?","choices":["Internet Options.","Device Manager.","Indexing Options.","System Configuration (msconfig)."],"correct":3,"explain":"System Configuration (msconfig) lets you review and selectively disable startup items and services beyond what appears in the simple Startup folder. It's a common first tool for investigating and controlling authostart behavior when the Task Manager startup list doesn't show the culprit.","sub":"3.1"},{"id":250,"domain":"Software Troubleshooting","q":"A user reports they downloaded a browser extension that promised to block ads and speed up browsing, but instead their homepage was changed, search results display unwanted ads, and new toolbars appear after every restart. What is the BEST next step to troubleshoot while improving browser security?","choices":["Clear all browsing data and test the browser again.","Remove the extension and use trusted marketplaces only.","Turn off the pop-up blocker so the extension can finish setup.","Update the browser and enable hardware acceleration."],"correct":1,"explain":"The behavior indicates a malicious or unwanted extension. The best immediate step is to remove the extension and reinforce the practice of installing extensions only from trusted, verified marketplaces. Clearing cache or disabling pop-up blockers doesn't remove the underlying cause.","sub":"3.2"},{"id":251,"domain":"Security","q":"A remote employee needs to access an internal company website through their browser while connected to the public internet. The site uses a self-signed certificate, and the employee wants to make sure the connection is secure without changing browser-wide security settings. What is the BEST solution?","choices":["Use private browsing mode and accept the warning each session.","Disable HTTPS protections for that internal internal site only.","Trust the site's certificate in the browser or device store.","Bypass the warning once and bookmark the page for later use."],"correct":2,"explain":"Trusting the specific self-signed certificate by importing it into the browser's trusted store ensures the connection is treated as secure for that site without globally weakening browser security. Repeatedly bypassing warnings or loosening HTTPS settings is insecure.","sub":"2.1"},{"id":252,"domain":"Software Troubleshooting","q":"A SOHO user reports sudden file renaming and ransom notes appearing on a Windows 11 Home PC while it's connected to the home NAS and a shared printer. You confirm the symptoms and determine it's active ransomware. What is the BEST next step in the standard malware-removal workflow?","choices":["Immediately isolate the host from network and removable media.","Restore the system to yesterday's System Restore point.","Run a full antivirus scan and remove detected items.","Reimage the PC from factory media and rebuild the user profile."],"correct":0,"explain":"The top priority with active ransomware is to stop its spread and further encryption. The first action in the malware-removal process is to isolate the host from the network and removable media. Restoration, scanning, or reimaging may come later, but only after containment.","sub":"3.2"},{"id":253,"domain":"Operational Procedures","q":"A help desk technician must view a user's Windows desktop to troubleshoot a GUI-only app. Policy requires: no inbound firewall changes, least privilege (no full admin), session recording for audit, and the ability to disable clipboard/file transfer during the session. What toolset is the BEST fit?","choices":["Use WinRM so the technician can observe the GUI app remotely.","Forward RDP through the router and connect with local admin rights.","Deploy a basic VNC tool with a shared team password.","Use an enterprise RMM tool with consent and session controls."],"correct":3,"explain":"An enterprise RMM (remote monitoring and management) platform can provide outbound-only remote control, fine-grained permissions, session recording, consent prompts, and policy controls for clipboard/file transfer. Opening inbound ports or using unsecured VNC conflicts with the security and audit requirements.","sub":"4.8"},{"id":254,"domain":"Software Troubleshooting","q":"A user reports that their browser homepage was changed without permission, and pop-ups now appear even after switching to a different browser. Antivirus found no known threats. Task Manager only shows legitimate processes. What is the MOST appropriate method to remove this threat fully?","choices":["Run a rootkit scanner to remove hidden malicious kernel components.","Use an anti-malware tool to detect & remove a potentially unwanted program (PUP).","Remove the browser and reinstall it using the default settings.","Restore from a recent backup and reapply all system updates."],"correct":1,"explain":"Homepage hijacks and persistent pop-ups across browsers are often caused by PUPs or adware rather than classic viruses. A reputable anti-malware tool that targets PUPs is the most appropriate first remediation step.","sub":"3.1"},{"id":255,"domain":"Operational Procedures","q":"A small accounting firm stores its server and a network switch in a backroom that shares space with a copier and several boxes of paper. The server recently shut down due to overheating, and an inspection revealed thick dust buildup inside the case and around vents. What is the BEST long-term solution to reduce the likelihood of repeated hardware failures?","choices":["Install a surge suppressor and plug the server into its own outlet.","Move the server to a climate-controlled, ventilated area.","Raise server fan speeds in BIOS and replace the thermal paste annually.","Use canned compressed air monthly to clean the server and switch ports."],"correct":1,"explain":"The core issue is poor environment: dust, heat, and lack of airflow. Moving the server to a dedicated, climate-controlled, and clean area is the best long-term solution. Cleaning dust helps but does not fix the underlying heat and airflow problems.","sub":"4.1"},{"id":256,"domain":"Operating Systems","q":"A technician needs to transfer large files between a Windows 10 PC and an Android smartphone. The files are over 10 GB each. Which filesystem format should the technician use on a USB flash drive to ensure compatibility and support for large files?","choices":["NTFS.","FAT32.","exFAT.","ReFS."],"correct":2,"explain":"exFAT is widely supported by modern Windows and Android devices and supports large file sizes beyond the 4 GB limit of FAT32. NTFS and ReFS are not as universally supported on mobile devices.","sub":"1.2"},{"id":257,"domain":"Operating Systems","q":"An IT admin needs to create a detailed performance baseline for a Windows Server to monitor key counters like disk I/O, memory usage, and network throughput over several days. Which tool provides the MOST robust way to collect and analyze this data over time?","choices":["Resource Monitor (resmon.exe).","Performance Monitor (perfmon).","Task Manager's Performance tab.","System Information (msinfo32.exe)."],"correct":1,"explain":"Performance Monitor (perfmon) can create Data Collector Sets, log performance counters over time, and generate reports. This makes it ideal for building baselines and long-term analysis. Task Manager and Resource Monitor are more for real-time observation.","sub":"1.4"},{"id":258,"domain":"Operating Systems","q":"Users with roaming profiles experience very slow logons and logoffs. Their profiles contain large browser caches and video conference remnants in AppData. What is the BEST remediation?","choices":["Disable Windows Search on all endpoints that use roaming profiles.","Enable Fast Startup and hibernation to speed each sign-in.","Delete roaming profiles at each logon so users start fresh daily.","Redirect user folders and exclude cache paths from roaming."],"correct":3,"explain":"Large, frequently changing cache data should not roam. Redirecting common user folders to OneDrive or network locations and excluding cache directories from roaming profiles reduces profile size and speeds up logon/logoff while preserving user data.","sub":"1.1"},{"id":259,"domain":"Operating Systems","q":"You need a persistent mapped drive to a workgroup NAS from a domain-joined Windows client. The NAS requires local credentials (NAS\backupuser). The mapping should survive reboots and use the supplied credentials automatically. Which command accomplishes this MOST directly?","choices":["net use Z: \\NAS\\share /savecred.","net use Z: \\NAS\\share /smartcard /persistent:yes.","net use Z: \\NAS\\share /persistent:no /user:backupuser.","net use Z: \\NAS\\share /user:NAS\backupuser /persistent:yes."],"correct":3,"explain":"The /persistent:yes flag ensures the mapping survives reboots, and /user:NAS\backupuser supplies the correct local NAS account. The other options either omit persistence or the proper user format.","sub":"1.5"},{"id":260,"domain":"Security","q":"A user connects to a public Wi-Fi hotspot labeled \"CoffeeShop_WiFi\" that does not require a password. The user browses the web and logs into their personal email without issue. Later, sensitive information appears to have been intercepted. Which threat BEST describes what likely occurred?","choices":["An insider threat from a coffee shop employee.","A smishing campaign tied to an SMS login prompt.","An on-path attack through an evil twin hotspot.","A cross-site scripting issue inside the email website."],"correct":2,"explain":"An evil twin access point mimics a legitimate public SSID and allows an attacker to intercept or modify traffic (on-path attack). Open Wi-Fi with no authentication makes it easy to perform this kind of attack.","sub":"2.1"},{"id":261,"domain":"Security","q":"A user's banking app refuses to open, citing \"security risk detected.\" The user previously installed apps through AltStore and enabled Developer Mode; they also used a tweak manager months ago. Storage and connectivity are fine. What is the MOST appropriate fix?","choices":["Update carrier settings and then sign back into the app.","Turn off Developer Mode but keep the existing frameworks in place.","Reinstall the banking app from the App Store only.","Restore the device to stock and remove jailbreak frameworks."],"correct":3,"explain":"Banking apps often refuse to run on devices that appear rooted, jailbroken, or heavily modified. Fully restoring iOS to a clean, stock state and removing all sideloaded/jailbreak frameworks is the most appropriate way to meet the app's security expectations.","sub":"2.1"},{"id":262,"domain":"Operational Procedures","q":"You replaced a user's motherboard under warranty. The endpoint management tool now shows a new hardware serial, but the CMDB still lists the old serial, and one paid software license is assigned to the retired hardware entry. What is the BEST action to maintain accurate records and compliance?","choices":["Leave the CMDB unchanged because the endpoint tool already updated.","Remove the paid license until the next audit cycle finishes.","Update the CMDB, retire the old CI, and reassign licenses.","Write a knowledge base article about duplicate serial numbers."],"correct":2,"explain":"The CMDB is the system of record for assets and configuration items. Updating the CI with the new serial, linking RMA documents, retiring the outdated CI, and correctly associating licenses and warranties maintains compliance and accurate tracking while keeping the same asset tag and user.","sub":"4.5"},{"id":263,"domain":"Operating Systems","q":"A project team complains their \"Project_A\" folder isn't syncing to the company's cloud storage client on Windows 11. The files live in C:\\Data\\Project_A, and the user created a shortcut to that folder inside the OneDrive sync root. The cloud client shows no errors, but nothing from Project_A appears online. What is the MOST appropriate fix?","choices":["Move the actual folder into the OneDrive sync scope.","Use Choose Folders to add any path outside the OneDrive root.","Enable Known Folder Move for Documents to pull the project folder in.","Turn on Files On-Demand and mark the shortcut always available."],"correct":0,"explain":"OneDrive syncs real files and folders that live under its root, not shortcuts pointing elsewhere. Moving the actual Project_A folder into the OneDrive sync scope (or moving the root to cover it) ensures the content is synced.","sub":"1.1"},{"id":264,"domain":"Security","q":"A company wants to move from a shared passphrase Wi-Fi to per-user authentication that can be revoked centrally. Security requires unique session keys, integration with Active Directory, and a preference for certificate-based auth to avoid password reuse. Which configuration BEST meets these goals?","choices":["WPA2-Personal with AES and more frequent PSK rotation.","Use WPA2 or WPA3 Enterprise with 802.1X and EAP-TLS.","WPA3-Personal with a stronger passphrase and shorter rekey interval.","WPA2-Enterprise with only a captive portal and local AP users."],"correct":1,"explain":"WPA2/WPA3-Enterprise with 802.1X and RADIUS provides per-user authentication, unique session keys, and central control. Using EAP-TLS with certificates ties well into AD and avoids password reuse. Personal modes use a shared PSK and do not provide per-user revocation.","sub":"2.2"},{"id":265,"domain":"Operating Systems","q":"A line-of-business service starts, then stops after a few seconds. The startup type is already Automatic, and restarting it fails. You suspect a dependency or logon issue. What is the BEST first step to isolate cause?","choices":["Review SCM events, dependencies, and the service logon account.","Change the service to Automatic Delayed Start and reboot.","Run DISM and SFC before checking any service-level data.","Reset the TCP/IP stack because most service failures are networking related."],"correct":0,"explain":"When services start and then stop, Event Viewer (Service Control Manager logs) is the primary place to look for detailed error messages. Reviewing service dependencies and the Log On account credentials helps determine whether a missing dependency or bad account is causing the failure.","sub":"1.4"},{"id":266,"domain":"Operating Systems","q":"A developer is troubleshooting a custom app that keeps crashing on startup. They suspect a missing DLL or .NET version conflict is the cause. Which MMC snap-in allows them to review application-specific error logs to verify this?","choices":["Local Users and Groups (lusrmgr.msc).","Task Scheduler (taskschd.msc).","Event Viewer (eventvwr.msc).","Disk Management (diskmgmt.msc)."],"correct":2,"explain":"Event Viewer provides access to Application logs where .NET and application crashes are recorded. These logs can show missing DLLs, unhandled exceptions, or version conflicts.","sub":"1.4"},{"id":267,"domain":"Security","q":"An employee reports finding unauthorized credit card numbers and government-issued ID scans stored in a coworker's personal cloud folder that syncs to a corporate workstation. You confirm the files exist and believe this violates company policy and possibly law. What is the BEST immediate action to take?","choices":["Confront the coworker and ask them to explain the files.","Disconnect the workstation and wait for legal to contact IT.","Preserve evidence and escalate per incident response.","Delete the files immediately to prevent misuse."],"correct":2,"explain":"This is a serious potential security and legal incident. The correct response is to follow the incident response plan: preserve evidence, document findings, and escalate to management/legal. Deleting files or confronting the coworker informally can damage evidence and violate procedure.","sub":"2.1"},{"id":268,"domain":"Software Troubleshooting","q":"A system administrator notices that CPU usage on several workstations spikes to 100% during non-business hours. No new software has been installed recently, and antivirus scans show no flagged files. After further investigation, the admin finds a constantly running background process that doesn't correspond to an installed application. What type of malware is MOST likely responsible?","choices":["Boot sector virus.","Fileless malware.","Cryptominer.","Ransomware."],"correct":2,"explain":"Persistent, high CPU usage with a mysterious background process—especially during idle periods—strongly suggests a cryptominer, which uses system resources to mine cryptocurrency without user consent.","sub":"3.1"},{"id":269,"domain":"Security","q":"A branch-office Linux server (no GUI) sits behind a NAT router. The site's firewall allows only outbound 443. You must administer the box via command line and transfer config files, while meeting corporate requirements for strong authentication and centralized logging; you may not open any new inbound ports. Which approach BEST fits?","choices":["Expose SSH on the router and allow password logins from your IP.","Install VNC because it will work through NAT with minimal setup.","Use the corporate SSL VPN over 443, then SSH and SFTP.","Port-forward RDP to a jump box and reach Linux through that system."],"correct":2,"explain":"Using the company's SSL VPN over outbound 443 satisfies the firewall constraint while providing secure, authenticated access. Once on the VPN, you can SSH/SFTP with key-based authentication and logging, meeting strong auth and audit requirements without opening new inbound ports.","sub":"2.2"},{"id":270,"domain":"Security","q":"A post-production workstation will connect to a 40 GbE storage fabric using RDMA, needs to create and manage ReFS volumes for large media datasets, must host inbound RDP sessions, and should be purchasable through standard OEM/retail channels (no volume agreement). Which edition is MOST appropriate?","choices":["Windows 10 Pro for Workstations.","Windows 11 Home.","Windows 10 Enterprise.","Windows 10 Pro."],"correct":0,"explain":"Windows 10 Pro for Workstations adds support for RDMA, ReFS, and high-end hardware features while being available through standard OEM/retail channels. Enterprise typically requires volume licensing agreements.","sub":"2.1"},{"id":271,"domain":"Operational Procedures","q":"Your e-commerce API has a critical, actively exploited vulnerability. The vendor has released a hotfix that requires a 20–30 minute outage. Your company has a nightly maintenance window (1–3 a.m.), but it's currently 10 a.m. and attacks are escalating. A temporary WAF rule reduces (but does not eliminate) the risk. What is the BEST next step under change management?","choices":["Wait for the next maintenance window and handle it as a normal change.","Apply the WAF rule and delay patching until the next CAB meeting.","Open an emergency change with rollback and approvals.","Deploy the hotfix immediately and fill out the paperwork afterward."],"correct":2,"explain":"An actively exploited, high-risk vulnerability justifies an emergency change. Proper process still applies: submit an emergency change request, document the risk and rollout/rollback plans, get expedited approval, notify stakeholders, apply the fix, and perform a post-change review.","sub":"4.2"},{"id":272,"domain":"Operating Systems","q":"A student is using a Chromebook in class and learns that it relies mostly on web-based applications and cloud storage. Which underlying operating system does Chrome OS use?","choices":["Unix variant.","Linux kernel.","Windows NT kernel.","BSD-based kernel."],"correct":1,"explain":"Chrome OS is built on top of the Linux kernel. It layers Google's user interface and web-centric environment on a Linux base.","sub":"1.6"},{"id":273,"domain":"Operating Systems","q":"A user reports sudden battery drain after installing a fitness tracking app. Battery usage shows the app high on the list with constant Location access and background activity. What is the BEST remediation?","choices":["Restrict Location to \"While Using\" and disable background refresh.","Turn off Bluetooth and Wi-Fi when not in use.","Uninstall and reinstall the app without restoring its data.","Lower the screen brightness and set the screen timeout to the minimum."],"correct":0,"explain":"The fitness app is consuming power by constantly using location services and running in the background. Restricting Location to \"While Using\" and disabling unnecessary background activity directly addresses the cause while still allowing the app to function.","sub":"1.1"},{"id":274,"domain":"Operating Systems","q":"A Windows user cannot install a driver because the installer requires elevated privileges. What is the best next step?","choices":["Run installer as administrator mode.","Run installer in compatibility mode.","Run installer from a local folder.","Run installer after clean boot state."],"correct":0,"explain":"Driver installs typically require administrative privileges. Use Run as administrator or provide admin credentials—do not bypass security controls.","sub":"1.2"},{"id":275,"domain":"Operating Systems","q":"A user reports Windows takes much longer to boot after recent software installs. Which tool is best to review startup impact?","choices":["Task Manager Startup tab view.","System Configuration startup services list.","Resource Monitor startup impact view.","Task Scheduler startup trigger list."],"correct":0,"explain":"Task Manager’s Startup tab shows startup apps and their impact, allowing you to disable unnecessary items.","sub":"1.4"},{"id":276,"domain":"Operating Systems","q":"A Windows PC repeatedly blue-screens immediately after a new storage controller driver update. What is the best immediate recovery action?","choices":["Boot to Safe Mode and roll back.","Boot to Safe Mode and disable device.","Boot to Safe Mode and uninstall driver.","Boot to Safe Mode and update driver."],"correct":0,"explain":"Safe Mode loads minimal drivers, enabling rollback/uninstall of the problematic driver to restore stability.","sub":"1.1"},{"id":277,"domain":"Operating Systems","q":"A user needs to encrypt their entire Windows system drive with TPM integration. Which feature should be enabled?","choices":["BitLocker full disk encryption.","BitLocker To Go removable drive encryption.","EFS file and folder encryption.","Device encryption for supported hardware."],"correct":0,"explain":"BitLocker provides full-disk encryption and commonly integrates with TPM for key protection.","sub":"1.1"},{"id":278,"domain":"Operating Systems","q":"A user on macOS needs to take a screenshot of a selected region only. Which shortcut is correct?","choices":["Shift + Command + 4 pressed.","Shift + Command + 3 pressed.","Control + Shift + Command + 4 pressed.","Command + Option + 4 pressed."],"correct":0,"explain":"On macOS, Shift+Command+4 captures a selected region (Shift+Command+3 captures the entire screen).","sub":"1.6"},{"id":279,"domain":"Operating Systems","q":"A Linux admin needs to view IP addressing and link status on a modern distro. Which command is best?","choices":["ip addr show command output.","ifconfig interface status command.","nmcli device status command.","ip link show command output."],"correct":0,"explain":"ip addr show (or ip a) is the modern replacement for ifconfig on many distributions.","sub":"1.6"},{"id":280,"domain":"Security","q":"A user receives an email attachment named invoice.zip from an unknown sender and their AV flags it. What is the best action?","choices":["Quarantine and report to security.","Submit attachment for secure analysis.","Verify sender headers before action.","Delete attachment and block sender."],"correct":0,"explain":"Treat as suspicious: quarantine and report per policy. Do not disable protections or spread the file.","sub":"2.1"},{"id":281,"domain":"Security","q":"A technician is disposing of several old SSDs that stored customer data. What is the best method to prevent data recovery?","choices":["Perform secure erase and destroy.","Perform approved media sanitization.","Remove partitions before disposal.","Overwrite and decommission the drive."],"correct":0,"explain":"SSDs should be securely erased (vendor secure erase) and, for high assurance, physically destroyed per policy.","sub":"2.7"},{"id":282,"domain":"Security","q":"A user’s account was compromised after reusing a password across sites. What control most directly reduces this risk going forward?","choices":["Use MFA and unique passwords.","Use only a longer master password.","Enable password manager autofill only.","Change passwords every week only."],"correct":0,"explain":"Unique passwords prevent credential-stuffing spread; MFA adds a second factor to reduce takeover risk.","sub":"2.1"},{"id":283,"domain":"Security","q":"A workstation shows pop-ups and browser redirects even after closing the browser. Which type of threat is most likely?","choices":["Adware or browser hijacker threat.","Malicious browser extension persistence.","Potentially unwanted program activity.","Search homepage redirect malware."],"correct":0,"explain":"Pop-ups/redirects are classic adware/hijacker symptoms; investigate extensions, PUPs, and run scans.","sub":"2.3"},{"id":284,"domain":"Security","q":"A user wants to securely connect to their corporate network from a hotel Wi-Fi. Which solution is best?","choices":["VPN to corporate gateway tunnel.","SSL VPN client to corporate portal.","Always-on VPN profile connection.","IPsec remote access tunnel."],"correct":0,"explain":"A VPN provides encrypted, authenticated remote access without exposing internal services directly.","sub":"2.2"},{"id":285,"domain":"Security","q":"A technician finds a door to the server room propped open. What type of control is primarily being violated?","choices":["Physical security access control.","Badge-based entry authorization.","Mantrap or locked access control.","Surveillance and visitor escort control."],"correct":0,"explain":"An open server-room door bypasses physical controls like locks/badges and increases risk of unauthorized access.","sub":"2.1"},{"id":286,"domain":"Security","q":"A user’s laptop is stolen. The drive was encrypted, but the user is worried about accounts. What should be done first?","choices":["Disable accounts and revoke tokens.","Reset password and revoke sessions.","Disable VPN and remote access only.","Force password change at next sign-in."],"correct":0,"explain":"Even with disk encryption, revoke credentials/sessions, reset passwords, and follow incident procedures.","sub":"2.2"},{"id":287,"domain":"Software Troubleshooting","q":"Windows Update fails with insufficient disk space. What is the best next step?","choices":["Run Disk Cleanup and free space.","Run Storage Sense and remove temp files.","Move update cache to another volume.","Uninstall recent feature packages first."],"correct":0,"explain":"Updates require free space. Use Disk Cleanup, remove temporary files, and consider moving data off the drive.","sub":"3.1"},{"id":288,"domain":"Software Troubleshooting","q":"A user can browse the internet but cannot reach internal file shares by name. They can reach them by IP. What is most likely wrong?","choices":["DNS configuration or name service.","Hosts file or local resolver mismatch.","Wrong UNC share name in mapping.","Internal namespace suffix issue."],"correct":0,"explain":"IP works but name fails indicates name resolution issues such as DNS suffix, DNS server settings, or records.","sub":"3.1"},{"id":289,"domain":"Software Troubleshooting","q":"A Windows user reports that a single application crashes on launch after a recent patch. Other apps work. What is the best first step?","choices":["Reinstall or repair that app.","Repair the app installation package.","Reset the app profile and cache.","Reinstall the app dependencies."],"correct":0,"explain":"Isolated app failure is best addressed by repair/reinstall and checking app logs/compatibility settings first.","sub":"3.1"},{"id":290,"domain":"Software Troubleshooting","q":"A user’s system is extremely slow and the disk LED stays on constantly. Task Manager shows high disk usage by a process. What should be used next?","choices":["Resource Monitor for disk details.","Performance Monitor disk queue counters.","Task Manager process resource view.","Event Viewer disk warning review."],"correct":0,"explain":"Resource Monitor provides detailed disk I/O per process to identify what is causing sustained disk saturation.","sub":"3.1"},{"id":291,"domain":"Software Troubleshooting","q":"A user is locked out after too many failed logins. What is the best action in a managed environment?","choices":["Follow policy to unlock account.","Reset password through approved policy.","Wait for lockout timer to expire.","Escalate to directory services admin."],"correct":0,"explain":"Account lockouts should be handled per policy—verify identity, unlock/reset, and investigate possible attacks.","sub":"3.1"},{"id":292,"domain":"Operating Systems","q":"A technician needs to see detailed IP configuration including DNS servers in Windows. Which command is best?","choices":["ipconfig /all command output.","ipconfig /renew command output.","route print command output.","netstat -an command output."],"correct":0,"explain":"ipconfig /all shows IP, mask, gateway, DHCP, DNS, and adapter details.","sub":"1.1"},{"id":293,"domain":"Operating Systems","q":"A technician needs to verify name resolution from a Windows PC. Which command is best?","choices":["nslookup host query command.","ping host query command.","ipconfig /displaydns command.","tracert host lookup command."],"correct":0,"explain":"nslookup queries DNS directly and helps confirm whether a hostname resolves correctly.","sub":"1.1"},{"id":294,"domain":"Operating Systems","q":"A Windows system file corruption is suspected after repeated application errors. Which tool should be run first?","choices":["Run sfc /scannow command.","Run DISM /RestoreHealth command.","Run chkdsk /scan command.","Run Startup Repair tool first."],"correct":0,"explain":"System File Checker verifies and repairs protected system files; it’s a standard first step for OS integrity issues.","sub":"1.1"},{"id":295,"domain":"Operating Systems","q":"A Linux user needs to list running processes with their PIDs. Which command is best?","choices":["ps aux process listing output.","top live process display output.","pgrep process query output.","systemctl service status output."],"correct":0,"explain":"ps aux shows a snapshot of running processes. top/htop are interactive alternatives.","sub":"1.6"},{"id":296,"domain":"Operating Systems","q":"A technician needs to manage running services on Windows. Which console is best?","choices":["services.msc management console.","Task Manager services tab view.","Computer Management services node.","taskschd.msc scheduling console."],"correct":0,"explain":"services.msc is the Services snap-in used to start/stop/configure Windows services.","sub":"1.4"},{"id":297,"domain":"Operating Systems","q":"A user needs to roll back to a previous working state after a bad driver install, but keep their documents. Which option is best?","choices":["Use System Restore point tool.","Use driver rollback from Device Manager.","Use Last Known Good style recovery.","Use application uninstall and reinstall."],"correct":0,"explain":"System Restore rolls back system changes (drivers/registry) while typically keeping personal files.","sub":"1.4"},{"id":298,"domain":"Operating Systems","q":"A technician wants to view critical system errors and warnings to troubleshoot random restarts. Which tool should be used?","choices":["Event Viewer log inspection tool.","Reliability Monitor stability history tool.","Resource Monitor system activity tool.","Task Scheduler operational log tool."],"correct":0,"explain":"Event Viewer contains system/application logs including crash and shutdown events with timestamps and details.","sub":"1.4"},{"id":299,"domain":"Operating Systems","q":"A user needs to run older software that fails on Windows 11 due to legacy behavior. What feature is best to try first?","choices":["Compatibility mode for the app.","Windows Sandbox for the app.","Hyper-V virtual machine isolation.","Program Compatibility Troubleshooter wizard."],"correct":0,"explain":"Compatibility mode can emulate older OS behaviors for specific apps without weakening system security broadly.","sub":"1.1"},{"id":300,"domain":"Software Troubleshooting","q":"A user reports their PC is encrypting files and demanding payment. What is the best immediate action?","choices":["Isolate device from the network.","Disconnect mapped drives and shares.","Power off the device immediately.","Disable the infected user account."],"correct":0,"explain":"Ransomware containment starts with isolation to stop spread/exfiltration, then follow incident response procedures.","sub":"3.1"},{"id":301,"domain":"Software Troubleshooting","q":"A malware infection is suspected. What should be done before attempting removal to preserve evidence in a business setting?","choices":["Document symptoms and actions taken.","Capture evidence and preserve logs.","Isolate the host from the network.","Notify security and follow process."],"correct":0,"explain":"Document symptoms and actions to support incident handling, chain-of-custody, and future prevention.","sub":"3.1"},{"id":302,"domain":"Software Troubleshooting","q":"A technician needs the most effective way to remove persistent malware on a user PC in a high-risk scenario. What is best?","choices":["Back up data then reimage system.","Use Safe Mode with offline scanning.","Use recovery tools and malware cleanup.","Restore from known good backup."],"correct":0,"explain":"For severe/persistent infections, reimaging from a known-good source is often the most reliable remediation.","sub":"3.1"},{"id":303,"domain":"Operational Procedures","q":"A technician needs to remotely assist a Windows user and view their desktop with consent. Which built-in tool is appropriate?","choices":["Quick Assist remote support tool.","Remote Assistance support session.","Remote Desktop with user handoff.","Microsoft Teams screen share."],"correct":0,"explain":"Quick Assist is a built-in Windows remote assistance tool designed for user consent and screen sharing.","sub":"4.8"},{"id":304,"domain":"Operational Procedures","q":"A user can access a shared folder but cannot save files to it. Other users can. What is the most likely cause?","choices":["Share or NTFS permissions issue.","Read-only share permission assignment.","NTFS modify permission not granted.","Offline files cache credential issue."],"correct":0,"explain":"If access works but write fails, permissions (share/NTFS) are the likely cause for that specific user.","sub":"4.1"},{"id":305,"domain":"Operational Procedures","q":"A technician is about to make a risky change on a production PC. What should be done first?","choices":["Obtain approval and plan rollback.","Document scope and risk first.","Verify backup and rollback steps first.","Notify affected users before change."],"correct":0,"explain":"Follow change management: approvals, backups/restore points, maintenance windows, and rollback planning.","sub":"4.3"},{"id":306,"domain":"Operational Procedures","q":"A technician resolves an issue. What is the next best step per troubleshooting best practice?","choices":["Document solution and close ticket.","Verify full functionality with user.","Update documentation and knowledge base.","Escalate to higher-tier support."],"correct":0,"explain":"Documentation is a required final step: symptoms, cause, fix, and preventive recommendations.","sub":"4.1"},{"id":307,"domain":"Operational Procedures","q":"A technician is asked to work on a user’s system containing sensitive data. What is the most appropriate behavior?","choices":["Follow privacy policy and consent.","Obtain user permission before access.","Limit handling to necessary data only.","Follow company confidentiality process."],"correct":0,"explain":"Respect privacy, obtain consent, and follow policy. Access only what is necessary for the task.","sub":"4.5"},{"id":308,"domain":"Operating Systems","q":"A user wants to prevent unauthorized app installs on a company-owned phone. What is the best control?","choices":["MDM with app allow/deny policy.","Disable unknown sources installation.","Apply device owner restrictions.","Require managed app deployment."],"correct":0,"explain":"Mobile device management can enforce app restrictions, installation controls, and compliance policies.","sub":"1.2"},{"id":309,"domain":"Operating Systems","q":"A user’s phone battery drains rapidly after installing a “free VPN” app. What is the best first step?","choices":["Uninstall app and review permissions.","Review app battery and data usage.","Restrict app background permissions.","Confirm app source and reputation."],"correct":0,"explain":"Suspicious apps often abuse permissions/background activity. Remove it and review permissions/usage before drastic steps.","sub":"1.1"},{"id":310,"domain":"Operational Procedures","q":"A technician uses a script to map drives for multiple users at logon. What is the primary benefit of scripting here?","choices":["Consistent repeatable configuration.","Reusable automated user provisioning.","Scalable repeatable logon configuration.","Reduced manual mapping errors."],"correct":0,"explain":"Scripting automates repetitive tasks consistently across many endpoints, reducing manual errors and time.","sub":"4.7"},{"id":311,"domain":"Security","q":"A technician needs to restrict unknown applications from running on Windows endpoints. Which control is best?","choices":["Application allowlisting control.","Software restriction policy control.","Managed endpoint application policy.","Publisher-based code execution control."],"correct":0,"explain":"Allowlisting permits only approved executables, reducing risk from unknown/malicious programs.","sub":"2.1"},{"id":312,"domain":"Security","q":"A user’s PC has a BIOS password but the OS still boots to the login screen without it. What is most likely happening?","choices":["BIOS password set for setup only.","UEFI boot password not user password.","Drive password not enabled at boot.","Fast startup bypassing prompt flow."],"correct":0,"explain":"Many systems allow a BIOS/UEFI password for entering setup only, not a power-on password.","sub":"2.1"},{"id":313,"domain":"Operating Systems","q":"A technician needs to renew a DHCP lease on a Windows PC. Which command is correct?","choices":["ipconfig /renew command used.","ipconfig /release command used.","ipconfig /flushdns command used.","netsh interface reset command."],"correct":0,"explain":"ipconfig /renew requests a new DHCP lease for the adapter(s).","sub":"1.1"},{"id":314,"domain":"Operational Procedures","q":"A user deleted a document yesterday and needs it back. Backups exist. What is the best action?","choices":["Restore from backup or versioning.","Restore previous file version copy.","Recover file from File History.","Recover file from backup snapshot."],"correct":0,"explain":"Use backups/version history first. Hardware replacement and OS reinstall are not appropriate initial responses.","sub":"4.3"},{"id":315,"domain":"Operational Procedures","q":"A Windows PC will not boot after a failed update. The user needs files preserved. What is the best option first?","choices":["Use Windows recovery environment.","Use Startup Repair from WinRE.","Use System Restore from WinRE.","Use Safe Mode from WinRE."],"correct":0,"explain":"WinRE offers Startup Repair, uninstall updates, restore points, and advanced tools while preserving data.","sub":"4.3"},{"id":316,"domain":"Operating Systems","q":"A macOS user reports the system is running slowly and storage is nearly full. What is the best first action?","choices":["Review storage and remove large items.","Review storage in System Settings.","Use About This Mac storage tools.","Move large files off local disk."],"correct":0,"explain":"Low disk space can severely affect performance. Review storage usage and remove/move large files first.","sub":"1.6"},{"id":317,"domain":"Operating Systems","q":"A Linux user cannot execute a script and receives a permission denied error. What is the best fix?","choices":["Add execute permission with chmod.","Run script with sudo command.","Change ownership with chown command.","Launch script with bash filename."],"correct":0,"explain":"Permission denied often means the executable bit is missing. chmod +x sets execute permissions appropriately.","sub":"1.6"},{"id":318,"domain":"Security","q":"A user’s email client fails to connect securely and reports a certificate name mismatch. What is the most likely cause?","choices":["Server name does not match cert.","Untrusted issuing CA on server.","Expired server certificate on host.","Client clock skew breaks validation."],"correct":0,"explain":"A name mismatch occurs when the hostname used does not match the certificate’s subject/SAN.","sub":"2.1"},{"id":319,"domain":"Operating Systems","q":"A user can read a file but cannot modify it on an NTFS volume. What is the most likely reason?","choices":["NTFS permissions deny write access.","Read permission without modify rights.","Inherited permissions block editing.","Share access differs from NTFS access."],"correct":0,"explain":"Read without modify commonly indicates NTFS permissions or inherited ACLs that do not grant write/modify.","sub":"1.2"},{"id":320,"domain":"Operating Systems","q":"A user wants email to stay on the server and sync state across devices. Which protocol best fits?","choices":["IMAP synchronized mailbox access.","POP3 local mailbox retrieval.","SMTP outgoing mail transport.","Exchange ActiveSync synchronization."],"correct":0,"explain":"IMAP keeps messages on the server and synchronizes status across multiple devices.","sub":"1.1"},{"id":321,"domain":"Software Troubleshooting","q":"A user can print to a network printer by IP but not by printer name. Other users print by name. What is the best first check?","choices":["Verify client DNS and name records.","Verify printer share path syntax.","Verify print server hostname resolution.","Verify stale hosts file entry."],"correct":0,"explain":"If IP works but name fails for one client, it’s likely client DNS settings or name resolution rather than printer hardware.","sub":"3.1"},{"id":322,"domain":"Operational Procedures","q":"A user asks to disable OS updates because they are inconvenient. What is the best response?","choices":["Explain risks and follow patch policy.","Explain update delay increases exposure.","Offer a maintenance window instead.","Escalate if user refuses policy."],"correct":0,"explain":"Disabling updates increases risk. Follow organizational policy and schedule updates with minimal disruption.","sub":"4.1"},{"id":323,"domain":"Security","q":"A technician discovers a user connected to a rogue access point named like the corporate SSID. What is the best immediate action?","choices":["Disconnect and report security incident.","Forget the SSID and disable Wi-Fi.","Switch to cellular or known network.","Capture details and notify security."],"correct":0,"explain":"A spoofed SSID suggests an evil twin attack. Disconnect, capture details if allowed, and report per incident procedures.","sub":"2.1"},{"id":324,"domain":"Operational Procedures","q":"A technician needs a repeatable process to ensure all steps are followed during workstation deployment. What document is best?","choices":["Standard operating procedure checklist.","Runbook for deployment workflow.","Standardized deployment procedure guide.","Build validation checklist document."],"correct":0,"explain":"SOPs and checklists standardize procedures, improve consistency, and support auditing/training.","sub":"4.1"},{"id":325,"domain":"Security","q":"A user’s browser warns that a website certificate is untrusted. What is the safest guidance?","choices":["Do not proceed and verify site.","Verify URL and certificate details.","Use trusted bookmark to reach site.","Contact organization through known channel."],"correct":0,"explain":"Untrusted cert warnings can indicate MITM or misconfiguration. Avoid proceeding and verify the legitimate site identity.","sub":"2.1"},{"id":326,"domain":"Operating Systems","q":"A technician is installing Windows on a UEFI system with Secure Boot enabled. Which partition style is typically required?","choices":["GPT partition style for UEFI boot.","MBR partition style for legacy BIOS.","UEFI-compatible FAT32 boot structure.","Partition style matching firmware mode."],"correct":0,"explain":"UEFI installs typically use GPT (with an EFI System Partition). MBR is common for legacy BIOS installs.","sub":"1.2"},{"id":327,"domain":"Security","q":"A manager wants all staff to have local admin rights to reduce helpdesk tickets. What principle argues against this?","choices":["Least privilege access principle.","Separation of duties principle.","Need-to-know access principle.","Role-based access assignment principle."],"correct":0,"explain":"Least privilege limits permissions to what’s required, reducing attack surface and accidental system changes.","sub":"2.1"},{"id":328,"domain":"Software Troubleshooting","q":"A technician is diagnosing an intermittent issue and wants to identify the most likely cause quickly. What should be done first?","choices":["Question user and identify changes.","Question the user and note changes.","Establish theory of probable cause.","Check for recent updates or actions."],"correct":0,"explain":"Start with information gathering: identify symptoms, reproduce if possible, and note recent changes before invasive actions.","sub":"3.1"},{"id":329,"domain":"Operational Procedures","q":"A user repeatedly falls for phishing emails. What is the most effective long-term control?","choices":["Security awareness training program.","Enable MFA for all email logins.","Use phishing-resistant sign-in prompts.","Simulated phishing with follow-up coaching."],"correct":0,"explain":"Awareness training plus reporting procedures reduces successful phishing and improves user behavior over time.","sub":"4.1"},{"id":330,"domain":"Software Troubleshooting","q":"A Windows PC is slow and Task Manager shows very high memory usage with heavy paging. Which upgrade most directly helps?","choices":["Add additional RAM to the system.","Install faster SSD storage device.","Upgrade CPU to higher core count.","Reduce startup app memory use."],"correct":0,"explain":"High paging indicates insufficient RAM. Adding RAM reduces disk swapping and improves responsiveness.","sub":"3.1"},{"id":331,"domain":"Security","q":"A technician needs to allow Remote Desktop from the local subnet only. What is the best configuration to change?","choices":["Firewall rule scope to local subnet.","Remote Desktop firewall profile rule.","Allowed users on Remote Desktop list.","NLA and RDP listener configuration."],"correct":0,"explain":"Use a host firewall rule permitting RDP and scope it to the local subnet; avoid exposing RDP to the internet.","sub":"2.2"},{"id":332,"domain":"Operating Systems","q":"A company wants to lock and wipe mobile devices that are lost, even if offsite. What capability enables this?","choices":["MDM remote lock and wipe feature.","Mobile device management platform.","Corporate device enrollment policy.","Managed compliance and access controls."],"correct":0,"explain":"MDM supports remote lock/wipe, compliance checks, and device tracking depending on platform/policy.","sub":"1.1"},{"id":333,"domain":"Operational Procedures","q":"A technician must query many Windows PCs for installed patches. Which tool is most appropriate?","choices":["PowerShell remote query scripting.","WSUS or update reporting console.","WMIC remote query command set.","Endpoint management inventory report."],"correct":0,"explain":"PowerShell can query installed updates remotely at scale, reducing time and improving consistency.","sub":"4.7"},{"id":334,"domain":"Operating Systems","q":"A user installs an app and it only affects their own profile, not other users on the PC. Which installation type was likely used?","choices":["Per-user installation for profile.","Machine-wide installation for all users.","Portable application in user profile.","Store app deployment to one account."],"correct":0,"explain":"Per-user installs typically write to the user profile and do not apply system-wide for all users.","sub":"1.2"},{"id":335,"domain":"Security","q":"A caller claims to be from IT and asks for the user’s MFA code to “verify identity.” What is the best user action?","choices":["Refuse and report the attempt.","Hang up and contact IT directly.","Refuse the code and verify caller.","Report the social engineering attempt."],"correct":0,"explain":"MFA codes should never be shared. This is a classic social engineering attempt—refuse and report per policy.","sub":"2.4"},{"id":336,"domain":"Operational Procedures","q":"A Windows PC fails to start and shows repeated automatic repair loops. Which tool is most appropriate first?","choices":["Startup Repair in WinRE tools.","System Restore in WinRE tools.","Safe Mode with command prompt.","Boot configuration repair commands."],"correct":0,"explain":"WinRE Startup Repair can fix common boot issues. If it fails, use advanced recovery options.","sub":"4.3"},{"id":337,"domain":"Security","q":"A user delays installing critical security patches for weeks. What is the most accurate risk?","choices":["Exposure to known exploits increases.","Delayed remediation of known CVEs.","Higher likelihood of exploit compromise.","Extended window for attacker use."],"correct":0,"explain":"Delaying patches leaves systems vulnerable to publicly known vulnerabilities with existing exploit code.","sub":"2.3"},{"id":338,"domain":"Operating Systems","q":"A user needs to log in while off the corporate network using the same credentials as in the office. Which account type best supports this?","choices":["Domain account with cached creds.","Local account with synced password.","Azure AD account with offline cache.","Federated sign-in with offline token."],"correct":0,"explain":"Domain accounts can use cached credentials for offline logon depending on policy and prior authentication.","sub":"1.1"},{"id":339,"domain":"Security","q":"A technician is hardening a PC and wants to reduce attack surface by removing unnecessary applications. What is this called?","choices":["Reducing attack surface by hardening.","Removing unnecessary services and apps.","Disabling unused features and ports.","Minimizing exposed attack vectors."],"correct":0,"explain":"Hardening includes removing unnecessary software/services to reduce the attack surface.","sub":"2.1"},{"id":340,"domain":"Operating Systems","q":"A Windows external drive must be writable by both Windows and macOS without additional drivers. Which file system is best?","choices":["exFAT cross-platform file system.","FAT32 universal compatibility file system.","NTFS native Windows permissions file system.","APFS Apple-native solid state format."],"correct":0,"explain":"exFAT is broadly supported by Windows and macOS for read/write and is common for external media.","sub":"1.6"},{"id":341,"domain":"Security","q":"A technician finds RDP exposed directly to the internet on TCP 3389. What is the best remediation?","choices":["Remove exposure and require VPN.","Restrict RDP behind VPN access.","Use RD Gateway instead of direct exposure.","Limit inbound access to managed paths."],"correct":0,"explain":"Expose RDP only through secure access like VPN or gateway with MFA; simply changing ports is insufficient.","sub":"2.3"},{"id":342,"domain":"Operational Procedures","q":"A frustrated user becomes verbally abusive while you troubleshoot. What is the best response?","choices":["Stay calm and follow escalation.","Stay professional and de-escalate.","Set boundaries and involve management.","Follow procedure and escalate abuse."],"correct":0,"explain":"Maintain professionalism, set boundaries, and escalate per policy if the user remains abusive.","sub":"4.6"},{"id":343,"domain":"Operational Procedures","q":"A critical update requires a reboot during business hours. What is the best practice?","choices":["Schedule reboot in maintenance window.","Announce outage and maintenance timing.","Coordinate restart with stakeholders.","Perform reboot during approved window."],"correct":0,"explain":"Plan changes to minimize impact: maintenance windows, user notification, and rollback plans are best practice.","sub":"4.1"},{"id":344,"domain":"Security","q":"A user leaves the company. What is the best action regarding their accounts?","choices":["Disable accounts per offboarding policy.","Disable mailbox and access tokens.","Revoke VPN and remote access rights.","Follow account deprovisioning process."],"correct":0,"explain":"Offboarding should disable accounts promptly per policy, preserving data and audit trails as required.","sub":"2.2"},{"id":345,"domain":"Operating Systems","q":"A user wants convenience but still strong phone security. Which configuration is best practice?","choices":["Biometrics plus strong passcode.","Strong passcode with biometric unlock.","Auto-lock plus biometric sign-in.","Long PIN with device encryption enabled."],"correct":0,"explain":"Use biometrics for convenience and keep a strong passcode as fallback. Biometrics alone is not sufficient.","sub":"1.1"},{"id":346,"domain":"Operating Systems","q":"A technician needs to check and manage local user accounts and groups quickly on Windows Pro. Which tool is best?","choices":["lusrmgr.msc local users console.","Computer Management local users node.","net user local account commands.","Settings account family access page."],"correct":0,"explain":"Local Users and Groups (lusrmgr.msc) manages local accounts/groups on supported Windows editions.","sub":"1.4"},{"id":347,"domain":"Operating Systems","q":"A technician is deploying Windows to 200 identical new laptops before they ship to end users, and wants to avoid manually clicking through setup on each machine. Which installation method is most appropriate?","choices":["An unattended installation using a scripted answer file","A repair installation from the recovery partition","An in-place upgrade from the previous Windows version","A clean installation performed manually on each laptop one at a time"],"correct":0,"explain":"An unattended installation using a scripted answer file automates the setup process across many identical machines, eliminating the need for a technician to manually respond to setup prompts on each individual laptop.","sub":"1.2","source":"original-2026-batch"},{"id":348,"domain":"Operating Systems","q":"A user's laptop is running a 32-bit version of Windows, but the technician wants to upgrade it to the 64-bit version to take advantage of more available RAM. What type of installation is required to make this change?","choices":["A clean installation, since you cannot upgrade in place between 32-bit and 64-bit architectures","An in-place upgrade, which fully supports switching architecture","A repair installation, which will automatically convert the architecture","A remote network installation, which is the only method supporting architecture changes"],"correct":0,"explain":"Windows does not support in-place upgrades between 32-bit and 64-bit architectures, so a clean installation is required, which also means the user's data and applications must be backed up beforehand.","sub":"1.2","source":"original-2026-batch"},{"id":349,"domain":"Operating Systems","q":"Before performing an in-place upgrade on a user's computer to a new version of Windows, what should a technician verify first?","choices":["That the computer's hardware meets the new version's minimum system requirements","That the user has never restarted the computer before","That the computer's wallpaper matches the corporate standard","That the user has changed their password within the last 24 hours"],"correct":0,"explain":"Verifying that the computer's hardware meets the new Windows version's minimum system requirements before attempting an in-place upgrade helps avoid a failed installation or a system that runs poorly after the upgrade.","sub":"1.2","source":"original-2026-batch"},{"id":350,"domain":"Operating Systems","q":"A technician needs to install Windows on 50 computers that do not have a DVD drive or optical media available, but each computer does have a functioning USB port. What installation method would be most appropriate?","choices":["A bootable USB flash drive installation","A CD-ROM based installation, since it is universally supported","An installation requiring a working floppy disk drive","An installation that can only be performed through a printed manual"],"correct":0,"explain":"Since the computers lack optical drives but have USB ports, a bootable USB flash drive is the appropriate installation method, allowing Windows setup files to be loaded and the installation process started without any optical media.","sub":"1.2","source":"original-2026-batch"},{"id":351,"domain":"Operating Systems","q":"A company wants to install Windows on 100 new computers simultaneously over the network from a centralized server, rather than using physical media on each machine individually. What type of installation does this describe?","choices":["A network-based (PXE) installation","A repair installation from a local recovery partition","An installation performed entirely from a USB flash drive on each machine","An installation that requires manually copying files via external hard drive to each machine"],"correct":0,"explain":"A network-based installation, often using PXE (Preboot Execution Environment) boot, allows multiple computers to boot and install Windows directly from a centralized server over the network, without needing physical installation media at each machine.","sub":"1.2","source":"original-2026-batch"},{"id":352,"domain":"Operating Systems","q":"A technician is installing Windows on a brand new computer with an empty hard drive that has never had an operating system on it. What type of installation must be performed?","choices":["A clean installation, since there is no existing operating system to upgrade or repair","An in-place upgrade, since the drive is technically new","A repair installation, since new drives sometimes have corrupted partitions","A remote installation only, since local installation isn't possible on unformatted media"],"correct":0,"explain":"Since the hard drive is completely empty with no existing operating system, only a clean installation is possible, as there is nothing present to upgrade in place or repair.","sub":"1.2","source":"original-2026-batch"},{"id":353,"domain":"Operating Systems","q":"During a Windows installation, a technician is prompted to choose between GPT and MBR partition styles for a drive on a modern computer with UEFI firmware. Which choice is generally recommended for a new UEFI-based system?","choices":["GPT (GUID Partition Table), which supports UEFI boot and drives larger than 2TB","MBR (Master Boot Record), which is required for all UEFI systems","Neither, since UEFI systems do not use any partition table","FAT32, since it is a partition style rather than a file system option"],"correct":0,"explain":"GPT (GUID Partition Table) is generally recommended for modern UEFI-based systems since it supports UEFI boot mode and allows drives larger than 2TB, unlike the older MBR partition style which has significant limitations on modern hardware.","sub":"1.2","source":"original-2026-batch"},{"id":354,"domain":"Operating Systems","q":"A technician wants to create a custom Windows installation image that already includes the company's standard applications and settings, so that new computers can be imaged quickly without installing each application separately afterward. What tool or approach supports this goal?","choices":["Creating and deploying a custom Windows image (a 'golden image') with the applications pre-installed","Manually installing each application by hand on every new computer after imaging","Reinstalling Windows from scratch on every single new computer individually","Relying solely on the Windows Update service to install all applications"],"correct":0,"explain":"Creating a custom Windows image, often called a golden image, that already includes the company's standard applications and settings allows new computers to be imaged quickly with everything pre-installed, avoiding the need to manually install each application separately on every machine.","sub":"1.2","source":"original-2026-batch"},{"id":355,"domain":"Operating Systems","q":"A small business owner purchases a new laptop for personal home use and does not need any domain-join capability, Group Policy, or BitLocker support. Which Windows edition is most appropriate and cost-effective for this simple home use case?","choices":["Windows Home","Windows Enterprise","Windows Pro for Workstations","Windows Server"],"correct":0,"explain":"Windows Home is designed for simple personal and home use, and does not include advanced features like domain join, Group Policy, or BitLocker, making it the most cost-effective and appropriate choice for a user with no need for those capabilities.","sub":"1.3","source":"original-2026-batch"},{"id":356,"domain":"Operating Systems","q":"A freelance graphic designer needs to join their laptop to a client's business network occasionally, use BitLocker drive encryption for sensitive client files, and needs Remote Desktop host capability. Which Windows edition provides these features without the added cost of enterprise-scale management tools they don't need?","choices":["Windows Pro","Windows Home","Windows S mode","Windows 10 IoT Core"],"correct":0,"explain":"Windows Pro includes domain join capability, BitLocker encryption, and Remote Desktop host functionality, making it appropriate for a professional user who needs these features without paying for enterprise-scale management tools that are unnecessary for an individual freelancer.","sub":"1.3","source":"original-2026-batch"},{"id":357,"domain":"Operating Systems","q":"A large corporation with thousands of employees needs centralized Group Policy management, advanced security features like Credential Guard, and support for enterprise-wide deployment tools. Which Windows edition is specifically designed for this scale of organization?","choices":["Windows Enterprise","Windows Home","Windows 10 in S mode","Windows Mixed Reality"],"correct":0,"explain":"Windows Enterprise is specifically designed for large organizations, offering centralized Group Policy management, advanced security features like Credential Guard, and support for enterprise-wide deployment tools that smaller editions lack.","sub":"1.3","source":"original-2026-batch"},{"id":358,"domain":"Operating Systems","q":"A school district wants to deploy laptops to students that are restricted to only running applications from the Microsoft Store, for improved security and simplified management in a shared lab environment. Which Windows configuration is designed for this restricted use case?","choices":["Windows in S mode","Windows Enterprise with no restrictions","Windows Pro for Workstations","Windows Home with all default settings"],"correct":0,"explain":"Windows in S mode is specifically designed to restrict the operating system to running only applications from the Microsoft Store, providing improved security and simplified management, which fits a shared educational lab environment well.","sub":"1.3","source":"original-2026-batch"},{"id":359,"domain":"Operating Systems","q":"A data scientist requires a workstation capable of supporting up to 4 physical CPUs and up to 6TB of RAM for large-scale data processing tasks, capabilities not offered by standard consumer or business editions. Which Windows edition is designed for this high-end workstation use case?","choices":["Windows Pro for Workstations","Windows Home","Windows 10 in S mode","Windows 10 IoT Enterprise"],"correct":0,"explain":"Windows Pro for Workstations is specifically designed for high-end workstation hardware, supporting up to 4 physical CPUs and significantly more RAM than standard consumer or business editions, making it appropriate for demanding data processing workloads.","sub":"1.3","source":"original-2026-batch"},{"id":360,"domain":"Operating Systems","q":"A manufacturer building specialized point-of-sale kiosks needs a lightweight, locked-down version of Windows optimized for embedded devices with limited hardware resources. Which Windows edition is designed for this type of embedded deployment?","choices":["Windows 10/11 IoT Enterprise","Windows Home","Windows Pro for Workstations","Windows Enterprise E5"],"correct":0,"explain":"Windows IoT Enterprise is designed specifically for embedded devices like point-of-sale kiosks, ATMs, and other specialized hardware, offering a locked-down configuration optimized for devices with limited hardware resources and specific dedicated purposes.","sub":"1.3","source":"original-2026-batch"},{"id":361,"domain":"Operating Systems","q":"A company evaluating Windows editions notes that only certain editions support joining an Active Directory domain, while the most basic consumer edition does not. Which Windows edition lacks domain join capability entirely?","choices":["Windows Home","Windows Pro","Windows Enterprise","Windows Pro for Workstations"],"correct":0,"explain":"Windows Home lacks domain join capability entirely, since it is designed for individual consumer and home use rather than for integration into a centrally managed business network with Active Directory.","sub":"1.3","source":"original-2026-batch"},{"id":362,"domain":"Operating Systems","q":"An IT administrator needs to apply centralized Group Policy Objects to control password complexity requirements, desktop restrictions, and software installation permissions across all company computers. Employees currently using Windows Home cannot receive these policies. What is the underlying reason?","choices":["Windows Home does not support the Group Policy Editor or domain-based Group Policy application","Group Policy only works on Windows Server operating systems, never on any client edition","Windows Home requires a separate paid subscription specifically to unlock Group Policy support","Group Policy has been permanently discontinued in all current Windows editions"],"correct":0,"explain":"Windows Home does not support the Group Policy Editor or domain-based Group Policy application, which is one of the key feature differences that separates it from Windows Pro and Enterprise, both of which support centralized policy management.","sub":"1.3","source":"original-2026-batch"},{"id":363,"domain":"Operating Systems","q":"A technician comparing Windows editions notes that BitLocker full-disk encryption is available starting with Windows Pro but is absent from Windows Home. What does this feature gap mean for a Windows Home user concerned about data security on a lost or stolen laptop?","choices":["They would need to upgrade to Windows Pro or use a third-party encryption tool to achieve full-disk encryption comparable to BitLocker","They already have BitLocker enabled by default with no upgrade needed","Windows Home actually offers a more advanced encryption tool that exceeds BitLocker's capabilities","Full-disk encryption is not possible on any Windows edition without additional purchased hardware"],"correct":0,"explain":"Since BitLocker is not included in Windows Home, a user on that edition concerned about data security on a lost or stolen device would need to either upgrade to Windows Pro or Enterprise, or use a third-party encryption tool to achieve comparable full-disk encryption protection.","sub":"1.3","source":"original-2026-batch"},{"id":364,"domain":"Operating Systems","q":"A company deploying Windows to its finance department wants Windows Information Protection (WIP) to help prevent accidental leakage of sensitive corporate data. Which Windows edition tier is required to access this feature?","choices":["Windows Pro or higher, since Windows Home does not include this data protection feature","Windows Home, since all data protection features are included at every tier","Only Windows 10 in S mode, since it is the most restrictive edition","No edition supports this feature, since it was discontinued in early Windows 10 releases"],"correct":0,"explain":"Windows Information Protection is a feature available starting with Windows Pro, aligning with other business-focused security capabilities that are absent from the more basic Windows Home edition intended for personal consumer use.","sub":"1.3","source":"original-2026-batch"},{"id":365,"domain":"Operating Systems","q":"A user on Windows 10 in S mode complains that they cannot install a specialized accounting application obtained directly from the software vendor's website rather than the Microsoft Store. What is the reason for this limitation?","choices":["Windows 10 in S mode restricts application installation exclusively to apps obtained through the Microsoft Store for security purposes","S mode has no restrictions on where applications can be installed from","The user's internet connection is blocking the download, unrelated to the S mode restriction","S mode only restricts installation of free applications, not paid ones"],"correct":0,"explain":"Windows 10 in S mode is specifically designed to restrict application installation to only those obtained through the Microsoft Store, which improves security and predictability but prevents installing traditional desktop applications distributed directly from a vendor's website.","sub":"1.3","source":"original-2026-batch"},{"id":366,"domain":"Operating Systems","q":"A company wants to switch a batch of Windows 10 in S mode laptops to the full standard version of Windows Pro so that employees can install traditional desktop applications needed for their work. What must be done to achieve this?","choices":["Switch out of S mode through Windows Settings, which is generally a one-way, free process on a supported edition","Purchase entirely new laptops since S mode cannot be changed once configured","Downgrade to Windows Home first before switching out of S mode","Contact Microsoft support to have S mode manually disabled by a technician remotely"],"correct":0,"explain":"Switching out of S mode is generally accomplished through Windows Settings and is typically a one-way, free process on a supported edition, after which the device behaves like the standard edition without the Microsoft Store installation restriction.","sub":"1.3","source":"original-2026-batch"},{"id":367,"domain":"Operating Systems","q":"A network administrator needs a Windows edition that supports Remote Desktop as a host, allowing other users to remotely connect into that specific machine for support or access. Which lower-tier consumer edition notably lacks this specific host capability?","choices":["Windows Home, which can act as a Remote Desktop client but not a host","Windows Pro, which can act as both a Remote Desktop client and host","Windows Enterprise, which can act as both a Remote Desktop client and host","Windows Pro for Workstations, which can act as both a Remote Desktop client and host"],"correct":0,"explain":"Windows Home can act as a Remote Desktop client, allowing it to connect out to other machines, but it lacks the ability to act as a Remote Desktop host, meaning other users cannot remotely connect into a Windows Home machine using the built-in Remote Desktop feature.","sub":"1.3","source":"original-2026-batch"},{"id":368,"domain":"Operating Systems","q":"A company wants to ensure that even if an employee's laptop is lost or stolen, the built-in Trusted Platform Module (TPM) combined with BitLocker will prevent unauthorized access to the encrypted drive's contents without booting through proper authentication. What is required on the Windows edition side to enable this configuration?","choices":["An edition that includes BitLocker support, such as Windows Pro or Enterprise, in combination with a TPM chip on the hardware","Any Windows edition works identically, since encryption is entirely hardware-based and edition-independent","Windows Home is sufficient on its own, since TPM alone provides encryption without any BitLocker software","A dedicated third-party operating system replacing Windows entirely is required"],"correct":0,"explain":"Enabling BitLocker encryption tied to a TPM chip requires a Windows edition that includes BitLocker support, such as Windows Pro or Enterprise; Windows Home lacks the BitLocker feature entirely, even if the underlying hardware has a TPM chip present.","sub":"1.3","source":"original-2026-batch"},{"id":369,"domain":"Operating Systems","q":"A hospital IT department needs a Windows edition offering the longest-term servicing options and stability for specialized medical devices that should not receive frequent feature updates that could disrupt regulatory-certified device behavior. Which Windows servicing option is designed for this type of long-term stability requirement?","choices":["The Long-Term Servicing Channel (LTSC), available with certain Enterprise and IoT editions","The standard consumer feature update channel used by Windows Home","A beta/insider preview channel, since it offers the most frequent updates","No servicing channel differences exist between Windows editions"],"correct":0,"explain":"The Long-Term Servicing Channel (LTSC) is designed specifically for specialized use cases like medical or industrial devices that need long-term stability and should not receive frequent feature updates, and it is available with certain Enterprise and IoT Windows editions.","sub":"1.3","source":"original-2026-batch"},{"id":370,"domain":"Operating Systems","q":"An organization evaluates whether to license Windows Pro or Windows Enterprise for its 500 office workstations, noting that Enterprise is only available through volume licensing agreements rather than retail purchase. What does this licensing distinction primarily reflect?","choices":["Windows Enterprise is designed for large-scale organizational deployment and is intentionally distributed only through volume licensing channels rather than individual retail sale","Windows Enterprise can only ever be purchased and installed as a single retail copy, identical to Windows Home","There is no actual licensing difference between Windows Pro and Windows Enterprise","Windows Enterprise is being discontinued and is no longer available under any licensing model"],"correct":0,"explain":"Windows Enterprise being distributed only through volume licensing agreements, rather than individual retail purchase, reflects its design and intended use for large-scale organizational deployment, distinguishing it from Windows Pro, which is available through standard retail channels for individual purchase.","sub":"1.3","source":"original-2026-batch"},{"id":371,"domain":"Operating Systems","q":"A technician needs to determine which Windows edition is installed on a user's computer to confirm whether it supports Group Policy and BitLocker before promising those capabilities to the user. Where can the technician quickly check this information within Windows?","choices":["The System settings page (or 'winver' command), which displays the installed Windows edition and version","The Windows wallpaper settings page, which lists installed feature capabilities","The Bluetooth pairing settings page, unrelated to edition information","The printer management console, unrelated to edition information"],"correct":0,"explain":"The System settings page, or running the 'winver' command, displays the installed Windows edition and version information, allowing a technician to quickly confirm which edition is present before promising specific edition-dependent capabilities like Group Policy or BitLocker to a user.","sub":"1.3","source":"original-2026-batch"},{"id":372,"domain":"Operating Systems","q":"A company wants to standardize on a single Windows edition for both regular office workers and its small number of high-end workstation users doing 3D rendering, in order to simplify licensing and support. Why might Windows Enterprise be preferred o
